<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오류가 발생했습니다</title>
</head>
<body>
<div class="error-page-container">
    <div class="error-content">
        <div class="error-icon">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1 class="error-title">오류가 발생했습니다</h1>
        <p class="error-message">요청하신 페이지를 처리하는 중 문제가 발생했습니다.</p>
        <p class="error-description">잠시 후 다시 시도해주시거나, 홈으로 돌아가 주세요.</p>
        <button class="error-home-btn" onclick="window.location.href='/'">홈으로 가기</button>
    </div>

    <style>
        .error-page-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: #f5f5f5;
        }

        .error-content {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .error-icon {
            font-size: 80px;
            color: #ff9800;
            margin-bottom: 24px;
        }

        .error-title {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin: 0 0 16px 0;
        }

        .error-message {
            font-size: 16px;
            color: #666;
            margin: 0 0 8px 0;
            line-height: 1.6;
        }

        .error-description {
            font-size: 14px;
            color: #999;
            margin: 0 0 32px 0;
            line-height: 1.6;
        }

        .error-home-btn {
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            background: #333;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .error-home-btn:hover {
            background: #555;
        }
    </style>
</div>
</body>
</html>
