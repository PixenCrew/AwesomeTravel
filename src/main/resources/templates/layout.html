<!DOCTYPE html>
<html lang="ko">
<meta name="viewport" content="width=389, user-scalable=no">

<head>
    <meta charset="UTF-8">
    <title>Layout</title>
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.8.2/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/main.min.css" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.js'></script>
    <!-- Quill CSS -->
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <!-- Quill JS -->
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

</head>

<body>
    <main id="mainSection">
        <!-- ✅ 홈 섹션 -->
        <section id="homeSection" class="active">
            <div class="section-body">
                <div th:replace="~{fragments/home :: homeFragment}"></div>
            </div>
        </section>

        <!-- ✅ 메뉴 섹션 (header 포함) -->
        <section id="menuSection">
            <header class="menu-header">
                <h1 class="menu-title">전체메뉴</h1>
                <i class="fas fa-times menu-close-btn" onclick="prevSection()"></i>
            </header>
            
            <div class="menu-tabs">
                <button type="button" class="menu-tab active" id="tab-travel" onclick="showMenuTab('menu-travel')">딱좋은여행</button>
                <button type="button" class="menu-tab" id="tab-support" onclick="showMenuTab('menu-support')">고객지원</button>
            </div>

            <div class="section-body menu-body">
                <!-- ✅ 딱좋은여행 탭 내용 -->
                <div id="menu-travel" class="menu-content active">
                    <div class="menu-category">
                        <button type="button" class="menu-category-btn" onclick="toggleMenuCategory(this)">
                            해외여행
                            <i class="fas fa-chevron-up category-icon"></i>
                        </button>
                        <ul class="menu-subcategory active">
                            <li onclick="fetchSection('/subMain/101')">유럽</li>
                            <li onclick="fetchSection('/subMain/601')">오세아니아</li>
                            <li onclick="fetchSection('/subMain/801')">중동·아프리카</li>
                            <li onclick="fetchSection('/subMain/201')">아시아</li>
                            <li onclick="fetchSection('/subMain/704')">미주</li>
                        </ul>
                    </div>
                    <div class="menu-category">
                        <button type="button" class="menu-category-btn" onclick="fetchSection('/air/search')">항공</button>
                    </div>
                    <div class="menu-category">
                        <button type="button" class="menu-category-btn">기획전</button>
                    </div>
                    <div class="menu-category">
                        <button type="button" class="menu-category-btn">이벤트</button>
                    </div>
                    <div class="menu-category">
                        <button type="button" class="menu-category-btn">타임딜</button>
                    </div>
                </div>

                <!-- ✅ 고객지원 탭 내용 -->
                <div id="menu-support" class="menu-content">
                    <ul class="menu-support-list">
                        <li><button type="button" class="menu-support-item" onclick="showSection(5)">마이페이지</button></li>
                        <li><button type="button" class="menu-support-item" onclick="fetchSection('/inquiry/all')">고객문의</button></li>
                        <li><button type="button" class="menu-support-item" onclick="fetchSection('/notice')">공지사항</button></li>
                        <li><button type="button" class="menu-support-item" onclick="fetchSection('/mypage/setting')">설정</button></li>
                    </ul>
                </div>
            </div>
        </section>

        <!-- ✅ 검색 섹션 -->
        <section id="searchSection">

            <!-- 상단 검색창 -->
            <header class="search-header">
                <i class="fas fa-chevron-left back-btn" onclick="prevSection()"></i>

                <form class="search-box" onsubmit="handleSearchSubmit(event)">
                    <input type="text" name="keyword" id="searchKeyword" placeholder="검색어를 입력하세요" autocomplete="off">
                    <i class="fas fa-times clear-btn" onclick="clearSearchInput(event)" style="display: none;"></i>
                </form>
            </header>

            <div class="section-body search-body">

                <!-- 최근 검색 -->
                <div class="recent-header">
                    <h2>최근 검색</h2>
                    <div class="options">
                        <span class="option-link" onclick="clearAllRecent()">전체 삭제</span>
                        <span class="divider">|</span>
                        <span class="option-link" onclick="toggleAutoSave()">자동저장 켜기</span>
                    </div>
                </div>

                <ul class="recent-list"></ul>

                <!-- 인기 검색어 -->
                <h2 class="popular-title">인기 검색어</h2>

                <div class="popular-tags">
                </div>

            </div>

        </section>

        <!-- ✅찜 섹션 -->
        <section id="wishSection">
            <div th:replace="~{fragments/wish :: wishFragment}">
        </section>

        <!-- ✅ 마이이 섹션 -->
        <section id="mypageSection">
            <div th:replace="~{fragments/mypage :: mypageFragment}">
        </section>

        <!-- ✅ 동적 섹션 -->
        <section id="dynamicSection">
            <header class="section-header">

            </header>
            <div class="section-body">
                <div></div>
            </div>
        </section>
    </main>

    <footer id="footerSection">
        <nav>
            <ul>
                <li><a href="#home" onclick="showSection(1)" class="nav-item" data-section="1">
                    <i class="fas fa-home nav-icon"></i>
                    <span class="nav-label">홈</span>
                </a></li>
                <li><a href="#menu" onclick="showSection(2)" class="nav-item" data-section="2">
                    <i class="fas fa-bars nav-icon"></i>
                    <span class="nav-label">메뉴</span>
                </a></li>
                <li><a href="#search" onclick="showSection(3)" class="nav-item" data-section="3">
                    <i class="fas fa-search nav-icon"></i>
                    <span class="nav-label">검색</span>
                </a></li>
                <li><a href="#wish" onclick="showSection(4)" class="nav-item" data-section="4">
                    <i class="fas fa-heart nav-icon"></i>
                    <span class="nav-label">찜</span>
                </a></li>
                <li><a href="#mypage" onclick="showSection(5)" class="nav-item" data-section="5">
                    <i class="fas fa-user nav-icon"></i>
                    <span class="nav-label">마이</span>
                </a></li>
            </ul>
        </nav>
    </footer>

    <!-- ✅ 풀스크린 모달 -->
    <section id="fullModal" class="hide">
        <div id="modalBody"></div>
    </section>

    <!-- 하프 모달 -->
    <section id="halfModal" class="hide">
        <div id="halfModalBackground"></div>
        <div id="halfModalBody"></div>
    </section>

    <!-- 센터 모달 -->
    <section id="centerModal" class="hide">
        <div id="centerModalBody"></div>
    </section>

    <!--로딩 오버레이-->
    <div id="loading">
        <div class="loading-card">
            <div class="loading-spinner"></div>
            <p>잠시만 기다려 주세요...</p>
        </div>
    </div>

    <script th:inline="javascript">
        // 로그인 여부 확인
        const isLoggedIn = /*[[${ currentUser != null}]]*/ false;
        window.isLoggedIn = isLoggedIn; // 전역 변수로 설정
        const username = /*[[${ currentUser?.name }]]*/ null;
    </script>
    <script src="/js/layout.js" defer></script>

</body>

</html>
