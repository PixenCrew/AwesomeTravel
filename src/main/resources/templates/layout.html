<!DOCTYPE html>
<html lang="ko">
<meta name="viewport" content="width=389, user-scalable=no">

<head>
    <meta charset="UTF-8">
    <title>Layout</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        /*===================================네비게이션=====================*/
        /* 바닥 네비게이션 고정 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: #fff;
            border-top: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .bottom-nav ul {
            display: flex;
            width: 100%;
            justify-content: space-around;
            list-style: none;
        }

        .bottom-nav li a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        /*===================================메인 섹션=====================*/
        #mainSection {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #mainSection>section {
            position: absolute;
            top: 0;
            left: 100%;
            width: 100%;
            height: 100%;
            transition: left 0.2s ease;
            z-index: 0;
            background: white;
        }

        .active {
            left: 0% !important;
            z-index: 1 !important;
        }

        .exit {
            left: -100% !important;
        }

        /*===================================풀 모달=====================*/
        /* 모달 초기 상태 */
        #fullModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: lightcoral;
            overflow: auto;
            z-index: 3;

            transform: translateY(100%);
            transition: transform 0.5s ease;
        }

        /* 표시 상태 */
        #fullModal.show {
            transform: translateY(0);
        }

        /* 모달 숨김 상태 */
        #fullModal.hide {
            transform: translateY(100%);
        }

        /* 모달 내부 컨텐츠 박스 */
        .modal-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background: lightgray;
            overflow: auto;
            transition: transform 0.2s ease;
        }

        .modal-slide.leave {
            transform: translateX(100vw);
        }

        .modal-slide.show {
            transform: translateX(0%);
        }
    </style>
</head>

<body>

    <main>
        <div id="mainSection">
            <!-- ✅ 홈 섹션 -->
            <section id="homeSection" class="active">
                <div th:replace="fragments/home :: homeFragment"></div>
            </section>

            <!-- ✅ 메뉴 섹션 (header 포함) -->
            <section id="menuSection">
                <header>
                    <div>
                        <span>전체메뉴</span>
                        <button type="button" onclick="hideMenu()">X</button>
                    </div>

                    <nav>
                        <ul>
                            <li><button type="button" onclick="showMenuTab('travel')">딱좋은여행</button></li>
                            <li><button type="button" onclick="showMenuTab('support')">고객지원</button></li>
                        </ul>
                    </nav>
                </header>

                <!-- ✅ 딱좋은여행 탭 내용 -->
                <div id="menu-travel">
                    <div>
                        <button type="button">해외여행</button>
                        <ul>
                            <li>유럽</li>
                            <li>아시아</li>
                            <li>오세아니아</li>
                            <li>미주</li>
                            <li>중동·아프리카</li>
                        </ul>
                    </div>
                    <div><button type="button">항공</button></div>
                    <div><button type="button">기획전</button></div>
                    <div><button type="button">이벤트</button></div>
                    <div><button type="button">타임딜</button></div>
                </div>

                <!-- ✅ 고객지원 탭 내용 -->
                <div id="menu-support">
                    <ul>
                        <li><button type="button">마이페이지</button></li>
                        <li><button type="button">고객문의</button></li>
                        <li><button type="button">공지사항</button></li>
                        <li><button type="button">설정</button></li>
                    </ul>
                </div>
            </section>

            <!-- ✅ 검색 섹션 -->
            <section id="searchSection">
                <form>
                    <input type="text" name="keyword" placeholder="검색어를 입력하세요">
                    <button type="submit">검색</button>
                </form>
            </section>

            <!-- ✅  찜 섹션 -->
            <section id="wishSection">
                <div th:if="${currentUser != null}" th:replace="fragments/wish :: wishFragment"></div>
                <div th:unless="${currentUser != null}" th:replace="fragments/login :: loginFragment"></div>
            </section>

            <!-- ✅ 마이이 섹션 -->
            <section id="mypageSection">
                <div th:if="${currentUser != null}" th:replace="fragments/mypage :: mypageFragment"></div>
                <div th:unless="${currentUser != null}" th:replace="fragments/login :: loginFragment"></div>
            </section>
        </div>

        <!-- ✅ 풀스크린 모달 -->
        <section id="fullModal" class="hide">
            <div id="modalBody"></div>
        </section>

    </main>

    <footer>
        <nav class="bottom-nav">
            <ul>
                <li><a href="#" onclick="showSection(1)">홈</a></li>
                <li><a href="#" onclick="showSection(2)">메뉴</a></li>
                <li><a href="#" onclick="showSection(3)">검색</a></li>
                <li><a href="#" onclick="showSection(4)">찜</a></li>
                <li><a href="#" onclick="showSection(5)">마이</a></li>
            </ul>
        </nav>
    </footer>

    <script>


        // ===========================섹션제어========================
        let currentSection = 1;
        let isAnimating = false;
        let sectinoMap = {
            1: 'homeSection',
            2: 'menuSection',
            3: 'searchSection',
            4: 'wishSection',
            5: 'mypageSection',
        };

        function showSection(sectionIndex) {
            // 대상==출발일경우 무시
            if (currentSection === sectionIndex) return;
            // 애니메이션 트랜지션 중일때 무시
            if (isAnimating) return;

            isAnimating = true;

            const startSection = document.getElementById(sectinoMap[currentSection]);
            const targetSection = document.getElementById(sectinoMap[sectionIndex]);

            // 출발 section hidden
            startSection.classList.remove('active')
            startSection.classList.add('exit')

            // 대상 section active
            targetSection.classList.remove('exit')
            targetSection.classList.add('active')

            setTimeout(() => {
                startSection.classList.remove('exit');
                isAnimating = false;
            }, 200);

            currentSection = sectionIndex;
        }


        // ===========================모달제어========================
        const fullModal = document.getElementById('fullModal');
        const modalBody = document.getElementById('modalBody');

        // 모달 스택
        let modalStack = [];
        let currentModal = null;

        // 모달 열기 (첫 모달)
        function openModal(contentHtml) {
            modalStack = []; // 스택 초기화
            fullModal.classList.remove('hide');
            fullModal.classList.add('show');

            // 새 모달 DOM 생성
            const newModal = document.createElement('div');
            newModal.classList.add('modal-slide', 'show');
            newModal.innerHTML = contentHtml;

            modalBody.appendChild(newModal);
            currentModal = newModal;
        }

        // 새 모달 내용 생성
        function createModal(contentHtml) {
            const newModal = document.createElement('div');
            newModal.classList.add('modal-slide', 'leave');
            newModal.innerHTML = contentHtml;
            modalBody.appendChild(newModal);
            setTimeout(() => {
                addModal(newModal);
            }, 0)
        }

        // [기존 모달 삭제 후] 새 모달 내용 생성
        function createModalWithFlush(contentHtml) {

            createModal(contentHtml)

            setTimeout(() => {
                // 모든 모달 DOM 제거
                modalStack.forEach(modal => {
                    if (modal.parentNode) {
                        modal.parentNode.removeChild(modal);
                    }
                });

                // 배열 초기화
                modalStack = [];
            }, 200)

        }

        // 모달 추가 (현재 모달 위에 새 모달)
        function addModal(newModal) {

            // 기존 모달 스택에 저장
            modalStack.push(currentModal);

            // 새 모달 슬라이드 인  
            newModal.classList.remove('leave');
            newModal.classList.add('show');

            currentModal = newModal;

        }

        // 뒤로가기
        function backModal() {
            if (modalStack.length > 0) {
                const prevModal = modalStack.pop();

                // 현재 모달 나가기
                currentModal.classList.remove('show');
                currentModal.classList.add('leave');

                currentModal = prevModal;

                // 나간 모달 DOM 제거
                setTimeout(() => {
                    modalBody.querySelectorAll('.leave').forEach(el => el.remove());
                }, 100);

            } else {
                closeModal();
            }
        }

        // 모달 닫기
        function closeModal() {
            fullModal.classList.remove('show');
            fullModal.classList.add('hide');
            modalStack = [];
            currentModal = null;
            setTimeout(() => {
                modalBody.innerHTML = '';
            }, 500);
        }

        // 재귀적으로 무한 스택용 모달 content 생성
        function getModalContent(depth) {
            return `
        <div>
            <p>모달 깊이: ${depth}</p>
            <button onclick="createModal(getModalContent(${depth + 1}))">새 모달 추가</button>
            <button onclick="createModalWithFlush(getModalContent(${depth + 1}))">[Flush]새 모달 추가</button>
            <button onclick="backModal()">뒤로</button>
            <button onclick="closeModal()">닫기</button>
        </div>
    `;
        }
    </script>

</body>

</html>
