<!DOCTYPE html>
<html lang="ko">
<meta name="viewport" content="width=389, user-scalable=no">

<head>
    <meta charset="UTF-8">
    <title>Layout</title>
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.8.2/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/main.min.css" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.js'></script>

</head>

<body>
    <main id="mainSection">
        <!-- ✅ 홈 섹션 -->
        <section id="homeSection" class="active">

            <header class="section-header">
                <div class="left">
                    <img src="/images/logo.png">
                </div>

                <div class="right">
                    <img src="/images/logo.png" onclick="showSection(3)">
                </div>
            </header>

            <div class="section-body">
                <div th:replace="~{fragments/home :: homeFragment}"></div>
            </div>

        </section>

        <!-- ✅ 메뉴 섹션 (header 포함) -->
        <section id="menuSection">

            <header class="section-header">
                <div class="left">
                    <i class="fas fa-chevron-left" onclick="prevSection()"></i>
                </div>
            </header>
            <div>
                <div class="section-body">
                    <nav>
                        <ul>
                            <li><button type="button" onclick="showMenuTab('menu-travel')">딱좋은여행</button></li>
                            <li><button type="button" onclick="showMenuTab('menu-support')">고객지원</button></li>
                        </ul>
                    </nav>

                    <!-- ✅ 딱좋은여행 탭 내용 -->
                    <div id="menu-travel" class="active">
                        <div>
                            <button type="button">해외여행</button>
                            <ul>
                                <li onclick="fetchSection('/subMain/101')">유럽</li>
                                <li>아시아</li>
                                <li>오세아니아</li>
                                <li>미주</li>
                                <li>중동·아프리카</li>
                            </ul>
                        </div>
                        <div><button type="button">항공</button></div>
                        <div><button type="button">기획전</button></div>
                        <div><button type="button">이벤트</button></div>
                        <div><button type="button">타임딜</button></div>
                    </div>

                    <!-- ✅ 고객지원 탭 내용 -->
                    <div id="menu-support">
                        <ul>
                            <li><button type="button">마이페이지</button></li>
                            <li><button type="button">고객문의</button></li>
                            <li><button type="button">공지사항</button></li>
                            <li><button type="button">설정</button></li>
                        </ul>
                    </div>
                </div>
            </div>
        </section>

        <!-- ✅ 검색 섹션 -->
        <section id="searchSection">

            <header class="section-header">
                <div class="left">
                    <i class="fas fa-chevron-left" onclick="prevSection()"></i>
                </div>
                <h1 class="right">검색 헤더</h1>
            </header>

            <div class="section-body">
                <div>
                    <form>
                        <input type="text" name="keyword" placeholder="검색어를 입력하세요">
                        <button type="submit">검색</button>
                    </form>
                </div>
            </div>

        </section>

        <!-- ✅찜 섹션 -->
        <section id="wishSection">
            <header class="section-header">
                <div class="left">
                    <i class="fas fa-chevron-left" onclick="prevSection()"></i>
                </div>
                <h1 class="center">일반 헤더</h1>
            </header>

            <div class="section-body">
                <div th:replace="~{fragments/wish :: wishFragment}">

                </div>
            </div>
        </section>

        <!-- ✅ 마이이 섹션 -->
        <section id="mypageSection">
            <header class="section-header">
                <div class="left">
                    <i class="fas fa-chevron-left" onclick="prevSection()"></i>
                </div>
                <h1 class="center">일반 헤더</h1>
            </header>


            <div class="section-body">
                <div th:replace="~{fragments/mypage :: mypageFragment}">

                </div>
            </div>
        </section>

        <!-- ✅ 동적 섹션 -->
        <section id="dynamicSection">
            <header class="section-header">

            </header>
            <div class="section-body">
                <div></div>
            </div>
        </section>
    </main>

    <footer id="footerSection">
        <nav>
            <ul>
                <li><a href="#home" onclick="showSection(1)">홈</a></li>
                <li><a href="#menu" onclick="showSection(2)">메뉴</a></li>
                <li><a href="#search" onclick="showSection(3)">검색</a></li>
                <li><a href="#wish" onclick="showSection(4)">찜</a></li>
                <li><a href="#mypage" onclick="showSection(5)">마이</a></li>
            </ul>
        </nav>
    </footer>

    <!-- ✅ 풀스크린 모달 -->
    <section id="fullModal" class="hide">
        <div id="modalBody"></div>
    </section>

    <!-- 하프 모달 -->
    <section id="halfModal" class="hide">
        <div id="halfModalBackground"></div>
        <div id="halfModalBody"></div>
    </section>

    <!-- 센터 모달 -->
    <section id="centerModal" class="hide">
        <div id="centerModalBody"></div>
    </section>

    <!--로딩 아이콘-->
    <div id="loading">
        <img src="/images/loading.gif" alt="로딩 중">
    </div>

    <script th:inline="javascript">
        // 로그인 여부 확인
        const isLoggedIn = /*[[${ currentUser != null}]]*/ false;
        const username = /*[[${ currentUser?.name }]]*/ null;
    </script>
    <script src="/js/layout.js" defer></script>

</body>

</html>
