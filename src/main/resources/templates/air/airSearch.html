<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>항공편 검색 테스트</title>
</head>

<body>
    <h1>항공편 검색 테스트</h1>

    <!-- ==== 타입 선택 ==== -->

    <label>왕복
        <input type="radio" name="tripTypeSelect" value="ROUND_TRIP" checked onclick="showForm('ROUND_TRIP')">
    </label>

    <label>편도
        <input type="radio" name="tripTypeSelect" value="ONE_WAY" onclick="showForm('ONE_WAY')">
    </label>

    <label>다구간
        <input type="radio" name="tripTypeSelect" value="MULTI" onclick="showForm('MULTI')">
    </label>

    <hr>
    <!-- ROUND_TRIP -->
    <div id="form-ROUND_TRIP" class="trip-form">
        <form th:action="@{/air/search}" th:object="${searchRequest}" method="post">
            <h2>왕복 (ROUND_TRIP)</h2>
            <input type="hidden" name="tripType" value="ROUND_TRIP">

            성인:<input type="number" th:field="*{adultCount}" min="0"><br>
            어린이:<input type="number" th:field="*{youthCount}" min="0"><br>
            유아:<input type="number" th:field="*{infantCount}" min="0"><br>

            좌석 등급:
            <select th:field="*{seatClassType}">
                <option value="">선택</option>
                <option th:value="ECONOMY">이코노미</option>
                <option th:value="BUSINESS">비즈니스</option>
                <option th:value="FIRST">퍼스트</option>
            </select><br>

            직항만:<input type="checkbox" th:field="*{directOnly}"><br>

            <h3>구간</h3>
            <div id="roundtrip-segments">
                <div>출발</div>
                <div>

                    <label>출발 공항:
                        <input type="text" id="seg0-depart" name="segments[0].depart.airportCode">
                    </label>

                    <label>도착 공항:
                        <input type="text" id="seg0-arrive" name="segments[0].arrive.airportCode">
                    </label>

                    <label>출발일:
                        <input type="date" name="segments[0].departDate">
                    </label>

                </div>
                <br>
                <div>귀환</div>
                <div>

                    <label>출발 공항:
                        <input type="text" id="seg1-depart" name="segments[1].depart.airportCode" readonly>
                    </label>

                    <label>도착 공항:
                        <input type="text" id="seg1-arrive" name="segments[1].arrive.airportCode" readonly>
                    </label>

                    <label>귀환일:
                        <input type="date" name="segments[1].departDate">
                    </label>

                </div>
            </div>

            <button type="submit">검색</button>
        </form>
    </div>

    <!-- ONE_WAY -->
    <div id="form-ONE_WAY" class="trip-form" style="display:none;">
        <form th:action="@{/air/search}" th:object="${searchRequest}" method="post">
            <h2>편도 (ONE_WAY)</h2>
            <input type="hidden" name="tripType" value="ONE_WAY">

            성인:<input type="number" th:field="*{adultCount}" min="0"><br>
            어린이:<input type="number" th:field="*{youthCount}" min="0"><br>
            유아:<input type="number" th:field="*{infantCount}" min="0"><br>

            좌석 등급:
            <select th:field="*{seatClassType}">
                <option value="">선택</option>
                <option th:value="ECONOMY">이코노미</option>
                <option th:value="BUSINESS">비즈니스</option>
                <option th:value="FIRST">퍼스트</option>
            </select><br>

            직항만:<input type="checkbox" th:field="*{directOnly}"><br>

            <h3>구간</h3>
            <div id="oneway-segments">
                <div>

                    <label>출발 공항:
                        <input type="text" name="segments[0].depart.airportCode">
                    </label>

                    <label>도착 공항:
                        <input type="text" name="segments[0].arrive.airportCode">
                    </label>

                    <label>출발일:
                        <input type="date" name="segments[0].departDate">
                    </label>

                </div>
            </div>
            <button type="submit">검색</button>
        </form>
    </div>

    <!-- MULTI -->
    <div id="form-MULTI" class="trip-form" style="display:none;">
        <form th:action="@{/air/search}" th:object="${searchRequest}" method="post">
            <h2>다구간 (MULTI)</h2>
            <input type="hidden" name="tripType" value="MULTI">

            성인:<input type="number" th:field="*{adultCount}" min="0"><br>
            어린이:<input type="number" th:field="*{youthCount}" min="0"><br>
            유아:<input type="number" th:field="*{infantCount}" min="0"><br>

            좌석 등급:
            <select th:field="*{seatClassType}">
                <option value="">선택</option>
                <option th:value="ECONOMY">이코노미</option>
                <option th:value="BUSINESS">비즈니스</option>
                <option th:value="FIRST">퍼스트</option>
            </select><br>

            직항만:<input type="checkbox" th:field="*{directOnly}"><br>

            <h3>구간</h3>
            <div id="multi-segments">
                <!-- <div class="segment">
                    <label>출발 공항:
                        <input type="text" name="segments[0].depart.airportCode">
                    </label>
                    <label>도착 공항:
                        <input type="text" name="segments[0].arrive.airportCode">
                    </label>
                    <label>출발일:
                        <input type="date" name="segments[0].departDate">
                    </label>
                    <button type="button" class="delete-segment" onclick="deleteSegment(this)">삭제</button>
                </div> -->
            </div>
            <button type="button" onclick="addSegment('multi-segments')">구간 추가</button><br>
            <button type="submit">검색</button>
        </form>
    </div>

    <script>
        let currentFormId = "form-ROUND_TRIP"; // 처음 기본 표시 폼 id
        
        // 페이지 로드시 다구간 기본 1개 추가
        addSegment('multi-segments');

        function addSegment(containerId) {
            const container = document.getElementById(containerId);
            const index = container.children.length;
            const newSegment = document.createElement('div');
            newSegment.className='segment';

            // 출발 공항
            const departLabel = document.createElement('label');
            departLabel.textContent = '출발 공항:';
            const departInput = document.createElement('input');
            departInput.type = 'text';
            departInput.name = `segments[${index}].depart.airportCode`;
            departLabel.appendChild(departInput);

            // 도착 공항
            const arriveLabel = document.createElement('label');
            arriveLabel.textContent = '도착 공항:';
            const arriveInput = document.createElement('input');
            arriveInput.type = 'text';
            arriveInput.name = `segments[${index}].arrive.airportCode`;
            arriveLabel.appendChild(arriveInput);

            // 출발일
            const dateLabel = document.createElement('label');
            dateLabel.textContent = '출발일:';
            const dateInput = document.createElement('input');
            dateInput.type = 'date';
            dateInput.name = `segments[${index}].departDate`;
            dateLabel.appendChild(dateInput);

            // 삭제 버튼
            const deleteBtn = document.createElement('button');
            deleteBtn.type = 'button';
            deleteBtn.textContent = '삭제';
            deleteBtn.onclick = function () { deleteSegment(this); };

            // div에 라벨 추가
            newSegment.appendChild(departLabel);
            newSegment.appendChild(arriveLabel);
            newSegment.appendChild(dateLabel);
            newSegment.appendChild(deleteBtn);

            container.appendChild(newSegment);
        }

        // 왕복 출발-도착지 지정시 귀환편 출발-도착지 자동 입력하게 이벤트 리스너 추가
        document.addEventListener("DOMContentLoaded", () => {
            const depart0 = document.getElementById("seg0-depart");
            const arrive0 = document.getElementById("seg0-arrive");
            const depart1 = document.getElementById("seg1-depart");
            const arrive1 = document.getElementById("seg1-arrive");

            // 첫 번째 출발 → 두 번째 도착
            depart0.addEventListener("input", () => {
                arrive1.value = depart0.value;
            });

            // 첫 번째 도착 → 두 번째 출발
            arrive0.addEventListener("input", () => {
                depart1.value = arrive0.value;
            });
        });

        // 화면에 표시되는 폼 바꾸는 함수
        function showForm(type) {
            // 1. 현재 보이는 폼을 찾아서 값 초기화 후 숨기기
            const prev = document.getElementById(currentFormId);
            if (prev) {
                const formTag = prev.querySelector("form");
                if (formTag) {
                    formTag.reset(); // 모든 입력값 초기화
                }
                prev.style.display = "none"; // 숨기기
            }

            // 2. 새로 선택한 폼 보이기
            const nextId = "form-" + type;
            const next = document.getElementById(nextId);
            if (next) {
                next.style.display = "block";
                currentFormId = nextId;// 현재 폼 id 갱신
            }
        }

        // 삭제 함수
        function deleteSegment(btn) {
            const segment = btn.closest('.segment');
            if (!segment) return;

            const container = segment.parentNode;
            container.removeChild(segment);

            // 삭제 후 재인덱싱
            reindexSegments(container);
        }

        // 재인덱싱 함수
        function reindexSegments(container) {
            const segments = container.querySelectorAll('.segment');
            segments.forEach((seg, idx) => {
                const inputs = seg.querySelectorAll('input');
                inputs.forEach(input => {
                    if (input.name.includes('depart.airportCode')) {
                        input.name = `segments[${idx}].depart.airportCode`;
                    } else if (input.name.includes('arrive.airportCode')) {
                        input.name = `segments[${idx}].arrive.airportCode`;
                    } else if (input.name.includes('departDate')) {
                        input.name = `segments[${idx}].departDate`;
                    }
                });
            });
        }

    </script>

</body>

</html>
