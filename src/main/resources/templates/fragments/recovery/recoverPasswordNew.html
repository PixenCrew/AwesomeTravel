<div>
    <header class="section-header">
        <h1>비밀번호 재설정</h1>
        <div class="right">
            <i class="fas fa-chevron-left"></i>
        </div>
    </header>

    <div class="section-body">
        <!-- 새 암호 -->
        <label>새로운 비밀번호</label>
        <div>
            <input type="password" id="newPassword" />
        </div>

        <!-- 새 암호2 -->
        <label>비밀번호 재입력</label>
        <div>
            <input type="password" id="newPassword2" />
        </div>
        <h4>* 영문 소문자, 숫자, 특수문자 중 최소 2가지를 포함하여 8자 이상 ~ 32자 이하로 설정해주세요.</h4>
        <button onclick="submitRegister()">비밀번호 재설정</button>
    </div>

    <script>
        let isSubmitting = false;

        (function () {

            window.submitRegister = async function () {

                if (isSubmitting) return;
                isSubmitting = true;

                const newPassword = document.getElementById("newPassword").value.trim();
                const newPassword2 = document.getElementById("newPassword2").value.trim();

                if (newPassword !== newPassword2) {
                    alert("새 암호가 일치하지 않습니다.");
                    isSubmitting = false;
                    return;
                }

                // 패스워드 규칙 체크
                if (newPassword.length < 8 || newPassword.length > 32) {
                    alert("비밀번호는 8자 이상 32자 이하로 설정해야 합니다.");
                    isSubmitting = false;
                    return;
                }

                const hasLower = /[a-z]/.test(newPassword);
                const hasDigit = /[0-9]/.test(newPassword);
                const hasSpecial = /[^a-zA-Z0-9]/.test(newPassword);

                // 조합 개수
                const typeCount = [hasLower, hasDigit, hasSpecial].filter(v => v).length;

                if (typeCount < 2) {
                    alert("영문 소문자, 숫자, 특수문자 중 2가지 이상 조합해야 합니다.");
                    isSubmitting = false;
                    return;
                }

                const payload = {
                    newPassword: newPassword,
                    newPassword2: newPassword2
                }

                try {
                    // 서버 요청
                    const response = await fetch("/recovery/password/verified", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) {
                        alert(result.message || "비밀번호 재설정 중 오류가 발생했습니다.");
                        return;
                    }

                    alert('비밀번호 재설정이 완료되었습니다.');
                    window.location.replace('/');

                } catch (err) {
                    console.error(err);
                    alert("비밀번호 재설정 중 오류가 발생했습니다.");
                } finally {
                    isSubmitting = false;
                }
            }
        })();

    </script>
</div>
