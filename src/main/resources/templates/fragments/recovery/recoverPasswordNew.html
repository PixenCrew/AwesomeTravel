<div class="recovery-password-new-container password-reset-container">
    <header class="recovery-header">
        <i class="fas fa-chevron-left back-btn" onclick="backModal()"></i>
        <h1 class="recovery-title">비밀번호 재설정</h1>
        <div class="header-spacer"></div>
    </header>

    <div class="recovery-body">
        <h2 class="recovery-main-title">비밀번호 재설정</h2>

        <div class="password-reset-guide">
            <p class="reset-guide-title">비밀번호 재설정 안내</p>
            <p class="reset-guide-text">회원님께서는 비밀번호를 변경한 지 90일이 경과되었습니다.<br />새로운 비밀번호를 설정하시고 서비스를 더욱 안전하게 이용하세요.</p>
        </div>

        <div class="recovery-form-group">
            <label for="newPassword" class="recovery-label">새로운 비밀번호</label>
            <input type="password" id="newPassword" class="recovery-input" placeholder="비밀번호를 입력하세요." />
            <p class="reset-hint-text">영문 소문자, 숫자, 특수문자 중 2가지 이상을 조합하여 8자 이상 ~ 32자 이하로 설정해주세요.</p>
            <p class="field-error" id="newPasswordError"></p>
        </div>

        <div class="recovery-form-group">
            <label for="newPassword2" class="recovery-label">비밀번호 재입력</label>
            <input type="password" id="newPassword2" class="recovery-input" placeholder="비밀번호를 다시한번 입력해주세요." />
            <p class="field-error" id="newPassword2Error"></p>
        </div>

        <p class="field-error" id="globalResetError" style="margin-top: -8px;"></p>

        <button class="recovery-submit-btn reset-primary-btn" onclick="submitRecoveredPassword()">재설정하기</button>
        <button class="reset-secondary-link" type="button" onclick="window.location.href='/'">다음에 하기</button>
    </div>

    <script>
        (function () {
            let isSubmitting = false;

            const errorEls = {
                newPassword: document.getElementById("newPasswordError"),
                newPassword2: document.getElementById("newPassword2Error"),
                global: document.getElementById("globalResetError")
            };

            const clearErrors = () => {
                Object.values(errorEls).forEach(el => {
                    if (!el) return;
                    el.textContent = "";
                    el.style.display = "none";
                });
            };

            const showError = (field, message) => {
                const el = errorEls[field];
                if (!el) return;
                el.textContent = message;
                el.style.display = "block";
            };

            window.submitRecoveredPassword = async function () {
                if (isSubmitting) return;

                const newPassword = document.getElementById("newPassword").value.trim();
                const newPassword2 = document.getElementById("newPassword2").value.trim();

                clearErrors();

                if (!newPassword) {
                    showError("newPassword", "새로운 비밀번호를 입력해주세요.");
                    return;
                }

                if (!newPassword2) {
                    showError("newPassword2", "비밀번호 재입력을 입력해주세요.");
                    return;
                }

                if (newPassword !== newPassword2) {
                    showError("newPassword2", "비밀번호가 일치하지 않습니다.");
                    return;
                }

                if (newPassword.length < 8 || newPassword.length > 32) {
                    showError("newPassword", "비밀번호는 8자 이상 32자 이하로 설정해야 합니다.");
                    return;
                }

                const hasLower = /[a-z]/.test(newPassword);
                const hasDigit = /[0-9]/.test(newPassword);
                const hasSpecial = /[^a-zA-Z0-9]/.test(newPassword);
                const typeCount = [hasLower, hasDigit, hasSpecial].filter(Boolean).length;

                if (typeCount < 2) {
                    showError("newPassword", "영문 소문자, 숫자, 특수문자 중 2가지 이상 조합해야 합니다.");
                    return;
                }

                isSubmitting = true;

                try {
                    const response = await fetch("/recovery/password/verified", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ newPassword, newPassword2 })
                    });

                    if (!response.ok) {
                        const result = await response.json();
                        showError("global", result.message || "비밀번호 재설정 중 오류가 발생했습니다.");
                        isSubmitting = false;
                        return;
                    }

                    alert('비밀번호 재설정이 완료되었습니다.');
                    window.location.replace('/');

                } catch (err) {
                    console.error(err);
                    showError("global", "비밀번호 재설정 중 오류가 발생했습니다.");
                } finally {
                    isSubmitting = false;
                }
            }
        })();
    </script>
</div>
