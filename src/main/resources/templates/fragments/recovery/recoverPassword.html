<div class="recovery-password-container">
    <header class="recovery-header">
        <i class="fas fa-chevron-left back-btn" onclick="backModal()"></i>
        <h1 class="recovery-title">비밀번호 찾기</h1>
        <div class="header-spacer"></div>
    </header>

    <div class="recovery-body">
        <div class="recovery-instruction">
            <p>가입에 사용한 이메일을 입력해주세요.</p>
            <p>비밀번호 재설정을 위한 안내 메일을 보내드리겠습니다.</p>
        </div>

        <div class="recovery-form-group">
            <label for="email" class="recovery-label">이메일</label>
            <div class="recovery-input-wrapper">
                <input type="email" id="email" class="recovery-input" placeholder="이메일을 입력하세요." />
                <i class="fas fa-check recovery-check-icon" id="emailCheckIcon" style="display: none;"></i>
            </div>
        </div>

        <button id="registerBtn" class="recovery-submit-btn" onclick="submitRecoverIdRequset()">이메일 확인</button>
    </div>

    <script>
        (function () {
            let isRequested = false;
            isSubmitting = false;

            const emailInput = document.getElementById("email");
            const emailCheckIcon = document.getElementById("emailCheckIcon");

            // 이메일 입력 시 체크 아이콘 표시
            emailInput.addEventListener("input", function() {
                const email = this.value.trim();
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (email && emailRegex.test(email)) {
                    emailCheckIcon.style.display = "block";
                } else {
                    emailCheckIcon.style.display = "none";
                }
            });

            window.submitRecoverIdRequset = async function () {

                if (isSubmitting) return;
                isSubmitting = true;

                const email = emailInput.value.trim();

                // 기본 검증
                if (!email) {
                    showErrorToast("이메일을 입력해주세요.");
                    isSubmitting = false;
                    return;
                }

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showErrorToast("올바른 이메일 형식을 입력해주세요.");
                    isSubmitting = false;
                    return;
                }

                const payload = {
                    email: email
                }

                try {
                    // 서버 요청
                    const response = await fetch("/recovery/password", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        showErrorToast(result.message || "본인확인 중 오류가 발생했습니다.");
                        isSubmitting = false;
                        return;
                    }

                    if (result.success) {
                        showSuccessToast("본인확인 이메일이 전송되었습니다.");
                        setTimeout(() => {
                            closeModal();
                        }, 1000);
                    } else {
                        showErrorToast(result.message || "본인확인 중 오류가 발생했습니다.");
                    }

                } catch (err) {
                    console.error(err);
                    showErrorToast("본인확인 중 오류가 발생했습니다.");
                } finally {
                    isSubmitting = false;
                }
            }
        })();

    </script>
</div>
