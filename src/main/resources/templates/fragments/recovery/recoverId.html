<div class="recovery-id-container">
    <header class="recovery-id-header">
        <i class="fas fa-chevron-left back-btn" onclick="backModal()"></i>
        <h1 class="recovery-id-title">아이디 찾기</h1>
        <div class="header-spacer" style="width: 26px;"></div>
    </header>

    <div class="recovery-id-body">
        <h2 class="recovery-id-main-title">아이디 찾기</h2>
        <div class="recovery-id-instruction">
            <p style="margin: 0;">회원정보에 등록된 휴대폰번호 인증을 통해</p>
            <p style="margin: 0;">아이디를 찾을 수 있습니다.</p>
        </div>

        <div class="recovery-id-form">
            <div class="recovery-id-input-group">
                <label for="number" class="recovery-label">휴대폰 번호</label>
                <div class="recovery-id-input-wrapper" style="display: flex; gap: 8px; align-items: flex-start;">
                    <input type="text" id="number" class="recovery-input" placeholder="휴대폰 번호를 입력해주세요" style="flex: 1;" />
                    <div style="display: flex; gap: 8px; flex-shrink: 0;">
                        <button id="requestBtn" class="recovery-btn-black" onclick="requestCode()">인증 요청</button>
                        <button id="resendBtn" class="recovery-btn-gray" onclick="requestCode()" style="display: none;">재전송</button>
                    </div>
                </div>
            </div>

            <div class="recovery-id-input-group">
                <label for="verifyCode" class="recovery-label">인증번호</label>
                <div class="recovery-id-input-wrapper" style="display: flex; gap: 8px; align-items: flex-start;">
                    <input type="text" id="verifyCode" class="recovery-input" placeholder="인증번호를 입력하세요." style="flex: 1;" />
                    <button id="checkBtn" class="recovery-btn-black" onclick="checkCode()" style="flex-shrink: 0;">확인하기</button>
                </div>
            </div>
        </div>

        <div id="errorMsg" class="recovery-error-msg"></div>

        <button id="registerBtn" class="recovery-id-submit-btn" onclick="submitRecoverId()" disabled>아이디 찾기</button>
    </div>

    <script>
        (function () {
            let isRequested = false;
            isSubmitting = false;

            window.submitRecoverId = async function () {

                if (isSubmitting) return;
                isSubmitting = true;

                const number = document.getElementById("number").value.trim();
                const verifyCode = document.getElementById("verifyCode").value.trim();

                // 기본 검증
                if (!number || !verifyCode) {
                    alert("모든 값을 입력해주세요.");
                    return;
                }

                const payload = {
                    number: number,
                    verifyCode: verifyCode
                }

                try {
                    // 서버 요청
                    const response = await fetch("/recovery/id", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) {
                        alert("가입 중 오류가 발생했습니다.");
                        return;
                    }

                    addModal('/recovery/id/result', true);

                } catch (err) {
                    console.error(err);
                    alert("가입 중 오류가 발생했습니다.");
                } finally {
                    isSubmitting = false;
                }
            }

            window.requestCode = async function () {

                const number = document.getElementById("number").value.trim();
                const requestBtn = document.getElementById("requestBtn");
                const resendBtn = document.getElementById("resendBtn");

                if (!number) {
                    alert("휴대폰 번호를 입력해주세요.");
                    return;
                }

                // 중복 클릭 방지
                if (requestBtn.dataset.loading === "true") return;
                requestBtn.dataset.loading = "true";
                requestBtn.textContent = "요청 중...";

                try {
                    // 서버 요청 (예시)
                    const response = await fetch("/register/phone", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ number })
                    });

                    if (!response.ok) throw new Error("인증 요청 실패");

                    const result = await response.json();

                    if (result.success) {
                        alert("인증번호가 발송되었습니다.");

                        // 버튼을 재전송 모드로 변경
                        requestBtn.style.display = "none";
                        resendBtn.style.display = "block";
                        isRequested = true;

                    } else {
                        alert(result.message || "인증 요청 실패");
                    }

                } catch (err) {
                    console.error(err);
                    alert("인증 요청 중 오류가 발생했습니다.");

                } finally {
                    requestBtn.dataset.loading = "false";
                    if (!isRequested) {
                        requestBtn.textContent = "인증 요청";
                    }
                }
            };

            window.checkCode = async function () {

                const verifyCode = document.getElementById("verifyCode").value.trim();
                const number = document.getElementById("number").value.trim(); // 기존 입력값
                const errorMsg = document.getElementById("errorMsg");

                errorMsg.textContent = "";

                if (!number) {
                    errorMsg.textContent = "휴대폰 번호를 먼저 입력해주세요.";
                    return;
                }

                if (!verifyCode) {
                    errorMsg.textContent = "인증번호를 입력해주세요.";
                    return;
                }

                try {
                    // 서버 검증 요청
                    const response = await fetch("/register/phone/check", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            verifyCode, number
                        })
                    });

                    if (!response.ok) throw new Error("서버 검증 오류");

                    const result = await response.json();

                    if (response.ok && result.success) {
                        alert("인증이 완료되었습니다.");

                        // 인증 성공 후 버튼 비활성화
                        document.getElementById("number").disabled = true;
                        document.getElementById("verifyCode").disabled = true;
                        document.getElementById("requestBtn").disabled = true;
                        document.getElementById("checkBtn").disabled = true;
                        document.getElementById("registerBtn").disabled = false;

                        return;
                    }

                    errorMsg.textContent = result.message || "인증번호가 올바르지 않습니다.";

                } catch (err) {
                    console.error(err);
                    errorMsg.textContent = "인증 처리 중 오류가 발생했습니다.";
                }
            };

        })();

    </script>
</div>
