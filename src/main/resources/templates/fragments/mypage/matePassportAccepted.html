<div class="mate-accepted-container">
    <style>
        .mate-accepted-container {
            width: 100%;
            min-height: calc(100vh - 60px);
            padding-bottom: 60px;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .mate-accepted-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 16px;
        }

        .mate-accepted-message {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .mate-accepted-btn {
            width: 100%;
            max-width: 400px;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #333;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .mate-accepted-btn:hover {
            background: #555;
        }
    </style>

    <h1 class="mate-accepted-title">여행메이트 등록 완료</h1>
    <p class="mate-accepted-message" th:text="${username} + '님의 여행메이트에 등록이 완료되었습니다.'">신예은님의 여행메이트에 등록이 완료되었습니다.</p>
    <button class="mate-accepted-btn" onclick="window.location.href = '/'">닫기</button>
</div>
