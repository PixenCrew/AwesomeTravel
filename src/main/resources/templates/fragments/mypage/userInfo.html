<div>
    <header class="section-header">
        <h1>계정 설정</h1>
        <div class="right">
            <i class="fas fa-chevron-left" onclick="prevSection()"></i>
        </div>
    </header>

    <div class="section-body">

        <!-- provider -->
        <label class="input-label">제공자</label>
        <div class="phone-box">
            <input type="text" id="provider" th:value="${provider}" readonly />
        </div>

        <!-- 이름 -->
        <label class="input-label">이름</label>
        <div class="phone-box">
            <input type="text" id="name" th:value="${name}" />
        </div>

        <!-- 아이디 (이메일) -->
        <label class="input-label">아이디</label>
        <div class="phone-box">
            <input type="text" id="email" th:value="${email}" readonly />
        </div>

        <!-- 비밀번호 -->
        <label class="input-label">비밀번호</label>
        <div class="phone-box">
            <input type="text" value="******" disabled />
            <button id="passwordChangeBtn" class="btn-black" onclick="addModal('/mypage/userInfo/password')">변경하기</button>
        </div>

        <!-- 휴대폰 번호 -->
        <label class="input-label">휴대폰 번호</label>
        <div class="phone-box">
            <input type="text" id="number" th:value="${number}" placeholder="휴대폰 번호를 입력해주세요" oninput="numberVerified = false;numberChanged=true" />
            <button id="requestBtn" class="btn-black" onclick="requestCode()">인증 요청</button>
        </div>

        <!-- 인증번호 -->
        <label class="input-label">인증번호</label>
        <div class="verify-box">
            <input type="text" id="verifyCode" placeholder="인증번호를 입력하세요." />
            <button id="checkBtn" class="btn-black" onclick="checkCode()">확인하기</button>
        </div>
        <h4 id="errorMsg"></h4>

        <button id="registerBtn" class="btn-primary" onclick="submitRegister()">수정완료</button>
    </div>

    <script th:inline="javascript">
        let isRequested = false;
        let isSubmitting = false;

        const originalNumber = /*[[${number}]]*/'';
        let numberChanged = false;
        let numberVerified = false;

        (function () {

            window.submitRegister = async function () {

                if (isSubmitting) return;
                isSubmitting = true;

                const email = document.getElementById("email").value.trim();
                const name = document.getElementById("name").value.trim();
                const number = document.getElementById("number").value.trim();
                const verifyCode = document.getElementById("verifyCode").value.trim();

                if (originalNumber !== number) {
                    // 번호가 다르면 인증 필요
                    if (!numberVerified) {
                        alert("전화번호 인증을 진행해주세요.");
                        return;
                    }
                }

                const payload = {
                    email: email,
                    name: name,
                    number: number,
                    verifyCode: verifyCode
                }

                try {
                    // 서버 요청
                    const response = await fetch("/mypage/userInfo", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) {
                        alert("회원정보 수정 중 오류가 발생했습니다.");
                        return;
                    }

                    alert('회원정보 수정이 완료되었습니다.');
                    closeModal();
                    location.reload();

                } catch (err) {
                    console.error(err);
                    alert("회원정보 수정 중 오류가 발생했습니다.");
                } finally {
                    isSubmitting = false;
                }
            }

            window.requestCode = async function () {

                const number = document.getElementById("number").value.trim();
                const btn = document.getElementById("requestBtn");

                if (!number) {
                    alert("휴대폰 번호를 입력해주세요.");
                    return;
                }

                // 중복 클릭 방지
                if (btn.dataset.loading === "true") return;
                btn.disabled = true;
                btn.textContent = "요청 중...";

                try {
                    // 서버 요청 (예시)
                    const response = await fetch("/mypage/userInfo/phone", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ number })
                    });

                    if (!response.ok) throw new Error("인증 요청 실패");

                    const result = await response.json();

                    if (result.success) {
                        alert("인증번호가 발송되었습니다.");

                        // 버튼을 재전송 모드로 변경
                        btn.textContent = "재전송";
                        isRequested = true;

                    } else {
                        alert(result.message || "인증 요청 실패");
                    }

                } catch (err) {
                    console.error(err);
                    alert("인증 요청 중 오류가 발생했습니다.");

                } finally {
                    btn.disabled = false;
                    if (!isRequested) btn.textContent = "인증 요청";
                }
            };

            window.checkCode = async function () {

                const verifyCode = document.getElementById("verifyCode").value.trim();
                const number = document.getElementById("number").value.trim(); // 기존 입력값
                const errorMsg = document.getElementById("errorMsg");

                errorMsg.textContent = "";

                if (!number) {
                    errorMsg.textContent = "휴대폰 번호를 먼저 입력해주세요.";
                    return;
                }

                if (!verifyCode) {
                    errorMsg.textContent = "인증번호를 입력해주세요.";
                    return;
                }

                try {
                    // 서버 검증 요청
                    const response = await fetch("/mypage/userInfo/phone/check", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            verifyCode, number
                        })
                    });

                    if (!response.ok) throw new Error("서버 검증 오류");

                    const result = await response.json();

                    if (response.ok && result.success) {
                        alert("인증이 완료되었습니다.");
                        numberVerified = true;

                        // 인증 성공 후 버튼 비활성화
                        document.getElementById("number").disabled = true;
                        document.getElementById("verifyCode").disabled = true;
                        document.getElementById("requestBtn").disabled = true;
                        document.getElementById("checkBtn").disabled = true;

                        return;
                    }

                    errorMsg.textContent = result.message || "인증번호가 올바르지 않습니다.";

                } catch (err) {
                    console.error(err);
                    errorMsg.textContent = "인증 처리 중 오류가 발생했습니다.";
                }
            };

        })();

    </script>
</div>
