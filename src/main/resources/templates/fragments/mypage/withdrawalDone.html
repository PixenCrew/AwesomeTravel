<div class="withdrawal-done-container">
    <style>
        .withdrawal-done-container {
            width: 100%;
            min-height: calc(100vh - 60px);
            padding-bottom: 60px;
            background: white;
        }

        .withdrawal-done-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }

        .withdrawal-done-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .withdrawal-done-body {
            padding: 60px 20px;
            padding-bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .withdrawal-done-status {
            font-size: 18px;
            font-weight: 600;
            color: #999;
            margin-bottom: 16px;
        }

        .withdrawal-done-message {
            font-size: 16px;
            color: #333;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .withdrawal-done-thanks {
            font-size: 16px;
            color: #333;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .withdrawal-done-home-btn {
            width: 100%;
            max-width: 400px;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #333;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .withdrawal-done-home-btn:hover {
            background: #555;
        }
    </style>

    <header class="withdrawal-done-header">
        <h1 class="withdrawal-done-title">회원탈퇴</h1>
    </header>

    <div class="withdrawal-done-body">
        <p class="withdrawal-done-status">탈퇴 완료</p>
        <p class="withdrawal-done-message">회원탈퇴가 완료되었습니다.</p>
        <p class="withdrawal-done-thanks">그동안 딱좋은여행을 이용해주셔서 감사합니다.</p>
        <button class="withdrawal-done-home-btn" onclick="window.location.replace('/')">홈으로</button>
    </div>
</div>
