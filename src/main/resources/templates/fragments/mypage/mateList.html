<div class="mate-list-container">
    <style>
        .mate-list-container {
            width: 100%;
            min-height: calc(100vh - 60px);
            padding-bottom: 60px;
            background: white;
        }

        .mate-list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }

        .mate-list-back {
            font-size: 18px;
            color: #999;
            cursor: pointer;
        }

        .mate-list-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            flex: 1;
            text-align: center;
        }

        .mate-list-spacer {
            width: 26px;
        }

        .mate-list-body {
            padding: 16px;
            padding-bottom: 100px;
        }

        .mate-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .mate-list-item:hover {
            background: #f9f9f9;
        }

        .mate-list-item:active {
            background: #f0f0f0;
        }

        .mate-list-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .mate-list-item-number {
            font-size: 16px;
            font-weight: 500;
            color: #333;
        }

        .mate-list-item-name {
            font-size: 16px;
            color: #333;
        }

        .mate-list-item-status {
            font-size: 14px;
            color: #999;
            margin-left: 8px;
        }

        .mate-list-item-arrow {
            font-size: 14px;
            color: #999;
        }

        .mate-list-add-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #333;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 24px;
        }

        .mate-list-add-btn:hover {
            background: #555;
        }
    </style>

    <header class="mate-list-header">
        <i class="fas fa-chevron-left mate-list-back" onclick="backModal()"></i>
        <h1 class="mate-list-title">내 여행메이트</h1>
        <div class="mate-list-spacer"></div>
    </header>

    <div class="mate-list-body">
        <div th:if="${#lists.isEmpty(mateList)}" style="text-align: center; padding: 60px 20px; color: #999;">
            등록된 여행메이트가 없습니다.
        </div>
        <div th:each="matePassport, iterStat : ${mateList}" class="mate-list-item" th:onclick="'addModal(\'/mypage/matePassport/' + ${matePassport.id} + '\')'">
            <div class="mate-list-item-left">
                <span class="mate-list-item-number" th:text="${iterStat.count} + '.'">1.</span>
                <span class="mate-list-item-name" th:text="${matePassport.passport.lastNameKor + matePassport.passport.firstNameKor}">김혜자</span>
                <span class="mate-list-item-status" th:if="${matePassport.approvedAt == null}">(대기중)</span>
            </div>
            <i class="fas fa-chevron-right mate-list-item-arrow"></i>
        </div>

        <button class="mate-list-add-btn" onclick="addModal('/mypage/matePassport/new')">여행메이트 추가</button>
    </div>
</div>
