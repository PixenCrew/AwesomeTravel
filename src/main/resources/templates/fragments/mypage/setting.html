<div class="setting-container">
    <style>
        .setting-container {
            width: 100%;
            min-height: calc(100vh - 60px);
            padding-bottom: 60px;
            background: white;
        }

        .setting-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
            min-height: 48px;
        }

        .setting-back {
            font-size: 18px;
            color: #999;
            cursor: pointer;
            padding: 4px;
        }

        .setting-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            flex: 1;
            text-align: center;
        }

        .setting-spacer {
            width: 24px;
        }

        .setting-body {
            padding: 24px 16px;
            padding-bottom: 100px;
        }

        .setting-profile-section {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e0e0e0;
        }

        .setting-profile-image {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            background: #f5f5f5;
            flex-shrink: 0;
            border: 2px solid #e0e0e0;
        }

        .setting-profile-info {
            flex: 1;
        }

        .setting-profile-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .setting-profile-email-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .setting-email-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            flex-shrink: 0;
        }

        .setting-profile-email {
            font-size: 14px;
            color: #666;
        }

        .setting-profile-grade {
            font-size: 13px;
            color: #999;
        }

        .setting-menu-section {
            margin-top: 24px;
        }

        .setting-menu-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }

        .setting-menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .setting-menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .setting-menu-item:hover {
            background: #f9f9f9;
        }

        .setting-menu-item:active {
            background: #f0f0f0;
        }

        .setting-menu-text {
            font-size: 16px;
            color: #333;
        }

        .setting-menu-arrow {
            font-size: 14px;
            color: #999;
        }
    </style>

    <header class="setting-header">
        <i class="fas fa-chevron-left setting-back" onclick="prevSection()"></i>
        <h1 class="setting-title">설정</h1>
        <div class="setting-spacer"></div>
    </header>

    <div class="setting-body">
        <div class="setting-profile-section">
            <img class="setting-profile-image" 
                 th:src="${currentUser?.profileImage != null and !currentUser.profileImage.isEmpty() ? currentUser.profileImage : '/images/profileDefault.png'}" 
                 alt="프로필 이미지"
                 onerror="this.src='/images/profileDefault.png'">
            <div class="setting-profile-info">
                <h2 class="setting-profile-name" th:text="${currentUser?.name}">신예은</h2>
                <div class="setting-profile-email-wrapper">
                    <span class="setting-email-icon" 
                          th:text="${currentUser?.provider == T(renewal.common.entity.User.UserProvider).NAVER ? 'N' : (currentUser?.provider == T(renewal.common.entity.User.UserProvider).GOOGLE ? 'G' : 'L')}"
                          th:style="${currentUser?.provider == T(renewal.common.entity.User.UserProvider).NAVER ? 'background: #03c75a;' : (currentUser?.provider == T(renewal.common.entity.User.UserProvider).GOOGLE ? 'background: #4285F4;' : 'background: #666;')}">N</span>
                    <span class="setting-profile-email" th:text="${currentUser?.email}">shin@god.com</span>
                </div>
                <p class="setting-profile-grade" th:text="${currentUser?.grade ?: '일반등급'}">일반등급</p>
            </div>
        </div>

        <div class="setting-menu-section">
            <h2 class="setting-menu-title">메뉴</h2>
            <ul class="setting-menu-list">
                <li class="setting-menu-item" onclick="addModal('/mypage/accountSetting', true)">
                    <span class="setting-menu-text">계정 설정</span>
                    <i class="fas fa-chevron-right setting-menu-arrow"></i>
                </li>
                <li class="setting-menu-item" onclick="addModal('/mypage/myPassport', true)">
                    <span class="setting-menu-text">내 여권정보</span>
                    <i class="fas fa-chevron-right setting-menu-arrow"></i>
                </li>
                <li class="setting-menu-item" onclick="addModal('/mypage/mateList', true)">
                    <span class="setting-menu-text">여행메이트 정보</span>
                    <i class="fas fa-chevron-right setting-menu-arrow"></i>
                </li>
                <li class="setting-menu-item" onclick="addModal('/terms/service', true)">
                    <span class="setting-menu-text">이용약관</span>
                    <i class="fas fa-chevron-right setting-menu-arrow"></i>
                </li>
                <li class="setting-menu-item" onclick="addModal('/terms/travel?type=domestic', true)">
                    <span class="setting-menu-text">여행약관</span>
                    <i class="fas fa-chevron-right setting-menu-arrow"></i>
                </li>
                <li class="setting-menu-item" onclick="addModal('/terms/privacy', true)">
                    <span class="setting-menu-text">개인정보처리방침</span>
                    <i class="fas fa-chevron-right setting-menu-arrow"></i>
                </li>
            </ul>
        </div>
    </div>
</div>
