<div>
    <header class="section-header">
        <h1>설정</h1>
        <div class="right">
            <i class="fas fa-chevron-left" onclick="prevSection()"></i>
        </div>
    </header>

    <div class="section-body">
        <div>
            <img th:src="${currentUser?.profileImage != null ? currentUser.profileImage : '/images/profileDefault.png'}">

            <div>
                <h2 th:text="${currentUser?.name}">신예은</h2>
                <p th:text="${currentUser?.email}">shin@god.com</p>
                <p th:text="${currentUser?.grade}">일반등급</p>
            </div>

            <ul>
                <li onclick="openModal('/mypage/userInfo')">계정 설정 <span>›</span></li>
                <li onclick="fetchSection('/mypage/noticeSetting')">알림 설정<span>›</span></li>
                <li onclick="openModal('/mypage/myPassport')">내 여권정보 <span>›</span></li>
                <li onclick="fetchSection('/mypage/mateList')">여행메이트 정보<span>›</span></li>
            </ul>

        </div>
    </div>
</div>
