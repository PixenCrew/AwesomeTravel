<div class="mate-select-container">
    <style>
        .mate-select-container {
            width: 100%;
            min-height: calc(100vh - 60px);
            padding-bottom: 60px;
            background: white;
        }

        .mate-select-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }

        .mate-select-back {
            font-size: 18px;
            color: #999;
            cursor: pointer;
            padding: 4px;
        }

        .mate-select-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            flex: 1;
            text-align: center;
        }

        .mate-select-spacer {
            width: 26px;
        }

        .mate-select-body {
            padding: 16px;
        }

        .mate-select-section {
            margin-bottom: 24px;
        }

        .mate-select-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mate-select-item:hover {
            background: #f9f9f9;
            border-color: #ccc;
        }

        .mate-select-item:active {
            background: #f0f0f0;
        }

        .mate-select-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .mate-select-item-name {
            font-size: 16px;
            font-weight: 500;
            color: #333;
        }

        .mate-select-item-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mate-select-status-icon {
            font-size: 18px;
        }

        .mate-select-status-icon.approved {
            color: #4caf50;
        }

        .mate-select-status-icon.pending {
            color: #ff9800;
        }

        .mate-select-arrow {
            font-size: 14px;
            color: #999;
        }

        .mate-select-divider {
            height: 1px;
            background: #e0e0e0;
            margin: 24px 0;
        }

        .mate-select-add-btn {
            width: 100%;
            padding: 16px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            color: #333;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .mate-select-add-btn:hover {
            background: #f9f9f9;
            border-color: #ccc;
        }

        .mate-select-add-btn:active {
            background: #f0f0f0;
        }

        .mate-select-add-arrow {
            font-size: 14px;
            color: #999;
        }
    </style>

    <header class="mate-select-header">
        <i class="fas fa-chevron-left mate-select-back" onclick="backModal()"></i>
        <h1 class="mate-select-title">여행메이트 선택</h1>
        <div class="mate-select-spacer"></div>
    </header>

    <div class="mate-select-body">
        <div class="mate-select-section" th:if="${myPassport != null}">
            <div class="mate-select-item" onclick="selectMyPassport()">
                <div class="mate-select-item-left">
                    <span class="mate-select-item-name">내 여권 정보 입력</span>
                </div>
                <i class="fas fa-chevron-right mate-select-arrow"></i>
            </div>
        </div>

        <div class="mate-select-divider" th:if="${myPassport != null and !#lists.isEmpty(mateList)}"></div>

        <div class="mate-select-section" th:if="${!#lists.isEmpty(mateList)}">
            <div class="mate-select-item" th:each="mate : ${mateList}" th:onclick="|selectMate(${mate.id})|">
                <div class="mate-select-item-left">
                    <span class="mate-select-item-name" th:text="${mate.passport.lastName + mate.passport.firstName + '님'}">홍길동님</span>
                </div>
                <div class="mate-select-item-right">
                    <i class="fas fa-check-circle mate-select-status-icon approved"
                        th:if="${mate.approvedAt != null}"></i>
                    <i class="fas fa-hourglass-half mate-select-status-icon pending"
                        th:if="${mate.approvedAt == null}"></i>
                    <i class="fas fa-chevron-right mate-select-arrow"></i>
                </div>
            </div>
        </div>

        <div class="mate-select-divider" th:if="${!#lists.isEmpty(mateList)}"></div>

        <div class="mate-select-section">
            <button class="mate-select-add-btn" onclick="addModal('/mypage/matePassport/new')">
                <span>여행메이트 추가</span>
                <i class="fas fa-chevron-right mate-select-add-arrow"></i>
            </button>
        </div>
    </div>

    <script>
        function selectMate(id) {
            console.log('selectMate 호출:', id);
            // 선택된 mate ID 를 전역 변수에 저장 (최상위 창에)
            if (window.top) {
                window.top.selectedMateId = id;
                console.log('전역 변수 설정 (window.top):', id);
            } else {
                window.selectedMateId = id;
                console.log('전역 변수 설정 (window):', id);
            }
            
            // window.top을 사용하여 최상위 창에 메시지 전달
            try {
                if (window.top && window.top !== window) {
                    window.top.postMessage({ type: "mateSelected", id: id }, "*");
                    console.log('postMessage 전송 (window.top):', id);
                } else {
                    // 같은 창인 경우 직접 이벤트 발생
                    window.dispatchEvent(new CustomEvent('mateSelected', { detail: { id: id } }));
                    console.log('커스텀 이벤트 발생:', id);
                }
            } catch (e) {
                console.error('메시지 전송 실패:', e);
            }
            
            // 모달 닫기
            setTimeout(() => {
                backModal();
            }, 50);
        }

        function selectMyPassport() {
            console.log('selectMyPassport 호출');
            // 내 여권 정보 선택 (id: 0)
            if (window.top) {
                window.top.selectedMateId = 0;
                console.log('전역 변수 설정 (window.top): 0');
            } else {
                window.selectedMateId = 0;
                console.log('전역 변수 설정 (window): 0');
            }
            
            try {
                if (window.top && window.top !== window) {
                    window.top.postMessage({ type: "mateSelected", id: 0 }, "*");
                    console.log('postMessage 전송 (window.top): 0');
                } else {
                    window.dispatchEvent(new CustomEvent('mateSelected', { detail: { id: 0 } }));
                    console.log('커스텀 이벤트 발생: 0');
                }
            } catch (e) {
                console.error('메시지 전송 실패:', e);
            }
            
            setTimeout(() => {
                backModal();
            }, 50);
        }
    </script>
</div>
