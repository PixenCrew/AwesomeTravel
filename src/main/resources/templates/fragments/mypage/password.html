<div class="password-change-container">
    <style>
        .password-change-container {
            width: 100%;
            min-height: calc(100vh - 60px);
            padding-bottom: 60px;
            background: white;
        }

        .password-change-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }

        .password-change-back {
            font-size: 18px;
            color: #999;
            cursor: pointer;
            padding: 4px;
        }

        .password-change-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            flex: 1;
            text-align: center;
        }

        .password-change-spacer {
            width: 26px;
        }

        .password-change-body {
            padding: 16px;
            padding-bottom: 100px;
        }

        .password-form-group {
            margin-bottom: 24px;
        }

        .password-form-label {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }

        .password-form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            color: #333;
            background: white;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .password-form-input:focus {
            border-color: #1976d2;
        }

        .password-form-input::placeholder {
            color: #999;
        }

        .password-guide {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
            line-height: 1.5;
        }

        .password-guide-item {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
        }

        .password-guide-item::before {
            content: "•";
            color: #999;
        }

        .field-error {
            font-size: 12px;
            color: #d32f2f;
            margin-top: 6px;
            display: none;
        }

        .field-error.show {
            display: block;
        }

        .password-action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 32px;
        }

        .password-submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #333;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .password-submit-btn:hover:not(:disabled) {
            background: #555;
        }

        .password-submit-btn:disabled {
            background: #e0e0e0;
            color: #999;
            cursor: not-allowed;
        }

        .password-cancel-btn {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            color: #666;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .password-cancel-btn:hover {
            background: #f5f5f5;
            border-color: #d0d0d0;
        }
    </style>

    <header class="password-change-header">
        <i class="fas fa-chevron-left password-change-back" onclick="backModal()"></i>
        <h1 class="password-change-title">비밀번호 변경</h1>
        <div class="password-change-spacer"></div>
    </header>

    <div class="password-change-body">
        <!-- 현재 비밀번호 -->
        <div class="password-form-group">
            <label class="password-form-label" for="originalPassword">현재 비밀번호</label>
            <input 
                type="password" 
                id="originalPassword" 
                class="password-form-input" 
                placeholder="현재 비밀번호를 입력하세요" 
            />
            <p class="field-error" id="originalPasswordError"></p>
        </div>

        <!-- 새로운 비밀번호 -->
        <div class="password-form-group">
            <label class="password-form-label" for="newPassword">새로운 비밀번호</label>
            <input 
                type="password" 
                id="newPassword" 
                class="password-form-input" 
                placeholder="새로운 비밀번호를 입력하세요" 
            />
            <div class="password-guide">
                <div class="password-guide-item">8자 이상 32자 이하</div>
                <div class="password-guide-item">영문 소문자, 숫자, 특수문자 중 2가지 이상 조합</div>
            </div>
            <p class="field-error" id="newPasswordError"></p>
        </div>

        <!-- 비밀번호 재입력 -->
        <div class="password-form-group">
            <label class="password-form-label" for="newPassword2">비밀번호 재입력</label>
            <input 
                type="password" 
                id="newPassword2" 
                class="password-form-input" 
                placeholder="비밀번호를 다시 입력하세요" 
            />
            <p class="field-error" id="newPassword2Error"></p>
        </div>

        <!-- 액션 버튼 -->
        <div class="password-action-buttons">
            <button class="password-submit-btn" onclick="submitPasswordRegister()">수정완료</button>
            <button class="password-cancel-btn" onclick="backModal()">취소</button>
        </div>
    </div>

    <script>
        (function () {
            // 에러 메시지 표시 함수
            function showError(fieldId, message) {
                const errorEl = document.getElementById(fieldId + 'Error');
                if (errorEl) {
                    errorEl.textContent = message;
                    errorEl.classList.add('show');
                }
            }

            // 에러 메시지 숨기기 함수
            function hideError(fieldId) {
                const errorEl = document.getElementById(fieldId + 'Error');
                if (errorEl) {
                    errorEl.textContent = '';
                    errorEl.classList.remove('show');
                }
            }

            // 모든 에러 숨기기
            function hideAllErrors() {
                hideError('originalPassword');
                hideError('newPassword');
                hideError('newPassword2');
            }

            // 입력 필드 이벤트 리스너
            document.getElementById('originalPassword')?.addEventListener('input', function() {
                hideError('originalPassword');
            });

            document.getElementById('newPassword')?.addEventListener('input', function() {
                hideError('newPassword');
            });

            document.getElementById('newPassword2')?.addEventListener('input', function() {
                hideError('newPassword2');
            });

            window.submitPasswordRegister = async function () {
                if (typeof isSubmitting !== 'undefined' && isSubmitting) return;
                if (typeof isSubmitting === 'undefined') {
                    window.isSubmitting = false;
                }
                window.isSubmitting = true;

                hideAllErrors();

                const originalPassword = document.getElementById("originalPassword").value.trim();
                const newPassword = document.getElementById("newPassword").value.trim();
                const newPassword2 = document.getElementById("newPassword2").value.trim();

                let hasError = false;

                // 현재 비밀번호 검증
                if (!originalPassword) {
                    showError('originalPassword', '현재 비밀번호를 입력해주세요.');
                    hasError = true;
                }

                // 새 비밀번호 검증
                if (!newPassword) {
                    showError('newPassword', '새로운 비밀번호를 입력해주세요.');
                    hasError = true;
                } else if (newPassword.length < 8 || newPassword.length > 32) {
                    showError('newPassword', '비밀번호는 8자 이상 32자 이하로 설정해야 합니다.');
                    hasError = true;
                } else {
                    const hasLower = /[a-z]/.test(newPassword);
                    const hasDigit = /[0-9]/.test(newPassword);
                    const hasSpecial = /[^a-zA-Z0-9]/.test(newPassword);
                    const typeCount = [hasLower, hasDigit, hasSpecial].filter(v => v).length;

                    if (typeCount < 2) {
                        showError('newPassword', '영문 소문자, 숫자, 특수문자 중 2가지 이상 조합해야 합니다.');
                        hasError = true;
                    }
                }

                // 비밀번호 재입력 검증
                if (!newPassword2) {
                    showError('newPassword2', '비밀번호를 다시 입력해주세요.');
                    hasError = true;
                } else if (newPassword !== newPassword2) {
                    showError('newPassword2', '비밀번호가 일치하지 않습니다.');
                    hasError = true;
                }

                if (hasError) {
                    window.isSubmitting = false;
                    return;
                }

                const payload = {
                    originalPassword: originalPassword,
                    newPassword: newPassword,
                    newPassword2: newPassword2
                };

                try {
                    const response = await fetch("/mypage/userInfo/password", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        if (result.message) {
                            if (result.message.includes('현재 비밀번호') || result.message.includes('기존')) {
                                showError('originalPassword', result.message);
                            } else {
                                alert(result.message);
                            }
                        } else {
                            alert("비밀번호 수정 중 오류가 발생했습니다.");
                        }
                        window.isSubmitting = false;
                        return;
                    }

                    if (typeof showSuccessToast === 'function') {
                        showSuccessToast('비밀번호 수정이 완료되었습니다.');
                    } else {
                        alert('비밀번호 수정이 완료되었습니다.');
                    }
                    
                    if (typeof closeModal === 'function') {
                        closeModal();
                    } else if (typeof backModal === 'function') {
                        backModal();
                    }
                    
                } catch (err) {
                    console.error(err);
                    alert("비밀번호 수정 중 오류가 발생했습니다.");
                } finally {
                    window.isSubmitting = false;
                }
            };
        })();
    </script>
</div>
