<div class="notice-list-container">
    <style>
        .notice-list-container {
            width: 100%;
            min-height: calc(100vh - 60px);
            padding-bottom: 60px;
            background: white;
        }

        .notice-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }

        .notice-back {
            font-size: 18px;
            color: #999;
            cursor: pointer;
        }

        .notice-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            flex: 1;
            text-align: center;
        }

        .notice-spacer {
            width: 26px;
        }

        .notice-body {
            padding: 16px;
            padding-bottom: 100px;
        }

        .notice-section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }

        .notice-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 16px 0;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
        }

        .notice-item:last-child {
            border-bottom: none;
        }

        .notice-item-left {
            flex: 1;
            min-width: 0;
        }

        .notice-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .notice-item-title {
            font-size: 14px;
            color: #333;
            line-height: 1.4;
        }

        .notice-item-date {
            font-size: 13px;
            color: #666;
            margin-left: 16px;
            white-space: nowrap;
        }

        .notice-empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
    </style>

    <header class="notice-header">
        <i class="fas fa-chevron-left notice-back" onclick="prevSection()"></i>
        <h1 class="notice-title">공지사항</h1>
        <div class="notice-spacer"></div>
    </header>

    <div class="notice-body">
        <h2 class="notice-section-title">공지사항 목록</h2>

        <div th:each="notice : ${notices}" class="notice-item" th:onclick="'fetchSection(\'/notice/' + ${notice.id} + '\')'">
            <div class="notice-item-left">
                <div class="notice-label">공지</div>
                <div class="notice-item-title" th:text="${notice.title}">봄 카드 할인 이벤트 당첨자 발표</div>
            </div>
            <div class="notice-item-date" th:attr="data-date=${#temporals.format(notice.createdAt, 'yyyy-MM-dd HH:mm:ss')}">3일 전</div>
        </div>

        <div th:if="${#lists.isEmpty(notices)}" class="notice-empty">
            공지사항이 없습니다.
        </div>
    </div>

    <script>
        // 날짜를 "N일 전" 형식으로 변환
        function formatDateAgo(dateString) {
            if (!dateString) return '';
            
            // "yyyy-MM-dd HH:mm:ss" 형식을 파싱 (로컬 타임존으로 해석)
            const parts = dateString.split(' ');
            const dateParts = parts[0].split('-');
            const timeParts = parts[1] ? parts[1].split(':') : ['0', '0', '0'];
            
            const year = parseInt(dateParts[0]);
            const month = parseInt(dateParts[1]) - 1; // JavaScript month는 0부터 시작
            const day = parseInt(dateParts[2]);
            const hour = parseInt(timeParts[0]);
            const minute = parseInt(timeParts[1]);
            const second = parseInt(timeParts[2] || '0');
            
            const date = new Date(year, month, day, hour, minute, second);
            const now = new Date();
            const diff = now - date;
            
            // 음수 차이는 미래 날짜이므로 "방금 전"으로 표시
            if (diff < 0) {
                return '방금 전';
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            if (days === 0) {
                const hours = Math.floor(diff / (1000 * 60 * 60));
                if (hours === 0) {
                    const minutes = Math.floor(diff / (1000 * 60));
                    return minutes <= 0 ? '방금 전' : minutes + '분 전';
                }
                return hours + '시간 전';
            } else if (days < 7) {
                return days + '일 전';
            } else if (days < 30) {
                const weeks = Math.floor(days / 7);
                return weeks + '주 전';
            } else if (days < 365) {
                const months = Math.floor(days / 30);
                return months + '개월 전';
            } else {
                const years = Math.floor(days / 365);
                return years + '년 전';
            }
        }

        // 날짜 변환 함수 (즉시 실행 및 DOMContentLoaded 모두 지원)
        function updateNoticeDates() {
            document.querySelectorAll('.notice-item-date[data-date]').forEach(function(el) {
                const dateString = el.getAttribute('data-date');
                if (dateString) {
                    el.textContent = formatDateAgo(dateString);
                }
            });
        }

        // 페이지 로드 시 날짜 변환
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', updateNoticeDates);
        } else {
            // 이미 로드된 경우 즉시 실행
            updateNoticeDates();
        }
    </script>
</div>
