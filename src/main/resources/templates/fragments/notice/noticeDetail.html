<div class="notice-detail-container">
    <style>
        .notice-detail-container {
            width: 100%;
            min-height: calc(100vh - 60px);
            padding-bottom: 60px;
            background: white;
        }

        .notice-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 100;
        }

        .notice-back {
            font-size: 18px;
            color: #999;
            cursor: pointer;
        }

        .notice-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            flex: 1;
            text-align: center;
        }

        .notice-spacer {
            width: 26px;
        }

        .notice-body {
            padding: 16px;
            padding-bottom: 100px;
        }

        .notice-detail-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .notice-detail-date {
            font-size: 13px;
            color: #999;
            margin-bottom: 12px;
        }

        .notice-divider {
            height: 1px;
            background: #e0e0e0;
            margin: 12px 0;
        }

        .notice-detail-content {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .notice-detail-content ol,
        .notice-detail-content ul {
            margin: 12px 0;
            padding-left: 24px;
        }

        .notice-detail-content li {
            margin-bottom: 8px;
        }

        .notice-detail-content p {
            margin-bottom: 12px;
        }

        .notice-detail-content strong {
            font-weight: 600;
        }

        .notice-detail-image {
            width: 100%;
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 16px 0;
            object-fit: cover;
            display: block;
            background: #f5f5f5;
        }

        .notice-footer-note {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
    </style>

    <header class="notice-header">
        <i class="fas fa-chevron-left notice-back" onclick="prevSection()"></i>
        <h1 class="notice-title">공지사항</h1>
        <div class="notice-spacer"></div>
    </header>

    <div class="notice-body">
        <div class="notice-detail-title" th:text="${notice.title}">개인정보 처리방침 관련 변경 안내</div>
        <div class="notice-detail-date" th:text="${#temporals.format(notice.createdAt, 'yyyy.MM.dd')}">2024.10.14</div>
        <div class="notice-divider"></div>
        <img th:if="${notice.imageUrl != null and notice.imageUrl.length() > 0}" 
             th:src="${notice.imageUrl}" 
             alt="공지 이미지" 
             class="notice-detail-image"
             loading="lazy" />
        <div class="notice-detail-content" th:utext="${notice.content}">항상 딱좋은여행을 이용해주시는 고객님들께 감사의 말씀 드립니다. 이용약관 "제3조 (약관명시 및 개정)"에 의거하여 고객님께 약관 변경 내용을 공지 드립니다.

1. 개정대상 : 개인정보처리방침 '개인정보처리의 위탁'
2. 개정사유 : 개인정보처리 위탁 업체 추가
3. 개정내용

개인정보처리의 위탁</div>
        <div class="notice-footer-note">
            * 개정된 개인정보 처리방침에 동의하지 않으시는 경우, 회원 탈퇴를 요청하실 수 있습니다.
        </div>
    </div>
</div>
