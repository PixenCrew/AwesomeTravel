<div>

    <header class="section-header">
        <h1>로그인</h1>
        <div class="right">
            <i class="fas fa-chevron-left" onclick="backModal()"></i>
        </div>
    </header>

    <div class="section-body">
        <div class="oauth-login-buttons">
            <!-- 구글 로그인 -->
            <div id="btn-google" class="btn" onclick="saveRecentLogin('google')">
                <img src="/images/google.png" alt="Google" /> 구글 로그인
                <span id="recent-google">최근 구글</span>
            </div>

            <!-- 네이버 로그인 -->
            <div id="btn-naver" class="btn" onclick="saveRecentLogin('naver')">
                <img src="/images/naver.png" alt="Naver" /> 네이버 로그인
                <span id="recent-naver">최근 네이버</span>
            </div>
        </div>

        <form id="loginForm" action="/login" method="post">
            <input type="text" name="username" placeholder="아이디" required>
            <input type="password" name="password" placeholder="비밀번호" required>
            <button type="submit">로그인</button>
        </form>
    </div>

    <script>
        function showRecentLogin() {
            const recent = localStorage.getItem('recentSocialLogin');
            if (!recent) return; // 없으면 종료
            console.log("recent social : " + recent);

            const btn = document.getElementById(`btn-${recent}`);
            if (!btn) return;

            const overlay = btn.querySelector(`#recent-${recent}`);
            if (overlay) overlay.style.display = 'block';
        }

        showRecentLogin();

        function saveRecentLogin(provider) {
            localStorage.setItem('recentSocialLogin', provider);
            // 소셜 로그인 이동
            window.location.href = "/oauth2/authorization/" + provider;
        }

        // 일반 로그인 Ajax
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // 기본 제출 막기

            const form = e.target;
            const formData = new FormData(form);

            try {
                const res = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });

                if (!res.ok) throw new Error("로그인 실패");
                window.isLoggedIn = true;
                window.username = usernameValue ?? window.username ?? '회원';

                // ✅ 로그인 성공 처리
                await refreshSectionsAfterLogin();
                backModal(); // 모달 닫기

            } catch (err) {
                console.error("로그인 오류:", err);
                alert("아이디 또는 비밀번호를 확인하세요.");
            }
        });

        // ✅ OAuth 로그인 후 돌아왔을 때 자동 실행
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            window.isLoggedIn = true;
            window.username = usernameValue ?? window.username ?? '회원';
            if (params.get('loginSuccess') === 'true') {
                refreshSectionsAfterLogin().then(backModal);
                // ?loginSuccess=true 제거
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        });

    </script>

    <style>
        /* 로그인 버튼 기본 스타일 */
        .oauth-login-buttons .btn {
            position: relative;
            /* overlay 위치 기준 */
            display: inline-flex;
            align-items: center;
            padding: 8px 12px;
            margin: 4px;
            /* 버튼 간격 */
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #fff;
            user-select: none;
        }

        /* 버튼 안 이미지 */
        .oauth-login-buttons .btn img {
            height: 20px;
            width: 20px;
            margin-right: 8px;
        }

        /* 최근 로그인 표시 overlay */
        #recent-google,
        #recent-naver {
            display: none;
            position: absolute;
            top: -6px;
            right: -6px;
            background: red;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 4px;
            pointer-events: none;
            /* 클릭 방해 안함 */
            z-index: 10;
        }
    </style>
</div>
