<div class="login-container">
    <header class="login-header">
        <i class="fas fa-chevron-left back-btn" onclick="backModal()"></i>
        <h1 class="login-title">로그인</h1>
        <div class="header-spacer"></div>
    </header>

    <div class="login-body">
        <!-- 소셜 로그인 섹션 -->
        <div class="social-login-section">
            <div class="social-header">
                <span class="social-title">소셜로그인으로 이용하기</span>
                <div class="tooltip-wrapper">
                    <span class="tooltip-icon">💬</span>
                    <div class="tooltip-text" id="recent-tooltip">최근 사용한 방식이에요</div>
                </div>
            </div>
            
            <div class="social-buttons">
                <!-- Google 로그인 -->
                <button type="button" id="btn-google" class="social-btn" onclick="saveRecentLogin('google')">
                    <div class="social-icon google-icon">G</div>
                    <span class="social-text">Google 아이디로 로그인</span>
                </button>

                <!-- Kakao 로그인 -->
                <button type="button" id="btn-kakao" class="social-btn" onclick="saveRecentLogin('kakao')">
                    <div class="social-icon kakao-icon">
                        <span class="kakao-talk">TALK</span>
                    </div>
                    <span class="social-text">카카오 아이디로 로그인</span>
                </button>

                <!-- Naver 로그인 -->
                <button type="button" id="btn-naver" class="social-btn" onclick="saveRecentLogin('naver')">
                    <div class="social-icon naver-icon">N</div>
                    <span class="social-text">네이버 아이디로 로그인</span>
                </button>
            </div>
        </div>

        <!-- 일반 로그인 폼 -->
        <form id="loginForm" method="post" action="/login" class="login-form">
            <div class="form-group">
                <label for="username" class="form-label">아이디(이메일)</label>
                <input type="email" id="username" name="username" class="form-input" placeholder="aloha@gmail.com" required>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">비밀번호</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="*********" required>
            </div>

            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember-me" class="checkbox-input">
                    <span>자동 로그인</span>
                </label>
                <div class="find-links">
                    <a href="#" onclick="event.preventDefault(); addModal('/recovery/id')">아이디 찾기</a>
                    <span>/</span>
                    <a href="#" onclick="event.preventDefault(); addModal('/recovery/password')">비밀번호 찾기</a>
                </div>
            </div>

            <button type="submit" class="login-submit-btn">로그인</button>
        </form>

        <!-- 회원가입 링크 -->
        <div class="signup-link">
            <span>아직 아이디가 없으신가요?</span>
            <a href="#" onclick="event.preventDefault(); addModal('/register/terms')" class="signup-btn">회원가입</a>
        </div>

        <div class="resend-email-link">
            <span>인증 메일을 받지 못하셨나요?</span>
            <a href="#" onclick="event.preventDefault(); addModal('/register/resend', true)" class="resend-email-btn">인증 메일 다시 받기</a>
        </div>
    </div>

    <script>
        function showRecentLogin() {
            const recent = localStorage.getItem('recentSocialLogin');
            if (!recent) {
                document.getElementById('recent-tooltip').style.display = 'none';
                return;
            }

            const tooltip = document.getElementById('recent-tooltip');
            const btn = document.getElementById(`btn-${recent}`);
            
            if (btn) {
                tooltip.style.display = 'block';
                btn.classList.add('recent-login');
            } else {
                tooltip.style.display = 'none';
            }
        }

        function saveRecentLogin(provider) {
            localStorage.setItem('recentSocialLogin', provider);
            // 소셜 로그인 이동
            window.location.href = "/oauth2/authorization/" + provider;
        }

        // 페이지 로드 시 최근 로그인 방식 표시
        document.addEventListener('DOMContentLoaded', () => {
            showRecentLogin();

            // 로그인 실패 후 다시 돌아왔을 때 입력했던 이메일 복원
            const loginParams = new URLSearchParams(window.location.search);
            const usernameInput = document.getElementById('username');
            const usernameValue = loginParams.get('username')
                || sessionStorage.getItem('SPRING_SECURITY_LAST_USERNAME');

            if (usernameInput && usernameValue) {
                usernameInput.value = usernameValue;
            }
            
            // OAuth 로그인 후 돌아왔을 때 처리
            if (loginParams.get('loginSuccess') === 'true') {
                window.isLoggedIn = true;
                if (typeof refreshSectionsAfterLogin === 'function') {
                    refreshSectionsAfterLogin().then(() => {
                        if (typeof backModal === 'function') {
                            backModal();
                        }
                    });
                }
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            // 로그인 폼 제출 성공 시 isLoggedIn 업데이트
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    // 폼 제출은 정상적으로 진행되지만, 성공 시 isLoggedIn을 업데이트하기 위해
                    // 페이지가 리다이렉트되면 자동으로 업데이트됨
                    // 하지만 AJAX로 처리하지 않으므로, 리다이렉트 후에 처리됨
                });
            }
        });
    </script>
</div>
