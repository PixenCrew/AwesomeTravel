<div class="register-verify-result-container">
    <header class="register-header">
        <h1 class="register-title">회원가입</h1>
    </header>

    <div class="register-body">
        <div class="verification-result-icon" th:if="${success}">
            <i class="fas fa-check-circle"></i>
        </div>
        <div class="verification-result-icon error" th:unless="${success}">
            <i class="fas fa-times-circle"></i>
        </div>

        <div th:if="${success}">
            <h2 class="verify-result-title">이메일 인증이 완료되었습니다</h2>
            <p class="verify-result-message">회원가입이 완료되었습니다.</p>
            <p class="verify-result-message-secondary">지금부터 서비스 이용이 가능합니다.</p>
        </div>
        <div th:unless="${success}">
            <h2 class="verify-result-title error">이메일 인증에 오류가 발생했습니다</h2>
            <p class="verify-result-message" th:text="${message}">인증 링크가 만료되었거나 잘못된 링크입니다.</p>
        </div>

        <div class="verify-result-actions">
            <button class="verify-result-login-btn" th:if="${success}" onclick="addModal('/login', true)">
                로그인하러 가기
            </button>
            <button class="verify-result-home-btn" th:unless="${success}" onclick="window.location.replace('/')">
                홈으로
            </button>
        </div>
    </div>

    <style>
        .register-verify-result-container {
            width: 100%;
            min-height: 100vh;
            background: white;
        }

        .register-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }

        .register-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin: 0;
        }

        .register-body {
            padding: 60px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .verification-result-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: #e8f5e9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .verification-result-icon i {
            font-size: 40px;
            color: #4caf50;
        }

        .verification-result-icon.error {
            background: #ffebee;
        }

        .verification-result-icon.error i {
            color: #f44336;
        }

        .verify-result-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin: 0 0 16px 0;
        }

        .verify-result-title.error {
            color: #f44336;
        }

        .verify-result-message {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin: 0 0 8px 0;
        }

        .verify-result-message-secondary {
            font-size: 14px;
            color: #999;
            margin: 0 0 40px 0;
        }

        .verify-result-actions {
            width: 100%;
            max-width: 400px;
            margin-top: 40px;
        }

        .verify-result-login-btn,
        .verify-result-home-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .verify-result-login-btn {
            background: #333;
            color: white;
        }

        .verify-result-login-btn:hover {
            background: #555;
        }

        .verify-result-home-btn {
            background: #f5f5f5;
            color: #333;
        }

        .verify-result-home-btn:hover {
            background: #e0e0e0;
        }
    </style>
</div>
