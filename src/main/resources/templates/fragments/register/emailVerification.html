<div class="register-email-verification-container">
    <header class="register-header">
        <h1 class="register-title">회원가입</h1>
    </header>

    <div class="register-body">
        <div class="verification-icon">
            <i class="fas fa-envelope"></i>
        </div>
        
        <h2 class="verification-main-title">이메일 인증이 필요합니다</h2>
        <p class="verification-description">
            회원가입이 완료되었습니다.<br>
            입력하신 이메일 주소로 인증 메일을 발송했습니다.
        </p>

        <div class="verification-info-box">
            <p class="verification-info-item">
                <i class="fas fa-check-circle"></i>
                이메일을 확인하고 인증 링크를 클릭해주세요.
            </p>
            <p class="verification-info-item">
                <i class="fas fa-check-circle"></i>
                메일이 스팸함으로 분류되지 않았는지 확인해주세요.
            </p>
            <p class="verification-info-item">
                <i class="fas fa-check-circle"></i>
                인증 링크는 발송 후 24시간 동안만 유효합니다.
            </p>
        </div>

        <div class="verification-email-display" id="emailDisplay">
            <p class="verification-email-label">인증 메일 발송 주소</p>
            <p class="verification-email-value" id="emailValue"></p>
        </div>

        <div class="verification-actions">
            <button class="verification-resend-btn" onclick="resendVerificationEmailFromPage()">
                인증 메일 다시 보내기
            </button>
            <button class="verification-login-btn" onclick="addModal('/login', true)">
                로그인으로 이동
            </button>
        </div>

        <div id="resendMessage" class="verification-message" style="display: none;"></div>
    </div>

    <script>
        (function() {
            // URL 파라미터에서 이메일 가져오기
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            
            if (email) {
                document.getElementById('emailValue').textContent = email;
            } else {
                document.getElementById('emailDisplay').style.display = 'none';
            }

            window.resendVerificationEmailFromPage = async function() {
                let emailValue = document.getElementById('emailValue').textContent.trim();
                
                // 이메일이 없으면 URL 파라미터에서 다시 시도
                if (!emailValue) {
                    const emailFromUrl = getEmailFromUrl();
                    if (emailFromUrl) {
                        emailValue = decodeURIComponent(emailFromUrl);
                        document.getElementById('emailValue').textContent = emailValue;
                    }
                }
                
                const messageBox = document.getElementById('resendMessage');
                const resendBtn = document.querySelector('.verification-resend-btn');

                if (!emailValue) {
                    messageBox.textContent = "이메일 주소를 찾을 수 없습니다.";
                    messageBox.style.display = "block";
                    messageBox.style.color = "#ff4444";
                    return;
                }

                resendBtn.disabled = true;
                resendBtn.textContent = "발송 중...";

                try {
                    const response = await fetch("/register/resend-email", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email: emailValue })
                    });

                    const result = await response.json();

                    if (!response.ok || !result.success) {
                        throw new Error(result.message || "재전송 중 오류가 발생했습니다.");
                    }

                    messageBox.textContent = result.message || "인증 메일을 다시 발송했습니다.";
                    messageBox.style.display = "block";
                    messageBox.style.color = "#0a7d36";
                } catch (err) {
                    messageBox.textContent = err.message || "재전송 중 오류가 발생했습니다.";
                    messageBox.style.display = "block";
                    messageBox.style.color = "#ff4444";
                } finally {
                    resendBtn.disabled = false;
                    resendBtn.textContent = "인증 메일 다시 보내기";
                }
            };
        })();
    </script>

    <style>
        .register-email-verification-container {
            width: 100%;
            min-height: 100vh;
            background: white;
        }

        .register-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }

        .register-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin: 0;
        }

        .register-body {
            padding: 40px 20px;
            text-align: center;
        }

        .verification-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: #e3f2fd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .verification-icon i {
            font-size: 40px;
            color: #1976d2;
        }

        .verification-main-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin: 0 0 16px 0;
        }

        .verification-description {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin: 0 0 32px 0;
        }

        .verification-info-box {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 20px;
            margin: 0 0 32px 0;
            text-align: left;
        }

        .verification-info-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 14px;
            color: #666;
            margin: 0 0 12px 0;
            line-height: 1.5;
        }

        .verification-info-item:last-child {
            margin-bottom: 0;
        }

        .verification-info-item i {
            color: #1976d2;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .verification-email-display {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 16px;
            margin: 0 0 24px 0;
        }

        .verification-email-label {
            font-size: 12px;
            color: #999;
            margin: 0 0 8px 0;
        }

        .verification-email-value {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            margin: 0;
            word-break: break-all;
        }

        .verification-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .verification-resend-btn,
        .verification-login-btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .verification-resend-btn {
            background: #1976d2;
            color: white;
        }

        .verification-resend-btn:hover {
            background: #1565c0;
        }

        .verification-resend-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .verification-login-btn {
            background: #f5f5f5;
            color: #333;
        }

        .verification-login-btn:hover {
            background: #e0e0e0;
        }

        .verification-message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</div>
