<div>
    <style>
        .trip-container {
            box-sizing: border-box;
            border: 1px solid darkgray;
        }
    </style>
    <header class="section-header">
        <h1>항공 검색 결과</h1>
        <div class="right">
            <i class="fas fa-chevron-left" onclick="prevSection()"></i>
        </div>
    </header>

    <div class="section-body">
        <div class="search-summary">
            <h4>조건</h4>
            <ul>
                <li>항공 타입: <span id="tripType" th:text="${airSearchRequestDto.tripType}"></span></li>
                <li>성인: <span id="adultCount" th:text="${airSearchRequestDto.adultCount}"></span></li>
                <li>청소년: <span id="youthCount" th:text="${airSearchRequestDto.youthCount}"></span></li>
                <li>영유아: <span id="infantCount" th:text="${airSearchRequestDto.infantCount}"></span></li>
                <li>좌석 등급: <span id="seatClassType" th:text="${airSearchRequestDto.seatClassType}"></span></li>
                <li>직항 여부: <span id="directOnly" th:text="${airSearchRequestDto.directOnly}"></span></li>
            </ul>
        </div>

        <div th:if="${#lists.isEmpty(searchResult)}">
            <p>검색 결과가 없습니다.</p>
        </div>

        <div th:each="air : ${searchResult}" class="trip-container" onclick="getAirDetail(this)">
            <h2>가격: <span th:text="${air.price}">0</span> 원</h2>

            <div th:each="trip, iterStat : ${air.tripList}"
                class="trip-item"
                th:attr="data-seatclass-id=${trip.seatClassId}"
                style="border: 1px solid lightgray; margin: 5px; padding: 5px;">
                <h3>여정 [[${iterStat.index + 1}]]</h3>
                <table>
                    <thead>
                        <tr>
                            <th>항공사</th>
                            <th>항공편</th>
                            <th>출발지</th>
                            <th>출발시간</th>
                            <th>도착지</th>
                            <th>도착시간</th>
                            <th>총 비행시간(분)</th>
                            <th>경유 횟수</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <img th:src="@{'/' + ${trip.airline.iconUrl}}" style="width:24px; height:24px; vertical-align:middle; margin-right:5px;">
                                <span th:text="${trip.airline.nameKor}">항공사</span>
                            </td>
                            <td th:text="${trip.flightNumber}">항공편</td>
                            <td th:text="${trip.depart.airportCode}">출발지</td>
                            <td th:text="${trip.departDateTime}">출발시간</td>
                            <td th:text="${trip.arrive.airportCode}">도착지</td>
                            <td th:text="${trip.arriveDateTime}">도착시간</td>
                            <td th:text="${trip.flightDurationTotal}">총시간</td>
                            <td th:text="${trip.stopOvers}">경유</td>
                        </tr>
                    </tbody>
                </table>

                <h4>세부 비행 구간</h4>
                <table>
                    <thead>
                        <tr>
                            <th>출발지</th>
                            <th>출발시간</th>
                            <th>비행시간</th>
                            <th>도착지</th>
                            <th>도착시간</th>
                        </tr>
                    </thead>
                    <tbody>
                        <div th:each="seg : ${trip.flightSegments}">
                            <tr>
                                <td th:text="${seg.departAirport.airportCode}">출발지</td>
                                <td th:text="${seg.departDateTime}">출발시간</td>
                                <td th:text="${seg.flightDuration}">1</td>
                                <td th:text="${seg.arriveAirport.airportCode}">도착지</td>
                                <td th:text="${seg.arriveDateTime}">도착시간</td>
                            </tr>
                            <tr th:if="${seg.waitDuration != null}">
                                <td>대기시간 <span th:text="${seg.waitDuration}">10</span> 분</td>
                            </tr>
                        </div>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        window.getAirDetail = function (container) {

            // 요청 정보 수집
            const requestData = {};
            const summaryEl = document.querySelector(".search-summary");
            const spans = summaryEl.querySelectorAll("span[id]");

            spans.forEach(span => {
                const key = span.id;
                const value = span.textContent.trim();
                requestData[key] = value;
            });
            console.log('🔹 requestData:', requestData);

            // seatClassId 수집 (현재 클릭한 컨테이너)
            const seatIds = [];
            container.querySelectorAll('[data-seatclass-id]').forEach(el => {
                seatIds.push(el.dataset.seatclassId);
            });
            console.log('🔹 SeatClass IDs:', seatIds);

            requestData.seatClassIds = seatIds;

            openModal('/air/detail', requestData);
        };
    </script>
</div>
