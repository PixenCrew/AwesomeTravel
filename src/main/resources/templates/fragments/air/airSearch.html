        #calendar {
            max-height: 90vh;
            overflow-y: scroll;
        }

        .fc-month-title {
            text-align: center;

            font-size: 1.2em;
            margin: 10px 0;
            border-bottom: 2px solid #666;
            padding-bottom: 5px;
        }

        .fc-month-wrapper {
            margin-bottom: 20px;
        }

        .calendar-modal {
            display: none;
            position: fixed;
            top: 0px;
            left: 0px;
            transform: translateX(0%);
            width: 100vw;
            height: 100vh;
            background: #fff;
            border: 1px solid #ccc;
            z-index: 9999;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        td.unavail {
            color: #888;
            opacity: 0.6;
        }

        td.today {
            background: #ff5252;
            color: white;
            font-weight: bold;
        }

        td.selected {
            background-color: #007bff;
            color: white;
            font-weight: bold;
            border-radius: 50%;
            transition: background 0.2s, color 0.2s;
        }

        td.range {
            background-color: #cce5ff;
            color: #000;
            border-radius: 0;
            transition: background 0.2s;
        }

        td.range.selected {
            background-color: #007bff;
            color: white;
            font-weight: bold;
            border-radius: 50%;
        }

    <script>
        var segmentCount = 0; // 다구간 선택필요날짜 갰수
        var currentFormId = "form-ROUND_TRIP"; // 처음 기본 표시 폼 id
        var daysToSelect = 0; // 달력 렌더시점 최종 선택 필요갯수

        (function () {

            window.addSegment = function (containerId, delButton = true) {
                const container = document.getElementById(containerId);
                const index = container.children.length;
                const newSegment = document.createElement('div');
                newSegment.className = 'segment';

                // ===== 출발 공항 =====
                const departLabel = document.createElement('label');
                departLabel.textContent = '출발 공항:';

                const departWrapper = document.createElement('div');
                departWrapper.className = 'city-input-wrapper';

                const departInput = document.createElement('input');
                departInput.type = 'text';
                departInput.name = `segments[${index}].depart.airportCode`;
                departInput.required = true;
                departInput.readOnly = true;
                departInput.onclick = function () { openCityModal('depart', this); };

                const departCityLabel = document.createElement('span');
                departCityLabel.className = 'city-label';

                departWrapper.appendChild(departInput);
                departWrapper.appendChild(departCityLabel);
                departLabel.appendChild(departWrapper);

                // ===== 도착 공항 =====
                const arriveLabel = document.createElement('label');
                arriveLabel.textContent = '도착 공항:';

                const arriveWrapper = document.createElement('div');
                arriveWrapper.className = 'city-input-wrapper';

                const arriveInput = document.createElement('input');
                arriveInput.type = 'text';
                arriveInput.name = `segments[${index}].arrive.airportCode`;
                arriveInput.required = true;
                arriveInput.readOnly = true;
                arriveInput.onclick = function () { openCityModal('arrive', this); };

                const arriveCityLabel = document.createElement('span');
                arriveCityLabel.className = 'city-label';

                arriveWrapper.appendChild(arriveInput);
                arriveWrapper.appendChild(arriveCityLabel);
                arriveLabel.appendChild(arriveWrapper);

                // ===== 출발일 =====
                const dateLabel = document.createElement('label');
                dateLabel.textContent = '출발일:';

                const dateInput = document.createElement('input');
                dateInput.type = 'date';
                dateInput.name = `segments[${index}].departDate`;
                dateInput.required = true;
                dateInput.readOnly = true;
                dateInput.onclick = function () { openCalendar(this); };

                dateLabel.appendChild(dateInput);

                // ===== 조립 =====
                newSegment.appendChild(departLabel);
                newSegment.appendChild(arriveLabel);
                newSegment.appendChild(dateLabel);
                newSegment.appendChild(document.createElement('br'));

                // ===== 삭제 버튼 =====
                if (delButton) {
                    const deleteBtn = document.createElement('button');
                    deleteBtn.type = 'button';
                    deleteBtn.textContent = '삭제';
                    deleteBtn.onclick = function () { deleteSegment(this); };
                    newSegment.appendChild(deleteBtn);
                    newSegment.appendChild(document.createElement('br'));
                }

                newSegment.appendChild(document.createElement('hr'));
                container.appendChild(newSegment);

                segmentCount++;
            };

            // 페이지 로드시 다구간 기본 1개 추가
            addSegment('multi-segments', false);

            // // 왕복 출발-도착지 지정시 귀환편 출발-도착지 자동 입력하게 이벤트 리스너 추가
            // document.addEventListener("DOMContentLoaded", () => {
            //     const depart0 = document.getElementById("seg0-depart");
            //     const arrive0 = document.getElementById("seg0-arrive");
            //     const depart1 = document.getElementById("seg1-depart");
            //     const arrive1 = document.getElementById("seg1-arrive");

            //     // 첫 번째 출발 → 두 번째 도착
            //     depart0.addEventListener("input", () => {
            //         arrive1.value = depart0.value;
            //     });

            //     // 첫 번째 도착 → 두 번째 출발
            //     arrive0.addEventListener("input", () => {
            //         depart1.value = arrive0.value;
            //     });
            // });

            // 화면에 표시되는 폼 바꾸는 함수
            window.showForm = function (type) {
                // 1. 현재 보이는 폼을 찾아서 값 초기화 후 숨기기
                const prev = document.getElementById(currentFormId);
                if (prev) {
                    const formTag = prev.querySelector("form");
                    if (formTag) {
                        formTag.reset(); // 모든 입력값 초기화
                    }
                    prev.style.display = "none"; // 숨기기
                }

                // 2. 새로 선택한 폼 보이기
                const nextId = "form-" + type;
                const next = document.getElementById(nextId);
                if (next) {
                    next.style.display = "block";
                    currentFormId = nextId;// 현재 폼 id 갱신
                }
            }

            // 삭제 함수
            window.deleteSegment = function (btn) {
                const segment = btn.closest('.segment');
                if (!segment) return;

                const container = segment.parentNode;
                container.removeChild(segment);

                // 삭제 후 재인덱싱
                reindexSegments(container);

                segmentCount--;
            }

            // 재인덱싱 함수
            window.reindexSegments = function (container) {
                const segments = container.querySelectorAll('.segment');
                segments.forEach((seg, idx) => {
                    const inputs = seg.querySelectorAll('input');
                    inputs.forEach(input => {
                        if (input.name.includes('depart.airportCode')) {
                            input.name = `segments[${idx}].depart.airportCode`;
                        } else if (input.name.includes('arrive.airportCode')) {
                            input.name = `segments[${idx}].arrive.airportCode`;
                        } else if (input.name.includes('departDate')) {
                            input.name = `segments[${idx}].departDate`;
                        }
                    });
                });
            }

            window.submitAirSearch = function (tripType) {
                const container = document.getElementById(`form-${tripType}`);
                if (!container) return;

                // 기본 필드 수집
                const payload = {};
                payload.segments = [];

                // 일반 input/select
                container.querySelectorAll('input[name]:not([name^="segments"]), select[name]').forEach(el => {
                    if (el.type === 'checkbox') {
                        payload[el.name] = el.checked;
                    } else {
                        payload[el.name] = el.value.trim();
                    }
                });

                // segments 수집
                const segmentDivs = container.querySelectorAll('div.segment, #roundtrip-segments > div:nth-child(n+2), #oneway-segments > div, #multi-segments > div');
                segmentDivs.forEach(segDiv => {
                    const segment = {};
                    const departInput = segDiv.querySelector('[name$=".depart.airportCode"]');
                    const arriveInput = segDiv.querySelector('[name$=".arrive.airportCode"]');
                    const dateInput = segDiv.querySelector('[name$=".departDate"]');

                    if (!departInput && !arriveInput && !dateInput) return; // 빈 div skip

                    segment.depart = { airportCode: departInput?.value.trim() || '' };
                    segment.arrive = { airportCode: arriveInput?.value.trim() || '' };
                    segment.departDate = dateInput?.value || '';

                    payload.segments.push(segment);
                });

                // 입력값 누락 확인용
                const missing = [];

                // 1. 인원 수
                const adult = parseInt(payload.adultCount || 0);
                const youth = parseInt(payload.youthCount || 0);
                const infant = parseInt(payload.infantCount || 0);
                const totalPassengers = adult + youth + infant;

                if (totalPassengers <= 0) {
                    missing.push('탑승 인원 1명 이상');
                }

                // 2. 유아 > 성인
                if (infant > adult) missing.push('유아 수는 성인 수를 초과할 수 없습니다');

                // 3. 좌석 등급
                if (!payload.seatClassType) missing.push('좌석 등급');

                // 4. 세그먼트 값
                payload.segments.forEach((seg, i) => {
                    const n = i + 1;
                    if (!seg.depart.airportCode) missing.push(`구간${n} 출발 공항`);
                    if (!seg.arrive.airportCode) missing.push(`구간${n} 도착 공항`);
                    if (!seg.departDate) missing.push(`구간${n} 출발일`);
                });

                if (missing.length > 0) {
                    alert(`다음 항목을 입력해야 합니다:\n\n- ${missing.join('\n- ')}`);
                    return;
                }

                console.log('payload:', payload);

                // 서버 전송
                fetchSection('/air/search', payload);
            };

            // 오늘 확인 함수
            window.isTodayDate = function (dateObj) {
                const now = new Date();
                return (
                    dateObj.getFullYear() === now.getFullYear() &&
                    dateObj.getMonth() === now.getMonth() &&
                    dateObj.getDate() === now.getDate()
                );
            }

            // 예약 불가 날짜인지 체크
            window.isUnavailDate = function (dateObj) {
                const inputDate = new Date(dateObj);
                const today = new Date();

                // 시분초를 제거 (날짜만 비교)
                inputDate.setHours(0, 0, 0, 0);
                today.setHours(0, 0, 0, 0);

                // 오늘로부터 2일 후 계산
                const after2Days = new Date(today);
                after2Days.setDate(today.getDate() + 2);

                // 오늘 이전이거나 오늘 이후 3일 이내
                if (inputDate < today || inputDate <= after2Days) {
                    return true;
                }
                return false;
            };

            // 달력 열기
            window.openCalendar = function () {
                daysToSelect =
                    currentFormId == "form-ROUND_TRIP" ? 2 :
                        currentFormId == "form-ONE_WAY" ? 1 :
                            segmentCount;

                console.log('daysToSelect = ', daysToSelect);

                const calendarHtml = document.getElementById('calendar-modal').innerHTML;
                openModalHtml(calendarHtml);
                renderCalendar();
            }

            window.closeCalendar = function () {
                selected = [];
                closeModal()
            }

            // 달력 렌더링
            window.renderCalendar = function () {
                const container = document.getElementById('calendar');
                const today = new Date();
                const startMonth = today.getMonth();
                const startYear = today.getFullYear();

                for (let i = 0; i < 12; i++) {
                    const monthDate = new Date(startYear, startMonth + i, 1);
                    const year = monthDate.getFullYear();
                    const month = monthDate.getMonth();

                    const monthEl = document.createElement('div');
                    monthEl.className = 'month';
                    const monthName = monthDate.toLocaleString('default', { month: 'long' });
                    monthEl.innerHTML = `<h3>${year}년 ${monthName}</h3>`;

                    const table = document.createElement('table');
                    const daysOfWeek = ['일', '월', '화', '수', '목', '금', '토'];

                    // 요일 헤더
                    const headerRow = document.createElement('tr');
                    daysOfWeek.forEach(d => {
                        const th = document.createElement('th');
                        th.textContent = d;
                        headerRow.appendChild(th);
                    });
                    table.appendChild(headerRow);

                    // 날짜 셀 생성
                    const firstDay = new Date(year, month, 1).getDay();
                    const daysInMonth = new Date(year, month + 1, 0).getDate();
                    let row = document.createElement('tr');

                    // 빈칸 채우기
                    for (let i = 0; i < firstDay; i++) {
                        const td = document.createElement('td');
                        td.className = 'empty';
                        row.appendChild(td);
                    }

                    // 날짜 채우기
                    for (let day = 1; day <= daysInMonth; day++) {
                        const dateObj = new Date(year, month, day);
                        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

                        const td = document.createElement('td');
                        td.textContent = day;
                        td.dataset.date = dateStr;

                        // 예약 불가 날짜 흐리게
                        if (isUnavailDate(dateObj)) {
                            if (isTodayDate(dateObj)) {
                                td.classList.add('today');
                            } else {
                                td.classList.add('unavail');
                            }
                        }

                        // 오늘 날짜 강조

                        // 클릭 이벤트
                        td.onclick = () => selectDay(td);

                        row.appendChild(td);

                        // 줄바꿈 처리
                        if ((firstDay + day) % 7 === 0 || day === daysInMonth) {
                            table.appendChild(row);
                            row = document.createElement('tr');
                        }
                    }

                    monthEl.appendChild(table);
                    container.appendChild(monthEl);
                }
            }

        })();
    </script>

    <script>
        // 달력 선택 관련
        (function () {

            let selectedDates = [];

            // YYYY-MM-DD -> Date (00:00:00)
            window.parseDateYMD = function (ymd) {
                const [y, m, d] = ymd.split('-').map(Number);
                return new Date(y, m - 1, d, 0, 0, 0, 0);
            }

            // Date -> YYYY-MM-DD
            window.formatDateYMD = function (date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            // 모든 날짜 셀에서 range/selected 클래스 제거
            window.clearAllRangeAndSelected = function () {
                document.querySelectorAll('td[data-date].range, td[data-date].selected').forEach(td => {
                    td.classList.remove('range', 'selected');
                });
            }

            // 주어진 시작~끝(포함) 날짜까지 순회하면서 각 날짜의 td를 찾아 callback 실행
            window.forEachDateInRange = function (startDate, endDate, callback) {
                const d = new Date(startDate);
                while (d <= endDate) {
                    const ds = formatDateYMD(d);
                    const td = document.querySelector(`td[data-date="${ds}"]`);
                    if (td) callback(td, ds);
                    d.setDate(d.getDate() + 1);
                }
            }

            // 날짜 클릭 테스트
            window.selectDay = function (cell) {
                const date = cell.dataset.date;
                if (!date) return;
                console.log("선택된 날짜 클릭:", date);

                // 예약 불가 여부
                if (window.isUnavailDate && window.isUnavailDate(date)) {
                    alert(`선택된 날짜는 예약 불가능합니다.: ${date}`);
                    return;
                }

                // 중복 클릭 무시(원하면 토글로 변경 가능)
                if (selectedDates.includes(date)) {
                    console.log('이미 선택된 날짜입니다:', date);
                    return;
                }

                const clickedDate = parseDateYMD(date);

                // 1) selectedDates가 daysToSelect만큼 차있으면 배열 초기화 후 push
                if (selectedDates.length >= daysToSelect) {
                    selectedDates = [date];
                } else if (selectedDates.length > 0) {
                    // selectedDates가 비어있지 않을 때: 배열의 가장 이른 날짜와 비교
                    const firstSelectedDate = parseDateYMD(selectedDates[0]);

                    // 2) 클릭한 날짜가 기존 선택들보다 이르면 배열 초기화 후 push
                    if (clickedDate < firstSelectedDate) {
                        selectedDates = [date];
                    } else {
                        // 3) 기존 선택들보다 늦으면 그냥 push
                        selectedDates.push(date);
                    }
                } else {
                    // selectedDates가 비어있으면 그냥 push
                    selectedDates.push(date);
                }

                console.log('현재 selected 배열:', selectedDates);

                // 4) 클래스 업데이트: 기존 range/selected 제거 -> 배열 첫~마지막 날짜까지 range 클래스 추가
                clearAllRangeAndSelected();

                // 정렬 보장: selected는 논리상 오름차순이지만 안전하게 정렬 (문자열로도 YYYY-MM-DD이므로 정렬 가능)
                selectedDates.sort();

                const start = parseDateYMD(selectedDates[0]);
                const end = parseDateYMD(selectedDates[selectedDates.length - 1]);

                // start~end에 대해 range 클래스 추가
                forEachDateInRange(start, end, (td) => {
                    td.classList.add('range');
                });

                // 배열 내 날짜들에는 selected 클래스 추가 (우선순위: selected 위에 range 있어도 함께 유지)
                selectedDates.forEach(ds => {
                    const td = document.querySelector(`td[data-date="${ds}"]`);
                    if (td) {
                        td.classList.add('selected');
                        td.classList.remove('range');
                    }
                });

                // footer 텍스트 갱신
                updateFooterStatus();
            };

            window.updateFooterStatus = function () {
                const textEl = document.getElementById('selected-date-text');
                const btn = document.querySelector('.confirm-btn');

                if (!textEl || !btn) return;

                if (selectedDates.length === 0) {
                    textEl.textContent = '날짜를 선택하세요';
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                    return;
                }

                const start = selectedDates[0];
                const end = selectedDates[selectedDates.length - 1];

                // ✅ 날짜 요약 표시
                if (selectedDates.length === 1) {
                    textEl.textContent = `${start} 선택 중`;
                } else {
                    textEl.textContent = `${start} ~ ${end}`;
                }

                // ✅ 버튼 활성화 조건
                if (selectedDates.length === daysToSelect) {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                } else {
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                }
            };

            window.confirmSelectedDates = function () {
                if (!currentFormId) {
                    console.warn("currentFormId가 설정되지 않았습니다.");
                    return;
                }

                if (selectedDates.length === 0) {
                    alert("날짜를 선택하세요.");
                    return;
                }

                selectedDates.sort();

                // 현재 폼 내 date input 목록 가져오기
                const form = document.getElementById(currentFormId);
                if (!form) {
                    console.warn("폼을 찾을 수 없습니다.");
                    return;
                }

                const dateInputs = form.querySelectorAll('input[type="date"][name^="segments"]');
                if (dateInputs.length === 0) {
                    console.warn("날짜 입력란이 없습니다.");
                    return;
                }

                // 선택된 날짜를 순서대로 입력
                const count = Math.min(selectedDates.length, dateInputs.length);
                for (let i = 0; i < count; i++) {
                    dateInputs[i].value = selectedDates[i];
                }

                selectedDates = [];
                closeModal();
            }


        })();
    </script>
    <script>
        var currentCityMode = null; // 'depart' || 'arrive'
        var currentCityInput = null;

        (function () {

            window.openCityModal = function (mode, inputEl) {
                currentCityMode = mode;
                currentCityInput = inputEl;

                const html = document.getElementById('city-select-modal').innerHTML;
                openModalHtml(html);

                const titleEl = document.getElementById('cityModalTitle');
                if (titleEl) {
                    titleEl.textContent = mode === 'depart' ? '출발지 선택' : '도착지 선택';
                }
            }

            window.filterCityList = function (keyword) {
                keyword = keyword.trim();
                const resultsBox = document.getElementById('citySearchResults');
                const listBox = document.getElementById('cityGroupList');
                const list = document.getElementById('citySearchList');
                list.innerHTML = '';

                if (!keyword) {
                    resultsBox.style.display = 'none';
                    listBox.style.display = 'block';
                    return;
                }

                const allCities = [...document.querySelectorAll('#cityGroupList button')];
                const matches = allCities.filter(btn => btn.textContent.includes(keyword));

                if (matches.length === 0) {
                    list.innerHTML = '<li><p>검색된 지역이 없습니다.</p></li>';
                } else {
                    matches.forEach(btn => {
                        const li = document.createElement('li');
                        li.innerHTML = `<button onclick="selectCity('${btn.textContent}')">${btn.textContent}</button>`;
                        list.appendChild(li);
                    });
                }

                resultsBox.style.display = 'block';
                listBox.style.display = 'none';
            };

            window.selectCity = function (btn) {
                const cityCode = btn.dataset.code;
                const cityName = btn.dataset.name;

                if (!currentCityInput) return;

                // 실제 form input에는 공항 코드 저장
                currentCityInput.value = cityCode;

                // input 옆에 도시명 라벨이 있으면 업데이트
                let label = currentCityInput.nextElementSibling;
                if (!label || !label.classList.contains('city-label')) {
                    label = document.createElement('span');
                    label.className = 'city-label';
                    label.style.marginLeft = '6px';
                    label.style.fontWeight = 'bold';
                    currentCityInput.insertAdjacentElement('afterend', label);
                }
                label.textContent = cityName;

                console.log(`선택됨 → ${cityName} (${cityCode})`);

                closeModal();
            };

        })();

    </script>
