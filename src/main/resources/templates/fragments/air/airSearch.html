                            </div>
                        </div>
                        <button type="button" class="air-search-swap-btn" onclick="swapCities()">
                            <i class="fas fa-exchange-alt"></i>
                        </button>
                        <div class="air-search-city-card placeholder" onclick="openCityModalRoundTrip('arrive')">

                                <span class="air-search-city-name" id="arrive-city-name">도착지</span>
                                <span class="air-search-city-code" id="arrive-city-code">IN</span>
                            </div>
                        </div>
                    </div>

                    <!-- 숨겨진 입력 필드 -->
                    <div style="display: none;">
                        <input type="text" name="segments[0].depart.airportCode" value="ICN" readonly required>
                        <input type="text" name="segments[0].arrive.airportCode" readonly required>
                        <input type="text" name="segments[1].depart.airportCode" readonly required>
                        <input type="text" name="segments[1].arrive.airportCode" value="ICN" readonly required>
                    </div>

                    <!-- 날짜 선택 -->
                    <div class="air-search-field-group">
                        <label class="air-search-field-label">날짜 선택</label>
                        <div class="air-search-field-input" onclick="openCalendar()">

                            <input type="text" placeholder="언제 떠나시나요?" readonly id="depart-date-display">

                        <div class="air-search-field-input" style="margin-top: 8px;" onclick="openCalendar()">

                        <input type="number" name="infantCount" min="0" value="0" required style="display: none;">

                            <option value="PREMIUMECONOMY">PREMIUMECONOMY</option>

                            <option value="FIRST">FIRST</option>

                        <input type="checkbox" name="directOnly" id="directOnly" style="display: none;">

                        <span class="air-search-checkbox-label">직항만</span>
                    </div>

                    <button type="button" class="air-search-submit-btn" onclick="submitAirSearch('ROUND_TRIP')">검색</button>

                     th:onclick="|if('${banner.url}' != '') { window.location.href='${banner.url}'; }|"

    <script>
        var segmentCount = 0; // 다구간 선택필요날짜 갰수

        // 탭 업데이트 함수
        window.updateTabs = function(type) {
            const tabs = document.querySelectorAll('.air-search-tab');
            tabs.forEach(tab => tab.classList.remove('active'));
            
            if (type === 'ROUND_TRIP') {
                tabs[0].classList.add('active');
            } else if (type === 'ONE_WAY') {
                tabs[1].classList.add('active');
            } else if (type === 'MULTI') {
                tabs[2].classList.add('active');
            }
        };

        // 출발지/도착지 교환 (왕복)
        window.swapCities = function() {
            const departInput = document.querySelector('input[name="segments[0].depart.airportCode"]');
            const arriveInput = document.querySelector('input[name="segments[0].arrive.airportCode"]');
            
            if (!departInput || !arriveInput || !departInput.value || !arriveInput.value) return;
            
            const tempCode = departInput.value;
            const tempName = document.getElementById('depart-city-name').textContent;
            
            departInput.value = arriveInput.value;
            document.getElementById('depart-city-name').textContent = document.getElementById('arrive-city-name').textContent;
            document.getElementById('depart-city-code').textContent = document.getElementById('arrive-city-code').textContent;
            
            arriveInput.value = tempCode;
            document.getElementById('arrive-city-name').textContent = tempName;
            document.getElementById('arrive-city-code').textContent = tempCode;
        };

        // 출발지/도착지 교환 (편도)
        window.swapCitiesOneWay = function() {
            const form = document.getElementById('form-ONE_WAY');
            if (!form) return;
            
            const departInput = form.querySelector('input[name="segments[0].depart.airportCode"]');
            const arriveInput = form.querySelector('input[name="segments[0].arrive.airportCode"]');
            
            if (!departInput || !arriveInput || !departInput.value || !arriveInput.value) return;
            
            const tempCode = departInput.value;
            const tempName = document.getElementById('oneway-depart-city-name').textContent;
            
            departInput.value = arriveInput.value;
            document.getElementById('oneway-depart-city-name').textContent = document.getElementById('oneway-arrive-city-name').textContent;
            document.getElementById('oneway-depart-city-code').textContent = document.getElementById('oneway-arrive-city-code').textContent;
            
            arriveInput.value = tempCode;
            document.getElementById('oneway-arrive-city-name').textContent = tempName;

        // 여행자 수 변경
        window.changePassengerCount = function(type, delta) {
            const countEl = document.getElementById(`passenger-${type}-count`);
            if (!countEl) return;
            
            let currentCount = parseInt(countEl.textContent || '0');
            const newCount = Math.max(0, currentCount + delta);
            
            // 성인 수는 최소 1명
            if (type === 'adult' && newCount < 1) return;
            
            // 유아 수는 성인 수를 초과할 수 없음
            if (type === 'infant') {
                const adultCount = parseInt(document.getElementById('passenger-adult-count').textContent || '1');
                if (newCount > adultCount) {
                    alert('유아 수는 성인 수를 초과할 수 없습니다.');
                    return;
                }
            }
            
            countEl.textContent = newCount;
            
            // 버튼 활성화/비활성화
            const minusBtn = countEl.previousElementSibling;
            const plusBtn = countEl.nextElementSibling;
            
            if (type === 'adult') {
                if (minusBtn) minusBtn.disabled = newCount <= 1;
            } else {
                if (minusBtn) minusBtn.disabled = newCount <= 0;
            }
            
            // 유아 수 변경 시 성인 수 확인
            if (type === 'adult') {
                const infantCount = parseInt(document.getElementById('passenger-infant-count').textContent || '0');
                if (infantCount > newCount) {
                    document.getElementById('passenger-infant-count').textContent = newCount;
                    const infantMinusBtn = document.getElementById('passenger-infant-count').previousElementSibling;
                    if (infantMinusBtn) infantMinusBtn.disabled = newCount <= 0;
                }
            }
        };

            // 삭제 함수
            window.deleteSegment = function (btn) {
                const segment = btn.closest('.segment');
                if (!segment) return;

                // 삭제 후 재인덱싱
                reindexSegments(container);

                segmentCount--;

            // 재인덱싱 함수
            window.reindexSegments = function (container) {
                const segments = container.querySelectorAll('.segment');
                segments.forEach((seg, idx) => {
                    const inputs = seg.querySelectorAll('input');
                    inputs.forEach(input => {
                        if (input.name.includes('depart.airportCode')) {
                            input.name = `segments[${idx}].depart.airportCode`;
                        } else if (input.name.includes('arrive.airportCode')) {
                            input.name = `segments[${idx}].arrive.airportCode`;
                        } else if (input.name.includes('departDate')) {
                            input.name = `segments[${idx}].departDate`;
                        }
                    });
                });

            window.submitAirSearch = function (tripType) {
                const container = document.getElementById(`form-${tripType}`);
                if (!container) return;

                // 기본 필드 수집
                const payload = {};
                payload.tripType = tripType;
                payload.segments = [];

                // 일반 input/select
                container.querySelectorAll('input[name]:not([name^="segments"]), select[name]').forEach(el => {
                    if (el.type === 'checkbox') {
                        payload[el.name] = el.checked;
                    } else {
                        payload[el.name] = el.value.trim();
                    }
                });

                // segments 수집
                if (tripType === 'MULTI') {
                    // 다구간: segment div에서 수집
                    const segmentDivs = container.querySelectorAll('div.segment, #multi-segments > div');
                    segmentDivs.forEach(segDiv => {
                        const segment = {};
                        const departInput = segDiv.querySelector('[name$=".depart.airportCode"]');
                        const arriveInput = segDiv.querySelector('[name$=".arrive.airportCode"]');
                        const dateInput = segDiv.querySelector('[name$=".departDate"]');

                        if (!departInput && !arriveInput && !dateInput) return; // 빈 div skip

                        segment.depart = { airportCode: departInput?.value.trim() || '' };
                        segment.arrive = { airportCode: arriveInput?.value.trim() || '' };
                        segment.departDate = dateInput?.value || '';

                        payload.segments.push(segment);
                    });
                } else {
                    // 왕복/편도: 숨겨진 input 필드에서 직접 수집
                    const segmentInputs = container.querySelectorAll('input[name^="segments["]');
                    const segmentMap = {};
                    
                    segmentInputs.forEach(input => {
                        const name = input.name;
                        // segments[0].depart.airportCode 또는 segments[0].departDate 형식 파싱
                        const match = name.match(/segments\[(\d+)\]\.(depart|arrive)\.(airportCode|departDate)/);
                        if (match) {
                            const index = parseInt(match[1]);
                            const type = match[2]; // depart or arrive
                            const field = match[3]; // airportCode or departDate
                            
                            if (!segmentMap[index]) {
                                segmentMap[index] = { depart: {}, arrive: {} };
                            }
                            
                            if (field === 'departDate') {
                                segmentMap[index].departDate = input.value.trim();
                            } else {
                                segmentMap[index][type][field] = input.value.trim();
                            }
                        } else {
                            // segments[0].departDate 형식도 처리 (depart/arrive 없이)
                            const simpleMatch = name.match(/segments\[(\d+)\]\.departDate/);
                            if (simpleMatch) {
                                const index = parseInt(simpleMatch[1]);
                                if (!segmentMap[index]) {
                                    segmentMap[index] = { depart: {}, arrive: {} };
                                }
                                segmentMap[index].departDate = input.value.trim();
                            }
                        }
                    });
                    
                    // 인덱스 순서대로 배열에 추가
                    Object.keys(segmentMap).sort((a, b) => parseInt(a) - parseInt(b)).forEach(key => {
                        const segment = segmentMap[key];
                        if (segment.depart.airportCode || segment.arrive.airportCode || segment.departDate) {
                            payload.segments.push({
                                depart: { airportCode: segment.depart.airportCode || '' },
                                arrive: { airportCode: segment.arrive.airportCode || '' },
                                departDate: segment.departDate || ''
                            });
                        }
                    });
                    
                    // 디버깅: segments 수집 결과 확인
                    console.log('수집된 segments:', payload.segments);
                }

                // 입력값 누락 확인용
                const missing = [];

                // 1. 인원 수
                const adult = parseInt(payload.adultCount || 0);
                const youth = parseInt(payload.youthCount || 0);
                const infant = parseInt(payload.infantCount || 0);
                const totalPassengers = adult + youth + infant;

                if (totalPassengers <= 0) {
                    missing.push('탑승 인원 1명 이상');
                }

                // 2. 유아 > 성인
                if (infant > adult) missing.push('유아 수는 성인 수를 초과할 수 없습니다');

                // 3. 좌석 등급
                if (!payload.seatClassType) missing.push('좌석 등급');

                // 4. 세그먼트 값
                payload.segments.forEach((seg, i) => {
                    const n = i + 1;
                    if (!seg.depart.airportCode) missing.push(`구간${n} 출발 공항`);
                    if (!seg.arrive.airportCode) missing.push(`구간${n} 도착 공항`);
                    if (!seg.departDate || seg.departDate.trim() === '') {
                        missing.push(`구간${n} 출발일`);
                    }
                });
                
                // 디버깅: segments 값 확인
                console.log('검증 전 segments:', payload.segments);
                console.log('누락된 항목:', missing);

                if (missing.length > 0) {
                    alert(`다음 항목을 입력해야 합니다:\n\n- ${missing.join('\n- ')}`);
                    return;
                }

                console.log('payload:', payload);

                // 서버 전송
                fetchSection('/air/search', payload);
            };

            // 오늘 확인 함수
            window.isTodayDate = function (dateObj) {
                const now = new Date();
                return (
                    dateObj.getFullYear() === now.getFullYear() &&
                    dateObj.getMonth() === now.getMonth() &&
                    dateObj.getDate() === now.getDate()
                );
            }

            // 예약 불가 날짜인지 체크
            window.isUnavailDate = function (dateObj) {
                const inputDate = new Date(dateObj);
                const today = new Date();

                // 시분초를 제거 (날짜만 비교)
                inputDate.setHours(0, 0, 0, 0);
                today.setHours(0, 0, 0, 0);

                // 오늘로부터 2일 후 계산
                const after2Days = new Date(today);
                after2Days.setDate(today.getDate() + 2);

                // 오늘 이전이거나 오늘 이후 3일 이내
                if (inputDate < today || inputDate <= after2Days) {
                    return true;
                }
                return false;
            };

            // 달력 열기
            window.openCalendar = function () {
                daysToSelect =
                    currentFormId == "form-ROUND_TRIP" ? 2 :
                        currentFormId == "form-ONE_WAY" ? 1 :
                            segmentCount;

                console.log('daysToSelect = ', daysToSelect);

                const calendarHtml = document.getElementById('calendar-modal').innerHTML;
                // 하단 네비게이션 바 숨기기
                const footer = document.getElementById('footerSection');
                if (footer) footer.classList.add('hidden');
                openModalHtml(calendarHtml);
                renderCalendar();
            }

            window.closeCalendar = function () {
                selected = [];
                // 하단 네비게이션 바 다시 보이기
                const footer = document.getElementById('footerSection');
                if (footer) footer.classList.remove('hidden');
                closeModal()
            }

            // 달력 렌더링
            window.renderCalendar = function () {
                const container = document.getElementById('calendar');
                const today = new Date();
                const startMonth = today.getMonth();
                const startYear = today.getFullYear();

                for (let i = 0; i < 12; i++) {
                    const monthDate = new Date(startYear, startMonth + i, 1);
                    const year = monthDate.getFullYear();
                    const month = monthDate.getMonth();

                    const monthEl = document.createElement('div');
                    monthEl.className = 'month';
                    const monthName = monthDate.toLocaleString('default', { month: 'long' });
                    monthEl.innerHTML = `<h3>${year}년 ${monthName}</h3>`;

                    const table = document.createElement('table');
                    const daysOfWeek = ['일', '월', '화', '수', '목', '금', '토'];

                    // 요일 헤더
                    const headerRow = document.createElement('tr');
                    daysOfWeek.forEach(d => {
                        const th = document.createElement('th');
                        th.textContent = d;
                        headerRow.appendChild(th);
                    });
                    table.appendChild(headerRow);

                    // 날짜 셀 생성
                    const firstDay = new Date(year, month, 1).getDay();
                    const daysInMonth = new Date(year, month + 1, 0).getDate();
                    let row = document.createElement('tr');

                    // 빈칸 채우기
                    for (let i = 0; i < firstDay; i++) {
                        const td = document.createElement('td');
                        td.className = 'empty';
                        row.appendChild(td);
                    }

                    // 날짜 채우기
                    for (let day = 1; day <= daysInMonth; day++) {
                        const dateObj = new Date(year, month, day);
                        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

                        const td = document.createElement('td');
                        td.textContent = day;
                        td.dataset.date = dateStr;

                        // 예약 불가 날짜 흐리게
                        if (isUnavailDate(dateObj)) {
                            if (isTodayDate(dateObj)) {
                                td.classList.add('today');
                            } else {
                                td.classList.add('unavail');
                            }
                        }

                        // 오늘 날짜 강조

                        // 클릭 이벤트
                        td.onclick = () => selectDay(td);

                        row.appendChild(td);

                        // 줄바꿈 처리
                        if ((firstDay + day) % 7 === 0 || day === daysInMonth) {
                            table.appendChild(row);
                            row = document.createElement('tr');
                        }
                    }

                    monthEl.appendChild(table);
                    container.appendChild(monthEl);
                }
            }

        })();
    </script>

    <script>
        // 달력 선택 관련
        (function () {

            let selectedDates = [];

            // YYYY-MM-DD -> Date (00:00:00)
            window.parseDateYMD = function (ymd) {
                const [y, m, d] = ymd.split('-').map(Number);
                return new Date(y, m - 1, d, 0, 0, 0, 0);
            }

            // Date -> YYYY-MM-DD
            window.formatDateYMD = function (date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            // 모든 날짜 셀에서 range/selected 클래스 제거
            window.clearAllRangeAndSelected = function () {
                document.querySelectorAll('td[data-date].range, td[data-date].selected').forEach(td => {
                    td.classList.remove('range', 'selected');
                });
            }

            // 주어진 시작~끝(포함) 날짜까지 순회하면서 각 날짜의 td를 찾아 callback 실행
            window.forEachDateInRange = function (startDate, endDate, callback) {
                const d = new Date(startDate);
                while (d <= endDate) {
                    const ds = formatDateYMD(d);
                    const td = document.querySelector(`td[data-date="${ds}"]`);
                    if (td) callback(td, ds);
                    d.setDate(d.getDate() + 1);
                }
            }

            // 날짜 클릭 테스트
            window.selectDay = function (cell) {
                const date = cell.dataset.date;
                if (!date) return;
                console.log("선택된 날짜 클릭:", date);

                // 예약 불가 여부
                if (window.isUnavailDate && window.isUnavailDate(date)) {
                    alert(`선택된 날짜는 예약 불가능합니다.: ${date}`);
                    return;
                }

                // 중복 클릭 무시(원하면 토글로 변경 가능)
                if (selectedDates.includes(date)) {
                    console.log('이미 선택된 날짜입니다:', date);
                    return;
                }

                const clickedDate = parseDateYMD(date);

                // 1) selectedDates가 daysToSelect만큼 차있으면 배열 초기화 후 push
                if (selectedDates.length >= daysToSelect) {
                    selectedDates = [date];
                } else if (selectedDates.length > 0) {
                    // selectedDates가 비어있지 않을 때: 배열의 가장 이른 날짜와 비교
                    const firstSelectedDate = parseDateYMD(selectedDates[0]);

                    // 2) 클릭한 날짜가 기존 선택들보다 이르면 배열 초기화 후 push
                    if (clickedDate < firstSelectedDate) {
                        selectedDates = [date];
                    } else {
                        // 3) 기존 선택들보다 늦으면 그냥 push
                        selectedDates.push(date);
                    }
                } else {
                    // selectedDates가 비어있으면 그냥 push
                    selectedDates.push(date);
                }

                console.log('현재 selected 배열:', selectedDates);

                // 4) 클래스 업데이트: 기존 range/selected 제거 -> 배열 첫~마지막 날짜까지 range 클래스 추가
                clearAllRangeAndSelected();

                // 정렬 보장: selected는 논리상 오름차순이지만 안전하게 정렬 (문자열로도 YYYY-MM-DD이므로 정렬 가능)
                selectedDates.sort();

                const start = parseDateYMD(selectedDates[0]);
                const end = parseDateYMD(selectedDates[selectedDates.length - 1]);

                // start~end에 대해 range 클래스 추가
                forEachDateInRange(start, end, (td) => {
                    td.classList.add('range');
                });

                // 배열 내 날짜들에는 selected 클래스 추가 (우선순위: selected 위에 range 있어도 함께 유지)
                selectedDates.forEach(ds => {
                    const td = document.querySelector(`td[data-date="${ds}"]`);
                    if (td) {
                        td.classList.add('selected');
                        td.classList.remove('range');
                    }
                });

                // footer 텍스트 갱신
                updateFooterStatus();
            };

            window.updateFooterStatus = function () {
                const textEl = document.getElementById('selected-date-text');
                const btn = document.getElementById('calendar-apply-btn');

                if (!textEl || !btn) return;

                if (selectedDates.length === 0) {
                    textEl.textContent = '날짜를 선택하세요';
                    btn.disabled = true;
                    return;
                }

                const start = selectedDates[0];
                const end = selectedDates[selectedDates.length - 1];

                // 날짜 형식 변환: YYYY-MM-DD -> YY.MM.DD
                function formatDateForButton(dateStr) {
                    const [y, m, d] = dateStr.split('-');
                    return `${y.slice(2)}.${m}.${d}`;
                }

                // ✅ 날짜 요약 표시
                if (selectedDates.length === 1) {
                    textEl.textContent = `${formatDateForButton(start)} 선택 중`;
                } else {
                    textEl.textContent = `${formatDateForButton(start)} ~ ${formatDateForButton(end)} 적용하기`;
                }

                // ✅ 버튼 활성화 조건
                if (selectedDates.length === daysToSelect) {
                    btn.disabled = false;
                } else {
                    btn.disabled = true;
                }
            };

            window.confirmSelectedDates = function () {
                if (!currentFormId) {
                    console.warn("currentFormId가 설정되지 않았습니다.");
                    return;
                }

                if (selectedDates.length === 0) {
                    alert("날짜를 선택하세요.");
                    return;
                }

                selectedDates.sort();

                // 현재 폼 내 date input 목록 가져오기
                const form = document.getElementById(currentFormId);
                if (!form) {
                    console.warn("폼을 찾을 수 없습니다.");
                    return;
                }

                // 날짜 input 필드 찾기 (segments[].departDate 형식)
                const dateInputs = form.querySelectorAll('input[type="date"][name*="departDate"]');
                if (dateInputs.length === 0) {
                    console.warn("날짜 입력란이 없습니다. currentFormId:", currentFormId);
                    console.warn("폼 내 모든 input:", Array.from(form.querySelectorAll('input')).map(input => ({ name: input.name, type: input.type })));
                    return;
                }
                
                // 날짜 input을 인덱스 순서대로 정렬 (segments[0], segments[1], ...)
                const sortedDateInputs = Array.from(dateInputs).sort((a, b) => {
                    const matchA = a.name.match(/segments\[(\d+)\]/);
                    const matchB = b.name.match(/segments\[(\d+)\]/);
                    const indexA = matchA ? parseInt(matchA[1]) : 999;
                    const indexB = matchB ? parseInt(matchB[1]) : 999;
                    return indexA - indexB;
                });
                
                console.log('찾은 날짜 입력 필드 (정렬됨):', sortedDateInputs.map(input => ({ name: input.name, value: input.value })));

                // 선택된 날짜를 순서대로 입력
                const count = Math.min(selectedDates.length, sortedDateInputs.length);
                for (let i = 0; i < count; i++) {
                    sortedDateInputs[i].value = selectedDates[i];
                    // 값이 제대로 설정되었는지 확인
                    console.log(`날짜 입력 ${i}: ${sortedDateInputs[i].name} = ${sortedDateInputs[i].value}`);
                }
                
                // 왕복 검색의 경우 두 번째 날짜가 없으면 경고
                if (currentFormId === 'form-ROUND_TRIP' && count < 2) {
                    console.warn('왕복 검색인데 날짜가 2개 선택되지 않았습니다. 선택된 날짜:', selectedDates.length);
                }

                // 날짜 표시 업데이트
                updateDateDisplay();

                // 모달 닫기 전에 값이 제대로 설정되었는지 확인
                console.log('날짜 설정 완료. 입력 필드 값:', Array.from(dateInputs).map(input => ({ name: input.name, value: input.value })));

                selectedDates = [];
                closeModal();
            }


        })();
    </script>
    <script>
        var currentCityMode = null; // 'depart' || 'arrive'
        var currentCityInput = null;
        var citySearchTimer = null;
        var isCityInputFocused = false;

        (function () {

            window.openCityModal = function (mode, inputEl) {
                currentCityMode = mode;
                currentCityInput = inputEl;

                // 하단 네비게이션 바 숨기기
                const footer = document.getElementById('footerSection');
                if (footer) footer.classList.add('hidden');

                const html = document.getElementById('city-select-modal').innerHTML;
                openModalHtml(html);

                const titleEl = document.getElementById('cityModalTitle');
                if (titleEl) {
                    titleEl.textContent = mode === 'depart' ? '출발지 선택' : '도착지 선택';
                }
            }

            window.filterCityList = function (keyword) {
                clearTimeout(citySearchTimer);

                const groupList = document.getElementById('cityGroupList');
                const searchResults = document.getElementById('citySearchResults');
                const searchList = document.getElementById('citySearchList');

                let query = keyword.trim();

                // 입력이 없으면 → 기본 목록 표시
                if (query.length === 0) {
                    if (groupList) groupList.style.display = 'block';
                    if (searchResults) searchResults.style.display = 'none';
                    if (searchList) searchList.innerHTML = '';
                    return;
                }

                // 검색어가 있으면 검색 결과 표시
                if (groupList) groupList.style.display = 'none';
                if (searchResults) searchResults.style.display = 'block';

                if (!searchList) return;

                searchList.innerHTML = '';

                citySearchTimer = setTimeout(() => {
                    // blur 되었다면 fetch 실행 안함
                    if (!isCityInputFocused) return;

                    searchList.innerHTML = '<li class="city-result-item">검색 중...</li>';

                    fetch(`/api/code/search?keyword=${encodeURIComponent(query)}`)
                        .then(res => res.json())
                        .then(data => {
                            if (!isCityInputFocused) return;
                            renderCitySearchResults(data);
                        })
                        .catch(err => {
                            searchList.innerHTML = '<li class="city-result-item">검색 실패. 다시 시도해주세요.</li>';
                        });

                }, 500);
            };

            function renderCitySearchResults(data) {
                const list = document.getElementById("citySearchList");
                list.innerHTML = '';

                if (!data || data.length === 0) {
                    list.innerHTML = '<li class="city-result-item">검색된 결과가 없습니다.</li>';
                    return;
                }

                data.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'city-result-item';
                    li.innerHTML = `
                        <div class="city-result-name">${item.cityKor}</div>
                        <div class="city-result-code">${item.airportCode}</div>
                    `;
                    li.onclick = function() {
                        const btn = document.createElement('button');
                        btn.dataset.code = item.airportCode;
                        btn.dataset.name = item.cityKor;
                        selectCity(btn);
                    };
                    list.appendChild(li);
                });
            }

            window.handleCitySearchFocus = function() {
                const input = document.getElementById('citySearchInput');
                const query = input.value.trim();
                if (query.length > 0) {
                    filterCityList(query);
                }
            };

            window.selectCity = function (btn) {
                const cityCode = btn.dataset.code;
                const cityName = btn.dataset.name;

                if (!currentCityInput) return;

                // 실제 form input에는 공항 코드 저장
                currentCityInput.value = cityCode;

                // input 옆에 도시명 라벨이 있으면 업데이트
                let label = currentCityInput.nextElementSibling;
                if (!label || !label.classList.contains('city-label')) {
                    label = document.createElement('span');
                    label.className = 'city-label';
                    label.style.marginLeft = '6px';
                    label.style.fontWeight = 'bold';
                    currentCityInput.insertAdjacentElement('afterend', label);
                }
                label.textContent = cityName;

                console.log(`선택됨 → ${cityName} (${cityCode})`);

                // 화면에 표시 업데이트
                if (currentFormId === "form-ROUND_TRIP") {
                    const name = currentCityInput.name;
                    
                    if (name === "segments[0].depart.airportCode") {
                        document.getElementById('depart-city-name').textContent = cityName;
                        document.getElementById('depart-city-code').textContent = cityCode;
                        document.getElementById('depart-city-name').parentElement.parentElement.classList.remove('placeholder');
                        
                        const hiddenArrive1 = document.querySelector('input[name="segments[1].arrive.airportCode"]');
                        if (hiddenArrive1) hiddenArrive1.value = cityCode;
                    } else if (name === "segments[0].arrive.airportCode") {
                        document.getElementById('arrive-city-name').textContent = cityName;
                        document.getElementById('arrive-city-code').textContent = cityCode;
                        document.getElementById('arrive-city-name').parentElement.parentElement.classList.remove('placeholder');
                        
                        const hiddenDepart1 = document.querySelector('input[name="segments[1].depart.airportCode"]');
                        if (hiddenDepart1) hiddenDepart1.value = cityCode;
                    }
                } else if (currentFormId === "form-ONE_WAY") {
                    const name = currentCityInput.name;
                    
                    if (name === "segments[0].depart.airportCode") {
                        document.getElementById('oneway-depart-city-name').textContent = cityName;
                        document.getElementById('oneway-depart-city-code').textContent = cityCode;
                        document.getElementById('oneway-depart-city-name').parentElement.parentElement.classList.remove('placeholder');
                    } else if (name === "segments[0].arrive.airportCode") {
                        document.getElementById('oneway-arrive-city-name').textContent = cityName;
                        document.getElementById('oneway-arrive-city-code').textContent = cityCode;
                        document.getElementById('oneway-arrive-city-name').parentElement.parentElement.classList.remove('placeholder');
                    }
                } else if (currentFormId === "form-MULTI") {
                    // 다구간 폼의 경우 해당 세그먼트 찾기
                    const segment = currentCityInput.closest('.segment');
                    if (segment) {
                        const cityCards = segment.querySelectorAll('.air-search-city-card');
                        const cityNames = segment.querySelectorAll('.air-search-city-name');
                        const cityCodes = segment.querySelectorAll('.air-search-city-code');
                        
                        if (currentCityInput.name.includes('.depart.airportCode')) {
                            if (cityCards[0] && cityNames[0] && cityCodes[0]) {
                                cityNames[0].textContent = cityName;
                                cityCodes[0].textContent = cityCode;
                                cityCards[0].classList.remove('placeholder');
                            }
                        } else if (currentCityInput.name.includes('.arrive.airportCode')) {
                            if (cityCards[1] && cityNames[1] && cityCodes[1]) {
                                cityNames[1].textContent = cityName;
                                cityCodes[1].textContent = cityCode;
                                cityCards[1].classList.remove('placeholder');
                            }
                            
                            // 도착지 선택 시 다음 구간의 출발지로 자동 입력
                            const match = currentCityInput.name.match(/segments\[(\d+)\]\.arrive\.airportCode/);
                            if (match) {
                                const currentIndex = parseInt(match[1]);
                                const nextIndex = currentIndex + 1;
                                
                                // 다음 구간의 출발지 input 찾기
                                const nextDepartInput = document.querySelector(`input[name="segments[${nextIndex}].depart.airportCode"]`);
                                if (nextDepartInput) {
                                    nextDepartInput.value = cityCode;
                                    
                                    // 다음 구간의 출발지 카드 업데이트
                                    const nextSegment = nextDepartInput.closest('.segment');
                                    if (nextSegment) {
                                        const nextCityCards = nextSegment.querySelectorAll('.air-search-city-card');
                                        const nextCityNames = nextSegment.querySelectorAll('.air-search-city-name');
                                        const nextCityCodes = nextSegment.querySelectorAll('.air-search-city-code');
                                        
                                        if (nextCityCards[0] && nextCityNames[0] && nextCityCodes[0]) {
                                            nextCityNames[0].textContent = cityName;
                                            nextCityCodes[0].textContent = cityCode;
                                            nextCityCards[0].classList.remove('placeholder');
                                        }
                                    }
                                }
                            }
                        }
                    }
                }

                // 하단 네비게이션 바 다시 보이기
                const footer = document.getElementById('footerSection');
                if (footer) footer.classList.remove('hidden');

                closeModal();
            };

        })();

    </script>
</div>
