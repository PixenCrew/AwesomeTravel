<div class="compare-container">
    <style>
        .compare-container {
            width: 100%;
        }

        .compare-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .compare-date-summary {
            text-align: center;
            font-size: 13px;
            color: #7d7d7d;
            margin-bottom: 12px;
            letter-spacing: -0.01em;
        }

        .compare-card {
            background: #f7f7f9;
            border-radius: 18px;
            padding: 18px 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-height: 100%;
        }

        .compare-card-title {
            font-size: 15px;
            font-weight: 600;
            color: #111;
            line-height: 1.4;
        }

        .compare-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .compare-field-label {
            font-size: 12px;
            color: #9e9e9e;
            letter-spacing: -0.01em;
        }

        .compare-field-value {
            font-size: 14px;
            font-weight: 600;
            color: #111;
            border: 1px solid #ededed;
            border-radius: 12px;
            padding: 10px 12px;
            background: #fff;
            min-height: 42px;
            display: flex;
            align-items: center;
        }

        .compare-detail-btn {
            width: 100%;
            height: 44px;
            border-radius: 12px;
            background: #111;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            margin-top: auto;
        }
    </style>

    <div class="compare-date-summary" th:if="${compareDepartDate != null}">
        <span th:text="${#temporals.format(compareDepartDate, 'yyyy.MM.dd')} + ' 출발 기준'">2025.03.02 출발 기준</span>
    </div>

    <div class="compare-grid" th:if="${compareList != null}">
        <div class="compare-card" th:each="item : ${compareList}">

            <h3 class="compare-card-title" th:text="${item.title}">상품명</h3>

            <div class="compare-field">
                <span class="compare-field-label">가격</span>
                <span class="compare-field-value" th:text="${item.priceLabel}">990,000원</span>
            </div>

            <div class="compare-field">
                <span class="compare-field-label">출발일</span>
                <span class="compare-field-value" th:text="${item.departDateLabel}">2025.03.02</span>
            </div>

            <div class="compare-field">
                <span class="compare-field-label">귀국일</span>
                <span class="compare-field-value" th:text="${item.returnDateLabel}">2025.03.03</span>
            </div>

            <div class="compare-field">
                <span class="compare-field-label">출발지</span>
                <span class="compare-field-value" th:text="${item.departLabel}">인천 (ICN)</span>
            </div>

            <div class="compare-field">
                <span class="compare-field-label">도착지</span>
                <span class="compare-field-value" th:text="${item.arriveLabel}">런던 (LON)</span>
            </div>

            <div class="compare-field">
                <span class="compare-field-label">항공사</span>
                <span class="compare-field-value" th:text="${item.airlineLabel}">아시아나항공</span>
            </div>

            <div class="compare-field">
                <span class="compare-field-label">호텔명</span>
                <span class="compare-field-value" th:text="${item.hotelLabel}">호텔명</span>
            </div>

            <div class="compare-field">
                <span class="compare-field-label">여행일정</span>
                <span class="compare-field-value" th:text="${item.tripLabel}">3일 2박</span>
            </div>

            <button type="button"
                    class="compare-detail-btn"
                    th:onclick="|openProductModal(${item.productId})|">상세보기</button>
        </div>
    </div>
</div>
