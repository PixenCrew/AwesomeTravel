<div class="compare-container">
    <style>
        .compare-container {
            width: 100%;
        }

        .compare-columns {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .compare-col {
            width: 50%;
            background: #fafafa;
            border-radius: 12px;
            padding: 12px;
        }

        .thumb-wrap img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
        }

        .title {
            margin-top: 10px;
            font-size: 15px;
            font-weight: bold;
            line-height: 1.3;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 14px;
        }

        .label {
            color: #777;
        }

        .value {
            font-weight: 600;
        }
    </style>

    <div class="compare-columns">

        <!-- ===========================
             LEFT PRODUCT
        ============================ -->
        <div class="compare-col" th:with="p=${list[0]}">

            <div class="thumb-wrap">
                <img th:src="${p.thumbnail}" alt="상품1 이미지">
            </div>

            <h3 class="title" th:text="${p.title}"></h3>

            <div class="info-row">
                <span class="label">상품유형</span>
                <span class="value" th:text="${p.productType}"></span>
            </div>

            <div class="info-row">
                <span class="label">가격(성인)</span>
                <span class="value"
                    th:text="${#numbers.formatInteger(p.finalPriceAdult,3,'COMMA')} + '원'"></span>
            </div>

            <div class="info-row">
                <span class="label">출발유형</span>
                <span class="value" th:text="${p.departTimeType}"></span>
            </div>
        </div>


        <!-- ===========================
             RIGHT PRODUCT
        ============================ -->
        <div class="compare-col" th:with="p=${list[1]}">

            <div class="thumb-wrap">
                <img th:src="${p.thumbnail}" alt="상품2 이미지">
            </div>

            <h3 class="title" th:text="${p.title}"></h3>

            <div class="info-row">
                <span class="label">상품유형</span>
                <span class="value" th:text="${p.productType}"></span>
            </div>

            <div class="info-row">
                <span class="label">가격(성인)</span>
                <span class="value"
                    th:text="${#numbers.formatInteger(p.finalPriceAdult,3,'COMMA')} + '원'"></span>
            </div>

            <div class="info-row">
                <span class="label">출발유형</span>
                <span class="value" th:text="${p.departTimeType}"></span>
            </div>
        </div>
    </div>

</div>
