<div>
    <style>
        /* .compare-sheet {
            z-index: 10 !important;
        } */
    </style>
    <header class="section-header">
        <h1 th:if="${title != null}" th:text="${title}"></h1>
        <h1 th:if="${title == null}">코드선택 결과</h1>
        <div class="right">
            <i class="fas fa-chevron-left" onclick="backModal()"></i>
        </div>
    </header>

    <div th:if="${image != null}">
        <img th:src=${image}>
    </div>

    <ul class="product-list">
        <li th:each="product : ${products}" class="product-item">

            <div class="left-area" th:onclick="|addModal('/product/${product.id}')|">
                <img th:src="${product.thumbnail}" alt="썸네일"
                    class="thumb" />

                <div class="info">

                    <div class="title" th:text="${product.title}"></div>
                    <div class="type" th:text="${product.productType}"></div>

                    <!-- 타임딜이 있을 경우 -->
                    <div th:if="${product.timeDeal != null and product.timeDeal.active}">

                        <!-- 기존 가격 (취소선) -->
                        <div class="old-price">
                            <span th:text="${#numbers.formatInteger(product.timeDeal.originalPriceAdult, 3, 'COMMA') + '원'}"></span>
                        </div>

                        <!-- 할인 표시 -->
                        <div class="discount-info">
                            <span th:if="${product.timeDeal.discountType.name() == 'PERCENT'}"
                                th:text="${product.timeDeal.value + '%↓'}"></span>
                            <span th:if="${product.timeDeal.discountType.name() == 'ABSOLUTE'}"
                                th:text="${#numbers.formatInteger(product.timeDeal.value, 3, 'COMMA') + '원↓'}"></span>
                        </div>

                        <!-- 최종 가격 -->
                        <div class="price final-price">
                            <span th:text="${#numbers.formatInteger(product.finalPriceAdult, 3, 'COMMA') + '원'}"></span>
                        </div>

                        <!-- 남은 시간 -->
                        <div class="time-left"
                            th:text="${T(java.time.Duration).between(T(java.time.LocalDateTime).now(), product.timeDeal.endTime).toHours() >= 1 
                                        ? T(java.time.Duration).between(T(java.time.LocalDateTime).now(), product.timeDeal.endTime).toHours() + '시간 남음' 
                                        : T(java.time.Duration).between(T(java.time.LocalDateTime).now(), product.timeDeal.endTime).toMinutes() + '분 남음'}">
                        </div>
                    </div>

                    <!-- 타임딜이 없을 경우 일반 가격 -->
                    <div th:if="${product.timeDeal == null or !product.timeDeal.active}">
                        <div class="price" th:text="${#numbers.formatInteger(product.finalPriceAdult,3,'COMMA') + '원'}"></div>
                    </div>

                    <div class="depart" th:text="${product.departTimeType}"></div>
                </div>
            </div>

            <!-- 비교 체크박스 -->
            <div class="compare-box">
                <input type="checkbox"
                    th:id="'compare-' + ${product.id}"
                    th:value="${product.id}"
                    onchange="toggleCompare(this)">
                <label th:for="'compare-' + ${product.id}">비교하기</label>
            </div>

        </li>
    </ul>

    <!-- 비교하기 Bottom Sheet -->
    <template id="compare-sheet-template">
        <div class="compare-sheet">

            <div class="sheet-header">
                <strong>비교할 상품을 선택해주세요.</strong>
                <i class="fas fa-times close-sheet"></i>
            </div>

            <ul class="compare-list">
            </ul>

            <button class="compare-btn disabled">비교하기</button>
        </div>
    </template>


    <script>
        var compareSelected = [];               // { id, title }
        var compareSheetEl = null;              // 현재 활성 compare-sheet DOM

        // =========================
        // Compare Sheet 생성 함수
        // =========================
        function createCompareSheet() {
            if (compareSheetEl) return; // 이미 존재하면 생성 안 함

            const template = document.getElementById("compare-sheet-template");
            const clone = template.content.cloneNode(true);

            compareSheetEl = clone.querySelector(".compare-sheet");

            // 이벤트 바인딩
            compareSheetEl.querySelector(".close-sheet").onclick = closeCompareSheet;
            compareSheetEl.querySelector(".compare-btn").onclick = openCompareModal;

            // ⬇⬇ 여기만 변경됨
            document.querySelector("#halfModalBody").appendChild(compareSheetEl);

            // 하프 모달 보이게
            document.getElementById("halfModal").classList.remove("hide");
        }



        // =========================
        // Compare Sheet 제거
        // =========================
        function closeCompareSheet() {

            // 1) Compare sheet DOM 제거
            if (compareSheetEl) {
                compareSheetEl.remove();
                compareSheetEl = null;
            }

            // 2) 선택 배열 초기화
            compareSelected = [];

            // 3) 모든 체크박스 해제
            document.querySelectorAll(".compare-box input").forEach(cb => {
                cb.checked = false;
            });

            // 4) 하프 모달 닫기
            document.getElementById("halfModal").classList.add("hide");
        }



        // =========================
        // Compare Sheet 갱신
        // =========================
        function updateCompareSheet() {

            // 0개면 sheet 제거
            if (compareSelected.length === 0) {
                closeCompareSheet();
                return;
            }

            // 1개 선택된 경우 → sheet는 보이면 안됨
            if (compareSelected.length === 1) {
                // sheet가 떠 있었다면 닫기
                if (compareSheetEl) closeCompareSheet();
                return;
            }

            // sheet 없으면 생성
            if (compareSelected.length === 2) {

                // sheet 없으면 생성
                if (!compareSheetEl) {
                    createCompareSheet();
                }

                // 리스트 렌더링
                const listEl = compareSheetEl.querySelector(".compare-list");
                const compareBtn = compareSheetEl.querySelector(".compare-btn");

                listEl.innerHTML = compareSelected
                    .map(p => `
                <li>
                    ${p.title}
                    <span onclick="removeCompare('${p.id}')">삭제</span>
                </li>
            `)
                    .join("");

                compareBtn.classList.remove("disabled");
            }
        }


        // =========================
        // 상품 선택 토글 (최대 2개 제한)
        // =========================
        function toggleCompare(box) {
            const id = box.value;
            const title = box.closest("li").querySelector(".title").innerText;

            if (box.checked && compareSelected.length >= 2) {
                alert("비교는 최대 2개까지만 선택 가능합니다.");
                box.checked = false;
                return;
            }

            if (box.checked) {
                compareSelected.push({ id, title });
            } else {
                compareSelected = compareSelected.filter(p => p.id !== id);
            }

            updateCompareSheet();
        }


        // =========================
        // 비교항목 삭제
        // =========================
        function removeCompare(id) {

            const checkbox = document.getElementById(`compare-${id}`);

            if (checkbox && checkbox.checked) {
                checkbox.checked = false;

                // toggleCompare가 compareSelected와 시트를 모두 갱신함
                toggleCompare(checkbox);
                return; // 여기서 종료 → 중복 updateCompareSheet() 방지
            }

            // 체크박스가 이미 해제된 경우만 직접 제거
            compareSelected = compareSelected.filter(p => p.id !== id);

            updateCompareSheet();
        }




        // Compare Modal 
        async function openCompareModal() {

            if (compareSelected.length !== 2) {
                alert("상품 2개를 선택해야 비교할 수 있습니다.");
                return;
            }

            const ids = compareSelected.map(v => v.id).join(",");
            closeCompareSheet()
            addModal(`/product/compare?ids=${ids}`);
        }
    </script>
</div>
