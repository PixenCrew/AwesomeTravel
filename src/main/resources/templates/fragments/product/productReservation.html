<div class="reservation-form-container">
    <header class="reservation-header">
        <i class="fas fa-chevron-left back-btn" onclick="backModal()"></i>
        <h1 class="reservation-title">예약하기</h1>
        <i class="fas fa-chevron-up header-icon"></i>
    </header>

    <div class="reservation-body">
        <!-- 상품 정보 -->
        <section class="reservation-section product-info-section">
            <h2 class="section-title">상품정보</h2>
            <div class="product-info-card">
                <div class="product-image-wrapper">
                    <img th:src="${product.image}" alt="상품 이미지" class="product-image" />
                </div>
                <div class="product-details">
                    <p class="product-name" th:text="${product.title}">부산출발/ALL 포함 나트랑/달랏 풀패키지 마사지 60분 or 머드온천 선택 or 전신 마사지 120분</p>
                    <p class="product-meta">
                        <span class="meta-label">예약일:</span>
                        <span class="meta-value" th:text="${#temporals.format(T(java.time.LocalDate).now(), 'yyyy.MM.dd')}">2025.01.01</span>
                    </p>
                    <p class="product-meta">
                        <span class="meta-label">여행일정:</span>
                        <span class="meta-value" th:text="${#temporals.format(product.departDateTime, 'yyyy.MM.dd(E)')} + '~' + ${#temporals.format(product.returnDateTime, 'yyyy.MM.dd(E)')} + ' ' + ${product.bak} + '박 ' + ${product.il} + '일'">2025.02.27(목)~2025.03.03(월) 3박 5일</span>
                    </p>
                    <p class="product-meta">
                        <span class="meta-label">여행인원:</span>
                        <span class="meta-value" th:text="'성인 ' + ${passengers.?[ageGroup.name() == 'ADULT'].size()} + '명/아동 ' + ${passengers.?[ageGroup.name() == 'YOUTH'].size()} + '명/소아 ' + ${passengers.?[ageGroup.name() == 'INFANT'].size()} + '명(' + (${passengers.?[ageGroup.name() == 'ADULT'].size()} + ${passengers.?[ageGroup.name() == 'YOUTH'].size()} + ${passengers.?[ageGroup.name() == 'INFANT'].size()}) + '인)'">성인 10명/아동 0명/소아 0명(10인)</span>
                    </p>
                    <p class="product-total-price">
                        <span class="total-label">총 결제 금액:</span>
                        <span class="total-value" th:text="${#numbers.formatDecimal(finalPrice, 0, 0) + '원'}">10,850,000원</span>
                    </p>
                </div>
            </div>
        </section>

        <!-- 예약자 정보 -->
        <section class="reservation-section booker-info-section">
            <h2 class="section-title">예약자 정보</h2>
            <input type="hidden" name="productId" th:value="${product.id}" />
            <input type="hidden" name="departDate" th:value="${product.departDateTime}" />

            <div class="form-group">
                <label class="form-label">이름</label>
                <input type="text" name="bookerName" class="form-input" placeholder="이름을 입력하세요." required />
            </div>

            <div class="form-group">
                <label class="form-label">생년월일</label>
                <input type="date" name="bookerBirth" class="form-input" required />
            </div>

            <div class="form-group">
                <label class="form-label">성별</label>
                <div class="gender-buttons">
                    <label class="gender-btn selected">
                        <input type="radio" name="bookerGender" value="MALE" checked hidden />
                        <span>남자</span>
                    </label>
                    <label class="gender-btn">
                        <input type="radio" name="bookerGender" value="FEMALE" hidden />
                        <span>여자</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">휴대폰 번호</label>
                <input type="text" name="bookerPhone" class="form-input" placeholder="휴대폰 번호(숫자만 입력)" required />
            </div>

            <div class="form-group">
                <label class="form-label">이메일</label>
                <input type="email" name="bookerEmail" class="form-input" placeholder="이메일(ex. abc@astravel.kr)" required />
            </div>
        </section>

        <!-- 여행자 정보 -->
        <section class="reservation-section passenger-info-section">
            <h2 class="section-title">여행자 정보</h2>
            <div class="passenger-list">
                <div class="passenger-item" th:each="passenger, iterStat : ${passengers}">
                    <h3 class="passenger-title" 
                        th:data-age-group="${passenger.ageGroup.name()}"
                        th:data-age-group-name="${passenger.ageGroup.displayName()}"
                        th:data-index="${iterStat.index}">성인 1</h3>
                    
                    <div class="form-group">
                        <label class="form-label">이름</label>
                        <input type="text" th:name="'passengers[' + ${iterStat.index} + '].firstNameKor'" class="form-input" placeholder="이름을 입력하세요." required />
                    </div>

                    <div class="form-group">
                        <label class="form-label">생년월일</label>
                        <input type="date" th:name="'passengers[' + ${iterStat.index} + '].birth'" class="form-input" required />
                    </div>

                    <div class="form-group">
                        <label class="form-label">성별</label>
                        <div class="gender-buttons">
                            <label class="gender-btn selected">
                                <input type="radio" th:name="'passengers[' + ${iterStat.index} + '].gender'" value="MALE" checked hidden />
                                <span>남자</span>
                            </label>
                            <label class="gender-btn">
                                <input type="radio" th:name="'passengers[' + ${iterStat.index} + '].gender'" value="FEMALE" hidden />
                                <span>여자</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">휴대폰 번호</label>
                        <input type="text" th:name="'passengers[' + ${iterStat.index} + '].phone'" class="form-input" placeholder="휴대폰 번호(숫자만 입력)" />
                    </div>

                    <div class="form-group">
                        <label class="form-label">이메일</label>
                        <input type="email" th:name="'passengers[' + ${iterStat.index} + '].email'" class="form-input" placeholder="이메일(ex. abc@astravel.kr)" />
                    </div>

                    <input type="hidden" th:name="'passengers[' + ${iterStat.index} + '].ageGroup'" th:value="${passenger.ageGroup}" />
                </div>
            </div>
        </section>

        <!-- 예약신청 버튼 -->
        <div class="reservation-submit-wrapper">
            <button type="button" class="reservation-submit-btn" th:onclick="${isWaiting} ? 'openWaiterForm()' : 'submitReservationModal()'">
                예약신청
            </button>
        </div>
    </div>

    <!-- 예약대기 추가정보 입력 모달 -->
    <template id="waiting-extra-template">
        <div class="waitlist-modal-container">
            <header class="waitlist-header">
                <h1 class="waitlist-title">예약대기 신청</h1>
                <i class="fas fa-times waitlist-close-btn" onclick="backModal()"></i>
            </header>

            <div class="waitlist-body">
                <div class="waitlist-section">
                    <h2 class="waitlist-section-title">예약대기</h2>
                    <div class="waitlist-description">
                        <p>현재 이 상품은 예약 대기 상태입니다.</p>
                        <p>예약 가능 상태가 되면, 알림을 보내드립니다.</p>
                        <p>휴대폰 또는 이메일을 입력해주세요.</p>
                    </div>
                </div>

                <div class="waitlist-contact-section">
                    <h3 class="waitlist-contact-title">연락받을 수단</h3>
                    <div class="waitlist-contact-buttons">
                        <button type="button" class="waitlist-contact-btn" id="phoneBtn" onclick="selectWaitType('phone')">
                            휴대폰
                        </button>
                        <button type="button" class="waitlist-contact-btn" id="emailBtn" onclick="selectWaitType('email')">
                            이메일
                        </button>
                    </div>
                </div>

                <div class="waitlist-input-section">
                    <label class="waitlist-input-label" id="inputLabel">휴대폰</label>
                    <div id="wait-phone-box">
                        <input type="text" name="waiterNumber" class="waitlist-input" placeholder="휴대폰 번호를 입력해주세요.(ex.01012341234)">
                    </div>
                    <div id="wait-email-box" style="display:none">
                        <input type="email" name="waiterEmail" class="waitlist-input" placeholder="이메일을 입력해주세요(ex.abc@astravel.kr)">
                    </div>
                </div>

                <button type="button" class="waitlist-submit-btn" onclick="submitReservationModal()">제출하기</button>
            </div>
        </div>
    </template>

    <style>

            gap: 8px;

        .product-meta {

            color: #666;
            margin: 0;

        }

        .waitlist-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;

        .waitlist-title {

        .waitlist-close-btn {

        .waitlist-body {

        .waitlist-section {

        }

        .waitlist-section-title {

            display: block;
            font-size: 14px;
            font-weight: 500;

            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            color: #333;
            outline: none;

    <script>
        (function () {
            // 성별 버튼 선택
            document.querySelectorAll('.gender-buttons').forEach(group => {
                group.querySelectorAll('.gender-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        group.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        btn.querySelector('input[type=radio]').checked = true;
                    });
                });
            });

            window.submitReservationModal = function () {
                // 예약자 정보
                const productId = document.querySelector('input[name="productId"]').value;
                const departDate = document.querySelector('input[name="departDate"]').value;
                const bookerName = document.querySelector('input[name="bookerName"]').value;
                const bookerBirth = document.querySelector('input[name="bookerBirth"]').value;
                const bookerGender = document.querySelector('input[name="bookerGender"]:checked').value;
                const bookerPhone = document.querySelector('input[name="bookerPhone"]').value;
                const bookerEmail = document.querySelector('input[name="bookerEmail"]').value;

                // 여행자 정보
                const passengers = Array.from(document.querySelectorAll('.passenger-item')).map((div, index) => ({
                    firstNameKor: div.querySelector(`input[name='passengers[${index}].firstNameKor']`).value,
                    birth: div.querySelector(`input[name='passengers[${index}].birth']`).value,
                    gender: div.querySelector(`input[name='passengers[${index}].gender']:checked`).value,
                    phone: div.querySelector(`input[name='passengers[${index}].phone']`).value,
                    email: div.querySelector(`input[name='passengers[${index}].email']`).value,
                    ageGroup: div.querySelector(`input[name='passengers[${index}].ageGroup']`).value
                }));

                const waiterEmail = document.querySelector('input[name="waiterEmail"]')?.value;
                const waiterNumber = document.querySelector('input[name="waiterNumber"]')?.value;

                // payload 생성
                const payload = {
                    productId,
                    departDate,
                    bookerName,
                    bookerBirth,
                    bookerGender,
                    bookerPhone,
                    bookerEmail,
                    passengers,
                    waiterEmail,
                    waiterNumber
                };

                // addModal 호출 (POST)
                addModal('/product/purchase', true, payload);
            }

            window.openWaiterForm = function () {
                const tpl = document.querySelector('#waiting-extra-template').innerHTML;
                openModalHtml(tpl);
            }

            window.selectWaitType = function (type) {
                const phoneBtn = document.getElementById('phoneBtn');
                const emailBtn = document.getElementById('emailBtn');
                const phoneBox = document.getElementById("wait-phone-box");
                const emailBox = document.getElementById("wait-email-box");
                const inputLabel = document.getElementById("inputLabel");

                if (type === 'phone') {
                    phoneBtn.classList.add('active');
                    emailBtn.classList.remove('active');
                    phoneBox.style.display = "";
                    emailBox.style.display = "none";
                    inputLabel.textContent = "휴대폰";
                } else {
                    phoneBtn.classList.remove('active');
                    emailBtn.classList.add('active');
                    phoneBox.style.display = "none";
                    emailBox.style.display = "";
                    inputLabel.textContent = "이메일";
                }
            }

            // 초기화: 휴대폰 선택 상태
            setTimeout(() => {
                const phoneBtn = document.getElementById('phoneBtn');
                if (phoneBtn) {
                    phoneBtn.classList.add('active');
                }
            }, 100);

            // 여행자 제목 업데이트: ageGroup별 번호 매기기
            function updatePassengerTitles() {
                const passengerTitles = document.querySelectorAll('.passenger-title');
                const ageGroupCounts = { ADULT: 0, YOUTH: 0, INFANT: 0 };
                const ageGroupNames = {
                    'ADULT': '성인',
                    'YOUTH': '청소년',
                    'INFANT': '유아'
                };

                passengerTitles.forEach(title => {
                    const ageGroup = title.getAttribute('data-age-group');
                    const ageGroupName = title.getAttribute('data-age-group-name') || ageGroupNames[ageGroup];
                    
                    if (ageGroup) {
                        ageGroupCounts[ageGroup]++;
                        title.textContent = ageGroupName + ' ' + ageGroupCounts[ageGroup];
                    }
                });
            }

            // 페이지 로드 시 실행
            updatePassengerTitles();

        })();
    </script>
</div>
