<div>
    <header class="section-header">
        <h1>예약하기</h1>
        <div class="right">
            <i class="fas fa-chevron-left" onclick="backModal()"></i>
        </div>
    </header>

    <div class="section-body">
        <div class="modal-content">

            <!-- 상품 정보 -->
            <section id="product-info">
                <h2>상품정보</h2>
                <div class="product-detail">
                    <div class="product-img">
                        <img th:src="${product.image}" alt="상품 이미지" />
                    </div>
                    <div class="product-text">
                        <p><strong>상품명:</strong> <span th:text="${product.title}"></span></p>
                        <p><strong>예약일:</strong> <span th:text="${#temporals.format(T(java.time.LocalDate).now(), 'yyyy.MM.dd')}"></span></p>
                        <p><strong>여행일정:</strong>
                            <span th:text="${#temporals.format(product.departDateTime, 'yyyy.MM.dd')} + ' ~ ' + ${#temporals.format(product.returnDateTime, 'yyyy.MM.dd')}"></span>
                            (<span th:text="${product.bak} + '박 ' + ${product.il} + '일'"></span>)
                        </p>
                        <p><strong>여행인원:</strong> 성인 <span th:text="${passengers.?[ageGroup.name() == 'ADULT'].size()}"></span>명 /
                            아동 <span th:text="${passengers.?[ageGroup.name() == 'YOUTH'].size()}"></span>명 /
                            소아 <span th:text="${passengers.?[ageGroup.name() == 'INFANT'].size()}"></span>명
                        </p>
                        <p><strong>총 결제 금액:</strong> <span th:text="${finalPrice} + '원'"></span></p>
                    </div>
                </div>
            </section>

            <!-- 예약자 정보 -->
            <section id="booker-info">
                <h2>예약자 정보</h2>
                <input type="hidden" th:name="productId" th:value="${product.id}" />
                <input type="hidden" th:name="departDate" th:value="${product.departDateTime}" />

                <div>
                    <label>이름</label>
                    <input type="text" name="bookerName" placeholder="이름을 입력하세요." required />
                </div>
                <div>
                    <label>생년월일</label>
                    <input type="date" name="bookerBirth" placeholder="생년월일 8자리(ex.19900128)" required />
                </div>
                <div>
                    <label>성별</label>
                    <div class="button-group">
                        <label class="btn selected">
                            <input type="radio"
                                name="bookerGender"
                                value="MALE"
                                checked hidden /> 남자
                        </label>
                        <label class="btn">
                            <input type="radio"
                                th:name="bookerGender"
                                value="FEMALE"
                                hidden /> 여자
                        </label>
                    </div>
                </div>
                <div>
                    <label>휴대폰 번호</label>
                    <input type="text" name="bookerPhone" placeholder="휴대폰 번호(숫자만 입력)" required />
                </div>
                <div>
                    <label>이메일</label>
                    <input type="email" name="bookerEmail" placeholder="이메일(ex. abc@astravel.kr)" required />
                </div>
            </section>

            <section id="passenger-info">
                <!-- 여행자 정보 반복 -->
                <div class="passenger" th:each="passenger,iterStat : ${passengers}">
                    <h3>여행자 [[${iterStat.index + 1}]]</h3> (<span th:text="${passenger.ageGroup}"></span>) <!-- AgeGroup 표시 -->
                    <div>
                        <label>이름</label>
                        <input type="text" th:name="'passengers[' + ${iterStat.index} + '].lastNameKor'" placeholder="성을 입력하세요." required />
                        <input type="text" th:name="'passengers[' + ${iterStat.index} + '].firstNameKor'" placeholder="이름을 입력하세요." required />
                    </div>
                    <div>
                        <label>생년월일</label>
                        <input type="date" th:name="'passengers[' + ${iterStat.index} + '].birth'" placeholder="생년월일 8자리(ex.19900128)" required />
                    </div>
                    <div>
                        <label>연령 구분</label>
                        <input type="text" th:value="${passenger.ageGroup}" th:name="'passengers[' + ${iterStat.index} + '].ageGroup'" readonly />
                    </div>
                    <label>성별</label>
                    <div class="button-group">
                        <label class="btn selected">
                            <input type="radio"
                                th:name="'passengers[' + ${iterStat.index} + '].gender'"
                                value="MALE"
                                checked hidden /> 남자
                        </label>
                        <label class="btn">
                            <input type="radio"
                                th:name="'passengers[' + ${iterStat.index} + '].gender'"
                                value="FEMALE"
                                hidden /> 여자
                        </label>
                    </div>
                    <div>
                        <label>휴대폰 번호</label>
                        <input type="text" th:name="'passengers[' + ${iterStat.index} + '].phone'" placeholder="휴대폰 번호(숫자만 입력)" />
                    </div>
                    <div>
                        <label>이메일</label>
                        <input type="email" th:name="'passengers[' + ${iterStat.index} + '].email'" placeholder="이메일(ex. abc@astravel.kr)" />
                    </div>
                </div>
            </section>

            <footer class="modal-footer">
                <button type="button" onclick="submitReservationModal()">예약신청</button>
            </footer>
        </div>
    </div>

    <script>
        (function () {
            // 성별 버튼 선택
            document.querySelectorAll('.button-group').forEach(group => {
                group.querySelectorAll('.btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        group.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        btn.querySelector('input[type=radio]').checked = true;
                    });
                });
            });


            window.submitReservationModal = function (type, delta) {
                // 예약자 정보
                const productId = document.querySelector('input[name="productId"]').value;
                const departDate = document.querySelector('input[name="departDate"]').value;
                const bookerName = document.querySelector('input[name="bookerName"]').value;
                const bookerBirth = document.querySelector('input[name="bookerBirth"]').value;
                const bookerGender = document.querySelector('input[name="bookerGender"]').value;
                const bookerPhone = document.querySelector('input[name="bookerPhone"]').value;
                const bookerEmail = document.querySelector('input[name="bookerEmail"]').value;

                // 여행자 정보
                const passengers = Array.from(document.querySelectorAll('.passenger')).map((div, index) => ({
                    lastNameKor: div.querySelector(`input[name='passengers[${index}].lastNameKor']`).value,
                    firstNameKor: div.querySelector(`input[name='passengers[${index}].firstNameKor']`).value,
                    birth: div.querySelector(`input[name='passengers[${index}].birth']`).value,
                    gender: div.querySelector(`input[name='passengers[${index}].gender']`).value,
                    phone: div.querySelector(`input[name='passengers[${index}].phone']`).value,
                    email: div.querySelector(`input[name='passengers[${index}].email']`).value,
                    ageGroup: div.querySelector(`input[name='passengers[${index}].ageGroup']`).value
                }));

                // payload 생성
                const payload = {
                    productId,
                    departDate,
                    bookerName,
                    bookerBirth,
                    bookerGender,
                    bookerPhone,
                    bookerEmail,
                    passengers
                };

                // addModal 호출 (POST)
                addModal('/product/purchase', true, payload);
            }

        })();
    </script>
</div>
