<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<div class="product-calendar-container">
    <header class="calendar-header">
        <i class="fas fa-chevron-left back-btn" onclick="backModal()"></i>
        <h1 class="calendar-title">출발일/도착일 선택</h1>
        <div class="header-spacer"></div>
    </header>

    <div class="calendar-body">
        <!-- 캘린더 -->
        <div id='calendar'></div>

        <!-- 필터 및 정렬 -->
        <div class="calendar-filters">
            <label class="filter-checkbox">
                <input type="checkbox" id="availableOnly" onchange="filterAvailableOnly()">
                <span>예약가능 상품만 보기</span>
            </label>
            <select class="sort-select" id="sortSelect" onchange="sortProducts()">
                <option value="departure">출발일순</option>
                <option value="price">가격순</option>
            </select>
        </div>

        <!-- 선택한 날짜의 상품 목록 -->
        <div id='specificDateProduct' class="product-list-container" style="display:none;">
            <div id="productList" class="product-list">
                <!-- 상품 아이템들이 여기에 동적으로 추가됨 -->
            </div>
        </div>
    </div>

    <style>
        .product-calendar-container {
            width: 100%;
            min-height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
        }

        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }

        .calendar-header .back-btn {
            font-size: 18px;
            color: #999;
            cursor: pointer;
            padding: 4px;
            flex-shrink: 0;
        }

        .calendar-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin: 0;
            flex: 1;
            text-align: center;
        }

        .header-spacer {
            width: 26px;
        }

        .calendar-body {
            flex: 1;
            padding: 16px;
            padding-bottom: 100px;
        }

        /* FullCalendar 커스터마이징 */
        #calendar {
            margin-bottom: 24px;
        }

        .fc-header-toolbar {
            margin-bottom: 16px;
        }

        .fc-toolbar-title {
            font-size: 18px;
            font-weight: 600;
        }

        .fc-button {
            padding: 6px 12px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            font-size: 14px;
        }

        .fc-button:hover {
            background: #f5f5f5;
        }

        .fc-daygrid-day {
            cursor: pointer;
        }

        .fc-daygrid-day:hover {
            background: #f9f9f9;
        }

        /* 날짜별 가격 표시 스타일 */
        .fc-event-price-available,
        .fc-event-price-confirmed,
        .fc-event-price-wait {
            font-size: 12px;
            text-align: center;
            line-height: 1.4;
            font-weight: 600;
            padding: 4px 6px;
            border-radius: 4px;
            margin: 2px 0;
        }

        /* 예약가능 (파란색 박스) */
        .fc-event-price-available {
            background: #e3f2fd;
            color: #1976d2;
        }

        /* 출발확정 (초록색 박스) */
        .fc-event-price-confirmed {
            background: #e8f5e9;
            color: #388e3c;
        }

        .fc-event-status-confirmed {
            display: block;
            margin-top: 4px;
            font-size: 11px;
            background-color: #c8e6c9;
            color: #2e7d32;
            border-radius: 4px;
            font-weight: 600;
            padding: 2px 6px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        /* 예약대기 (초록색 박스) */
        .fc-event-price-wait {
            background: #e8f5e9;
            color: #388e3c;
        }

        .fc-event-status-wait {
            display: block;
            font-size: 11px;
            background-color: #c8e6c9;
            color: #2e7d32;
            border-radius: 4px;
            font-weight: 600;
            padding: 2px 6px;
            width: fit-content;
            margin: 4px auto 0;
        }

        /* 필터 및 정렬 */
        .calendar-filters {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 16px;
        }

        .filter-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #333;
            cursor: pointer;
        }

        .filter-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .sort-select {
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background: white;
            font-size: 14px;
            color: #333;
            cursor: pointer;
            outline: none;
        }

        /* 상품 목록 */
        .product-list-container {
            margin-top: 24px;
        }

        .product-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .product-item {
            padding: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }

        .product-item:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .product-date {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .product-description {
            font-size: 15px;
            color: #333;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .product-airline {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
        }

        .product-availability {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .product-seats {
            font-size: 13px;
            color: #666;
        }

        .product-status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .product-status-badge.available {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .product-status-badge.waiting {
            background: #fff3e0;
            color: #f57c00;
        }

        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: #f44336;
            text-align: right;
        }
    </style>

    <script th:inline="javascript">
        (function () {
            let products = /*[[${products}]]*/[];
            if (typeof products === 'string') {
                try {
                    products = JSON.parse(products);
                } catch (e) {
                    products = [];
                }
            }
            products = products || [];
            window.productsData = products; // expose for debugging
            let filteredProducts = [...products];
            let selectedDate = null;

            // FullCalendar 초기화
            let calendarEl = document.getElementById('calendar');

            let calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                height: 'auto',
                headerToolbar: {
                    left: 'prev,next',
                    center: 'title'
                },
                buttonText: {
                    today: '오늘'
                },

                eventContent: function (arg) {
                    const price = arg.event.extendedProps.price;
                    const status = arg.event.extendedProps.status;

                    let displayText = '';
                    let priceClass = '';

                    if (status === 'CONFIRMED') {
                        displayText = `${price.toLocaleString()}~ <span class="fc-event-status-confirmed">출발확정</span>`;
                        priceClass = 'fc-event-price-confirmed';
                    } else if (status === 'WAITING') {
                        displayText = '<span class="fc-event-status-wait">예약대기</span>';
                        priceClass = 'fc-event-price-wait';
                    } else {
                        displayText = `${price.toLocaleString()}~`;
                        priceClass = 'fc-event-price-available';
                    }

                    return {
                        html: `<div class="${priceClass}">${displayText}</div>`
                    };
                },

                dateClick: function (info) {
                    selectedDate = info.dateStr;
                    showProductsForDate(selectedDate);
                },

                eventClick: function (info) {
                    const clickedDate = info.event.start;
                    const dateStr = clickedDate.getFullYear() + '-' + 
                                   String(clickedDate.getMonth() + 1).padStart(2, '0') + '-' + 
                                   String(clickedDate.getDate()).padStart(2, '0');
                    selectedDate = dateStr;
                    showProductsForDate(dateStr);
                },

                events: products.map(e => ({
                    id: e.id,
                    title: e.title,
                    start: e.departDateTime,
                    extendedProps: {
                        id: e.id,
                        departDate: e.departDateTime,
                        price: e.price,
                        status: e.status,
                        remainSeats: e.remainSeats,
                        airline: e.airline,
                        description: e.description
                    }
                }))
            });

            calendar.render();

            // 날짜별 상품 표시
            function showProductsForDate(dateStr) {
                const container = document.getElementById('specificDateProduct');
                const productList = document.getElementById('productList');

                const matchingProducts = filteredProducts.filter(p => {
                    const departDate = new Date(p.departDateTime);
                    const dateStrFormatted = departDate.getFullYear() + '-' + 
                                            String(departDate.getMonth() + 1).padStart(2, '0') + '-' + 
                                            String(departDate.getDate()).padStart(2, '0');
                    return dateStrFormatted === dateStr;
                });

                productList.innerHTML = '';

                if (matchingProducts.length > 0) {
                    matchingProducts.forEach(p => {
                        const departDate = new Date(p.departDateTime);
                        const returnDate = new Date(p.returnDateTime);
                        const days = ['일', '월', '화', '수', '목', '금', '토'];
                        
                        const departDateStr = `${departDate.getFullYear()}.${String(departDate.getMonth() + 1).padStart(2, '0')}.${String(departDate.getDate()).padStart(2, '0')}(${days[departDate.getDay()]}) ${String(departDate.getHours()).padStart(2, '0')}:${String(departDate.getMinutes()).padStart(2, '0')}`;
                        const returnDateStr = `${returnDate.getFullYear()}.${String(returnDate.getMonth() + 1).padStart(2, '0')}.${String(returnDate.getDate()).padStart(2, '0')}(${days[returnDate.getDay()]})`;

                        const statusBadge = p.status === 'WAITING' 
                            ? '<span class="product-status-badge waiting">예약대기</span>'
                            : '<span class="product-status-badge available">예약가능</span>';

                        const item = document.createElement('div');
                        item.className = 'product-item';
                        item.innerHTML = `
                            <div class="product-date">${departDateStr} ~ ${returnDateStr}</div>
                            <div class="product-description">${p.title || ''} ${p.description || ''}</div>
                            <div class="product-airline">${p.airline || ''}</div>
                            <div class="product-availability">
                                <span class="product-seats">(잔여 ${p.remainSeats || 0}석) ${p.status === 'WAITING' ? '예약대기' : '예약가능'}</span>
                                ${statusBadge}
                            </div>
                            <div class="product-price">${(p.price || 0).toLocaleString()}원</div>
                        `;

                        const departDateOnly = p.departDateTime.split('T')[0];
                        const fetchTarget = `/product/detail/${p.id}?departDate=${encodeURIComponent(departDateOnly)}`;
                        item.addEventListener('click', () => {
                            addModal(fetchTarget);
                        });

                        productList.appendChild(item);
                    });
                    container.style.display = 'block';
                } else {
                    container.style.display = 'none';
                }
            }

            // 예약가능 상품만 필터링
            window.filterAvailableOnly = function() {
                const checkbox = document.getElementById('availableOnly');
                if (checkbox.checked) {
                    filteredProducts = products.filter(p => p.status !== 'WAITING' && (p.remainSeats || 0) > 0);
                } else {
                    filteredProducts = [...products];
                }
                sortProducts();
                if (selectedDate) {
                    showProductsForDate(selectedDate);
                }
            };

            // 정렬
            window.sortProducts = function() {
                const sortSelect = document.getElementById('sortSelect');
                const sortBy = sortSelect.value;

                if (sortBy === 'departure') {
                    filteredProducts.sort((a, b) => new Date(a.departDateTime) - new Date(b.departDateTime));
                } else if (sortBy === 'price') {
                    filteredProducts.sort((a, b) => (a.price || 0) - (b.price || 0));
                }

                if (selectedDate) {
                    showProductsForDate(selectedDate);
                }
            };

        })();
    </script>
</div>
