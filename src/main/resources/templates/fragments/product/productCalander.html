<div>
    <header class="section-header">
        <h1>출발일 선택</h1>
        <div class="right">
            <i class="fas fa-chevron-left" onclick="backModal()"></i>
        </div>
    </header>

    <div class="section-body">
        <div id='calendar'></div>
        <div id='specificDateProduct' style="display:none; border:2px solid #000; padding:10px;">
            <ul id="productList">
                <li class="product-id"></li>
                <li class="product-title"></li>
                <li class="product-depart"></li>
                <li class="product-return"></li>
                <li class="product-price"></li>
                <li class="product-remainSeats"></li>
                <li class="product-status"></li>
            </ul>
        </div>
    </div>

    <style>
        /* 공통 이벤트 스타일 */
        .fc-event-price-available,
        .fc-event-price-confirmed,
        .fc-event-price-wait {
            font-size: 8px;
            text-align: center;
            line-height: 1.4;
            font-weight: 500;
            padding: 3px 0;
        }

        /* 예약가능 (가격만) */
        .fc-event-price-available {
            color: #111;
        }

        /* 출발확정 */
        .fc-event-price-confirmed {
            color: #0a5;
        }

        .fc-event-status-confirmed {
            display: block;
            /* 줄바꿈 */
            margin-top: 3px;
            font-size: 11px;
            background-color: #e6f8ec;
            color: #0a5;
            border-radius: 4px;
            font-weight: 600;
            padding: 2px 6px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        /* 예약대기 */
        .fc-event-price-wait {
            color: #777;
        }

        .fc-event-status-wait {
            display: block;
            /* 줄바꿈 */
            font-size: 11px;
            background-color: #f5f5f5;
            color: #777;
            border-radius: 4px;
            font-weight: 600;
            padding: 2px 6px;
            width: fit-content;
            margin: 3px auto 0;
        }
    </style>

    <script th:inline="javascript">
        (function () {

            // 1️⃣ Java 객체 리스트 → JS 객체로 변환
            let products = /*[[${products}]]*/[];

            // 2️⃣ FullCalendar 초기화
            let calendarEl = document.getElementById('calendar');

            let calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                height: 'auto',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title'
                },

                // eventContent: function (arg) {
                //     const price = arg.event.extendedProps.price;
                //     const status = arg.event.extendedProps.status;

                //     let displayText = '';
                //     let priceClass = '';

                //     if (status === 'CONFIRMED') {
                //         displayText = `${price.toLocaleString()}~ <span class="fc-event-status-confirmed">출발확정</span>`;
                //         priceClass = 'fc-event-price-confirmed';
                //     } else if (status === 'WAITING') {
                //         displayText = '<span class="fc-event-status-wait">예약대기</span>';
                //         priceClass = 'fc-event-price-wait';
                //     } else {
                //         // 기본 형식 (AVAILABLE)
                //         displayText = `${price.toLocaleString()}~`;
                //         priceClass = 'fc-event-price-available';
                //     }

                //     return {
                //         html: `<div class="${priceClass}">${displayText}</div>`
                //     };
                // },

                eventContent: function (arg) {
                    const price = arg.event.extendedProps.price;
                    const originalPrice = arg.event.extendedProps.originalPrice;
                    const discountType = arg.event.extendedProps.discountType;
                    const discountValue = arg.event.extendedProps.discountValue;
                    const status = arg.event.extendedProps.status;
                    const hasTimeDeal = arg.event.extendedProps.hasTimeDeal;

                    let html = "";

                    if (hasTimeDeal) {
                        // 기존가 취소선
                        html += `
                                    <div class="fc-old-price" style="text-decoration:line-through;color:#999;font-size:10px;">
                                        ${originalPrice.toLocaleString()}원
                                    </div><br>
                                `;

                        // 할인 정보
                        if (discountType === 'PERCENT') {
                            html += `
                                        <div class="fc-discount" style="color:#d93025;font-weight:600;font-size:11px;">
                                            🔥 ${discountValue}%↓
                                        </div><br>
                                    `;
                        } else {
                            html += `
                                        <div class="fc-discount" style="color:#d93025;font-weight:600;font-size:11px;">
                                            🔥 ${discountValue.toLocaleString()}원↓
                                        </div><br>
                                    `;
                        }

                        // 최종가격
                        html += `
                                    <div class="fc-final-price" style="font-weight:bold;font-size:13px;">
                                        ${price.toLocaleString()}원~
                                    </div><br>
                                `;
                    } else {
                        // 일반가
                        html += `<div class="fc-price">${price.toLocaleString()}원~</div>`;
                    }

                    // 상태 표시
                    if (status === 'CONFIRMED') {
                        html += `<span class="fc-event-status-confirmed">출발확정</span>`;
                    } else if (status === 'WAITING') {
                        html += `<span class="fc-event-status-wait">예약대기</span>`;
                    }

                    return { html: html };
                },

                // 클릭 시 동작
                eventClick: function (info) {
                    const clickedDate = info.event.start;
                    const container = document.getElementById('specificDateProduct');
                    const template = document.getElementById('productList');

                    if (!container || !template) return;

                    // 클릭한 날짜와 일치하는 products
                    const matchingProducts = products.filter(p => {
                        const departDate = new Date(p.departDateTime);
                        return departDate.toDateString() === clickedDate.toDateString();
                    });

                    // 기존 내용 초기화
                    container.innerHTML = '';

                    if (matchingProducts.length > 0) {
                        matchingProducts.forEach(p => {
                            // 템플릿 복제
                            const clone = template.cloneNode(true);

                            // 값 채우기
                            clone.querySelector('.product-id').textContent = `ID: ${p.id}`;
                            clone.querySelector('.product-title').textContent = `Title: ${p.title}`;
                            clone.querySelector('.product-depart').textContent = `Depart: ${p.departDateTime}`;
                            clone.querySelector('.product-return').textContent = `Return: ${p.returnDateTime}`;
                            // clone.querySelector('.product-price').textContent = `Price: ${p.price}`;
                            clone.querySelector('.product-remainSeats').textContent = `Remain Seats: ${p.remainSeats}`;
                            clone.querySelector('.product-status').textContent = `Status: ${p.status}`;
                            let priceHtml = "";

                            // 타임딜 여부
                            if (p.originalPrice != null) {
                                priceHtml += `
                                                <div style="text-decoration:line-through;color:#999;">
                                                    기존가: ${p.originalPrice.toLocaleString()}원
                                                </div>
                                            `;

                                if (p.discountType === "PERCENT") {
                                    priceHtml += `
                                                    <div style="color:#d93025;font-weight:bold;">
                                                        🔥 ${p.discountValue}%↓
                                                    </div>
                                                `;
                                } else {
                                    priceHtml += `
                                                    <div style="color:#d93025;font-weight:bold;">
                                                        🔥 ${p.discountValue.toLocaleString()}원↓
                                                    </div>
                                                `;
                                }

                                priceHtml += `
                                                <div style="font-weight:bold;">
                                                    최종가: ${p.price.toLocaleString()}원
                                                </div>
                                            `;
                            } else {
                                priceHtml += `
                                                <div>가격: ${p.price.toLocaleString()}원</div>
                                            `;
                            }

                            // 반영
                            clone.querySelector('.product-price').innerHTML = priceHtml;

                            // fetchTarget
                            const departDate = p.departDateTime.split('T')[0];
                            const fetchTarget = `/product/detail/${p.id}?departDate=${encodeURIComponent(departDate)}`;
                            clone.addEventListener('click', () => {
                                console.log("fetchSection to " + fetchTarget);

                                addModal(fetchTarget);
                            });

                            container.appendChild(clone);
                        });
                        container.style.display = 'block';
                    } else {
                        container.textContent = '선택한 날짜에 패키지가 없습니다.';
                        container.style.display = 'block';
                    }
                },

                // 이벤트 리스트
                events: products.map(e => ({
                    id: e.id,
                    title: e.title,
                    start: e.departDateTime,
                    extendedProps: {
                        id: e.id,
                        departDate: e.departDateTime,
                        price: e.price,                 // 최종가
                        originalPrice: e.originalPrice, // 기존가
                        discountType: e.discountType,
                        discountValue: e.discountValue,
                        status: e.status,
                        hasTimeDeal: e.originalPrice != null
                    }
                }))

            });

            calendar.render();

        })();

    </script>
</div>
