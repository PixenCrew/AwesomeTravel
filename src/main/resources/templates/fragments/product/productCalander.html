<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<div class="product-calendar-container">
    <header class="calendar-header">
        <i class="fas fa-chevron-left back-btn" onclick="backModal()"></i>
        <h1 class="calendar-title">출발일/도착일 선택</h1>
        <div class="header-spacer"></div>
    </header>

    <div class="calendar-body">
        <!-- 예약 가능한 일정 없음 안내 -->
        <div class="no-product-message" th:if="${hasNoProducts == true}">
            <div class="no-product-icon">
                <i class="fas fa-exclamation-circle"></i>
            </div>
            <h2 class="no-product-title">현재 예약 가능한 일정이 없습니다</h2>
            <p class="no-product-description" th:text="|'${productTitle}' 상품은 선택하신 기간에 예약 가능한 일정이 없습니다. 다른 날짜를 확인해 주세요.|">상품은 선택하신 기간에 예약 가능한 일정이 없습니다. 다른 날짜를 확인해 주세요.</p>
        </div>

        <!-- 캘린더 (항공권이 있는 경우만 표시) -->
        <div th:if="${hasNoProducts != true}">
            <div id='calendar'></div>

            <!-- 필터 및 정렬 -->
            <div class="calendar-filters">
                <label class="filter-checkbox">
                    <input type="checkbox" id="availableOnly" onchange="applyFilters()">
                    <span>예약가능 상품만 보기</span>
                </label>
                <select class="filter-select" id="seatClassFilter" onchange="applyFilters()">
                    <option value="">전체 좌석 등급</option>
                    <option value="이코노미">이코노미</option>
                    <option value="프리미엄 이코노미">프리미엄 이코노미</option>
                    <option value="비즈니스">비즈니스</option>
                    <option value="퍼스트">퍼스트</option>
                </select>
                <select class="sort-select" id="sortSelect" onchange="sortProducts()">
                    <option value="departure">출발일순</option>
                    <option value="price">가격순</option>
                </select>
            </div>

            <!-- 선택한 날짜의 상품 목록 -->
            <div id='specificDateProduct' class="product-list-container" style="display:none;">
                <div id="productList" class="product-list">
                    <!-- 상품 아이템들이 여기에 동적으로 추가됨 -->
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        (function () {
            // 🔧 달력용: JSON 문자열로 전달되어 파싱 (좌석등급 필터 등 동작 보장)
            let calendarProducts = [];
            try {
                const calendarProductsJson = /*[[${calendarProductsJson}]]*/ '[]';
                calendarProducts = typeof calendarProductsJson === 'string' ? JSON.parse(calendarProductsJson) : (calendarProductsJson || []);
            } catch (e) {
                console.warn('calendarProducts parse error', e);
            }
            calendarProducts = Array.isArray(calendarProducts) ? calendarProducts : [];
            
            // 🔧 하단 리스트용: 날짜별로 그룹화된 모든 선택 가능한 항공 조합 (JSON 문자열 파싱)
            let listProductsByDate = {};
            try {
                const listProductsByDateJson = /*[[${listProductsByDateJson}]]*/ '{}';
                listProductsByDate = typeof listProductsByDateJson === 'string' ? JSON.parse(listProductsByDateJson) : (listProductsByDateJson || {});
            } catch (e) {
                console.warn('listProductsByDate parse error', e);
            }
            listProductsByDate = listProductsByDate && typeof listProductsByDate === 'object' && !Array.isArray(listProductsByDate) ? listProductsByDate : {};
            
            // 🔧 호환성을 위해 products 변수도 유지 (기존 코드와의 호환)
            let products = calendarProducts; // 달력용 데이터를 products로도 노출
            window.productsData = calendarProducts; // expose for debugging
            let filteredProducts = [...calendarProducts]; // 달력용으로 필터링
            let selectedDate = null;
            
            // 🔧 하단 리스트용 전역 상태 변수
            let currentListProducts = []; // 선택한 날짜의 "원본" 하단 상품
            let filteredListProducts = []; // 필터/정렬 후 결과

            // FullCalendar 초기화
            let calendarEl = document.getElementById('calendar');

            let calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                height: 'auto',
                headerToolbar: {
                    left: 'prev',
                    center: 'title',
                    right: 'next'
                },
                buttonText: {
                    today: '오늘'
                },

                // 날짜 셀에 클래스 추가 - 예약가능한 날짜 하이라이트
                dayCellClassNames: function(arg) {
                    // 로컬 날짜로 변환 (시간대 문제 방지)
                    const calendarDate = arg.date;
                    const dateStr = calendarDate.getFullYear() + '-' + 
                        String(calendarDate.getMonth() + 1).padStart(2, '0') + '-' + 
                        String(calendarDate.getDate()).padStart(2, '0');
                    const classes = [];
                    
                    // 해당 날짜의 이벤트 찾기 (달력용 데이터 사용)
                    for (let i = 0; i < calendarProducts.length; i++) {
                        const product = calendarProducts[i];
                        if (product.departDateTime) {
                            // product.departDateTime을 로컬 날짜로 파싱
                            const productDate = new Date(product.departDateTime);
                            const productDateStr = productDate.getFullYear() + '-' + 
                                String(productDate.getMonth() + 1).padStart(2, '0') + '-' + 
                                String(productDate.getDate()).padStart(2, '0');
                            
                            if (productDateStr === dateStr) {
                                // 이벤트가 있는 날짜
                                const status = product.status;
                                if (status === 'WAITING') {
                                    classes.push('has-waiting');
                                } else if (status === 'CONFIRMED') {
                                    classes.push('has-confirmed');
                                } else {
                                    classes.push('has-available');
                                }
                                break;
                            }
                        }
                    }
                    
                    return classes;
                },

                // eventContent: function (arg) {
                //     const price = arg.event.extendedProps.price;
                //     const status = arg.event.extendedProps.status;

                //     let displayText = '';
                //     let priceClass = '';

                //     if (status === 'CONFIRMED') {
                //         displayText = `${price.toLocaleString()}~ <span class="fc-event-status-confirmed">출발확정</span>`;
                //         priceClass = 'fc-event-price-confirmed';
                //     } else if (status === 'WAITING') {
                //         displayText = '<span class="fc-event-status-wait">예약대기</span>';
                //         priceClass = 'fc-event-price-wait';
                //     } else {
                //         // 기본 형식 (AVAILABLE)
                //         displayText = `${price.toLocaleString()}~`;
                //         priceClass = 'fc-event-price-available';
                //     }

                //     return {
                //         html: `<div class="${priceClass}">${displayText}</div>`
                //     };
                // },

                eventContent: function (arg) {
                    const price = arg.event.extendedProps.price;
                    const originalPrice = arg.event.extendedProps.originalPrice;
                    const discountType = arg.event.extendedProps.discountType;
                    const discountValue = arg.event.extendedProps.discountValue;
                    const status = arg.event.extendedProps.status;
                    const hasTimeDeal = arg.event.extendedProps.hasTimeDeal;
                    const remainSeats = arg.event.extendedProps.remainSeats || 0;

                    let html = "";

                    if (hasTimeDeal) {
                        // 기존가 취소선
                        html += `
                                    <div class="fc-old-price" style="text-decoration:line-through;color:#999;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;">
${originalPrice.toLocaleString()}원
                                    </div>
                                `;

                        // 할인 정보
                        if (discountType === 'PERCENT') {
                            html += `
                                        <div class="fc-discount" style="color:#d93025;font-weight:600;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;">
                                            🔥 ${discountValue}%↓
                                        </div>
                                    `;
                        } else {
                            html += `
                                        <div class="fc-discount" style="color:#d93025;font-weight:600;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;">
                                            🔥 ${discountValue.toLocaleString()}원↓
                                        </div>
                                    `;
                        }

                        // 최종가격
                        html += `
                                    <div class="fc-final-price" style="font-weight:bold;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;">
                                        ${price.toLocaleString()}원~
                                    </div>
                                `;
                    } else {
                        // 일반가
                        html += `<div class="fc-price" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;">${price.toLocaleString()}원~</div>`;
                    }

                    // 잔여 좌석 수 표시
                    html += `<div class="fc-remain-seats" style="font-size:10px;color:#666;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;">잔여 ${remainSeats}석</div>`;

                    // 상태 표시
                    if (status === 'CONFIRMED') {
                        html += `<span class="fc-event-status-confirmed">출발확정</span>`;
                    } else if (status === 'WAITING') {
                        html += `<span class="fc-event-status-wait">예약대기</span>`;
                    }

                    return { html: html };
                },

                dateClick: function (info) {
                    selectedDate = info.dateStr;
                    showProductsForDate(selectedDate);
                },

                eventClick: function (info) {
                    const clickedDate = info.event.start;
                    const clickedDateStr = clickedDate.getFullYear() + '-' + 
                                          String(clickedDate.getMonth() + 1).padStart(2, '0') + '-' + 
                                          String(clickedDate.getDate()).padStart(2, '0');
                    
                    selectedDate = clickedDateStr;
                    showProductsForDate(clickedDateStr);
                },

                events: (function() {
                    // 날짜별로 상품 그룹화 (달력용 데이터 사용)
                    const productsByDate = {};
                    
                    calendarProducts.forEach(e => {
                        if (!e.departDateTime) return;
                        
                        // 날짜만 추출 (시간 제외)
                        const date = new Date(e.departDateTime);
                        const dateKey = date.getFullYear() + '-' + 
                                       String(date.getMonth() + 1).padStart(2, '0') + '-' + 
                                       String(date.getDate()).padStart(2, '0');
                        
                        if (!productsByDate[dateKey]) {
                            productsByDate[dateKey] = [];
                        }
                        productsByDate[dateKey].push(e);
                    });
                    
                    // 각 날짜별로 최저가 이벤트 생성
                    const events = [];
                    Object.keys(productsByDate).forEach(dateKey => {
                        const dateProducts = productsByDate[dateKey];
                        
                        // 최저가 찾기
                        let minPrice = Infinity;
                        let minOriginalPrice = null;
                        let minPriceProduct = null;
                        let hasTimeDeal = false;
                        let discountType = null;
                        let discountValue = null;
                        let maxRemainSeats = 0;
                        let status = 'AVAILABLE';
                        
                        dateProducts.forEach(p => {
                            const price = p.price || 0;
                            if (price < minPrice) {
                                minPrice = price;
                                minPriceProduct = p;
                                minOriginalPrice = p.originalPrice;
                                hasTimeDeal = p.originalPrice != null;
                                discountType = p.discountType;
                                discountValue = p.discountValue;
                            }
                            
                            // 최대 잔여 좌석
                            const seats = p.remainSeats || 0;
                            if (seats > maxRemainSeats) {
                                maxRemainSeats = seats;
                            }
                            
                            // 상태 우선순위: CONFIRMED > WAITING > AVAILABLE
                            if (p.status === 'CONFIRMED') {
                                status = 'CONFIRMED';
                            } else if (p.status === 'WAITING' && status !== 'CONFIRMED') {
                                status = 'WAITING';
                            }
                        });
                        
                        if (minPriceProduct) {
                            // 첫 번째 상품의 출발 시간 사용 (날짜는 dateKey 사용)
                            const firstProduct = dateProducts[0];
                            const eventDate = new Date(firstProduct.departDateTime);
                            eventDate.setHours(0, 0, 0, 0);
                            
                            events.push({
                                id: 'date-' + dateKey,
                                title: minPriceProduct.title,
                                start: eventDate.toISOString(),
                                extendedProps: {
                                    dateKey: dateKey,
                                    productIds: dateProducts.map(p => p.id),
                                    price: minPrice,
                                    originalPrice: minOriginalPrice,
                                    discountType: discountType,
                                    discountValue: discountValue,
                                    status: status,
                                    hasTimeDeal: hasTimeDeal,
                                    remainSeats: maxRemainSeats
                                }
                            });
                        }
                    });
                    
                    return events;
                })()

            });

            calendar.render();

            // 날짜별 상품 표시 (하단 리스트용 데이터 사용)
            function showProductsForDate(dateStr) {
                selectedDate = dateStr;
                
                // 날짜 키 생성 (YYYY-MM-DD 형식)
                const dateObj = new Date(dateStr);
                const dateKey = dateObj.getFullYear() + '-' + 
                               String(dateObj.getMonth() + 1).padStart(2, '0') + '-' + 
                               String(dateObj.getDate()).padStart(2, '0');
                
                // 🔧 원본 데이터 저장
                currentListProducts = listProductsByDate[dateKey] || listProductsByDate[dateStr] || [];
                
                // ⭐ 필터 & 정렬 적용
                applyListFilters();
            }
            
            // 🔧 하단 리스트 전용 필터 함수
            function applyListFilters() {
                const availableOnly = document.getElementById('availableOnly').checked;
                const seatClass = document.getElementById('seatClassFilter').value;
                const sortBy = document.getElementById('sortSelect').value;

                filteredListProducts = currentListProducts.filter(p => {
                    // 예약가능 필터
                    if (availableOnly && (p.status === 'WAITING' || (p.remainSeats || 0) <= 0)) {
                        return false;
                    }
                    // 좌석 등급 필터
                    if (seatClass && p.seatClassType !== seatClass) {
                        return false;
                    }
                    return true;
                });

                // 정렬
                if (sortBy === 'departure') {
                    filteredListProducts.sort(
                        (a, b) => new Date(a.departDateTime) - new Date(b.departDateTime)
                    );
                } else if (sortBy === 'price') {
                    filteredListProducts.sort(
                        (a, b) => (a.price || 0) - (b.price || 0)
                    );
                }

                renderProductList(filteredListProducts);
            }
            
            // 🔧 실제 DOM 그리는 함수 분리
            function renderProductList(products) {
                const container = document.getElementById('specificDateProduct');
                const productList = document.getElementById('productList');
                
                if (!container || !productList) {
                    console.error('Container or productList not found');
                    return;
                }
                
                productList.innerHTML = '';

                if (products.length === 0) {
                    container.style.display = 'none';
                    return;
                }

                products.forEach(p => {
                    if (!p.departDateTime) return; // 항공편 시간 없으면 리스트 항목 스킵
                    const departDate = new Date(p.departDateTime);
                    if (isNaN(departDate.getTime())) return; // 파싱 실패 시 스킵
                    const returnDate = p.returnDateTime ? new Date(p.returnDateTime) : null;
                    const days = ['일', '월', '화', '수', '목', '금', '토'];
                    const formatDt = (d) => `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')}(${days[d.getDay()]}) ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                    const departDateStr = formatDt(departDate);
                    const returnDateStr = returnDate ? formatDt(returnDate) : '-';
                    const dateRangeStr = `${departDateStr} ~ ${returnDateStr}`;

                    const statusBadge = p.status === 'WAITING' 
                        ? '<span class="product-status-badge waiting">예약대기</span>'
                        : '<span class="product-status-badge available">예약가능</span>';

                    // 가격 표시 (이미지 디자인에 맞게)
                    let priceHtml = `
                        <div style="font-weight:bold;font-size:18px;color:#f44336;">
                            ${(p.price || 0).toLocaleString()}원
                        </div>
                    `;

                    const item = document.createElement('div');
                    item.className = 'product-item';
                    item.style.cursor = 'pointer';
                    // 좌석 등급 표시
                    const seatClassBadge = p.seatClassType 
                        ? `<span class="product-seat-class">${p.seatClassType}</span>` 
                        : '';
                    
                    item.innerHTML = `
                        <div class="product-item-content">
                            <div class="product-date-range">${dateRangeStr}</div>
                            <div class="product-description">${p.title || ''}</div>
                            <div class="product-info-row">
                                <div class="product-info-left">
                                    <span class="product-airline-text">${p.airline || ''}</span>
                                </div>
                                <div class="product-info-right">
                                    <span class="product-seats-text">(잔여 ${p.remainSeats || 0}석)</span>
                                    <span class="product-status-text">${p.status === 'WAITING' ? '예약대기' : '예약가능'}</span>
                                </div>
                            </div>
                            <div class="product-price-row">
                                <div class="price-label">금액</div>
                                ${seatClassBadge}
                                <div class="product-price">${priceHtml}</div>
                            </div>
                        </div>
                    `;

                    // 상세 페이지 링크: departDate/departTime/returnTime/seatClassType 있으면 동일 조합 복구용으로 전달
                    const departStr = (p.departDateTime && typeof p.departDateTime === 'string') ? p.departDateTime : (p.departDateTime ? String(p.departDateTime) : '');
                    const returnStr = (p.returnDateTime && typeof p.returnDateTime === 'string') ? p.returnDateTime : (p.returnDateTime ? String(p.returnDateTime) : '');
                    const departDateOnly = departStr.includes('T') ? departStr.split('T')[0] : (departDate.getFullYear() + '-' + String(departDate.getMonth() + 1).padStart(2, '0') + '-' + String(departDate.getDate()).padStart(2, '0'));
                    const departTime = departStr.includes('T') ? departStr.split('T')[1].substring(0, 8) : '';
                    const returnTime = returnStr.includes('T') ? returnStr.split('T')[1].substring(0, 8) : '';
                    const seatClassType = p.seatClassType || '';
                    const fetchTarget = `/product/detail/${p.id}?departDate=${encodeURIComponent(departDateOnly)}&departTime=${encodeURIComponent(departTime)}&returnTime=${encodeURIComponent(returnTime)}&seatClassType=${encodeURIComponent(seatClassType)}`;
                    item.addEventListener('click', () => {
                        addModal(fetchTarget);
                    });

                    productList.appendChild(item);
                });
                
                container.style.display = 'block';
            }

            // 🔧 필터/정렬 버튼은 하단 리스트 전용 함수 호출
            window.applyFilters = applyListFilters;
            window.sortProducts = applyListFilters;
            
            // 예약가능 상품만 필터링 (하위 호환성 유지)
            window.filterAvailableOnly = function() {
                applyListFilters();
            };

        })();
    </script>
</div>
