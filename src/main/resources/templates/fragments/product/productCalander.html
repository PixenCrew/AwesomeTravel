    <script th:inline="javascript">
        (function () {
            let products = /*[[${products}]]*/[];
            if (typeof products === 'string') {
                try {
                    products = JSON.parse(products);
                } catch (e) {
                    products = [];
                }
            }
            products = products || [];
            window.productsData = products; // expose for debugging
            let filteredProducts = [...products];
            let selectedDate = null;

            // FullCalendar 초기화
            let calendarEl = document.getElementById('calendar');

            let calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                height: 'auto',
                headerToolbar: {
                    left: 'prev',
                    center: 'title',
                    right: 'next'
                },
                buttonText: {
                    today: '오늘'
                },

                // 날짜 셀에 클래스 추가 - 예약가능한 날짜 하이라이트
                dayCellClassNames: function(arg) {
                    // 로컬 날짜로 변환 (시간대 문제 방지)
                    const calendarDate = arg.date;
                    const dateStr = calendarDate.getFullYear() + '-' + 
                        String(calendarDate.getMonth() + 1).padStart(2, '0') + '-' + 
                        String(calendarDate.getDate()).padStart(2, '0');
                    const classes = [];
                    
                    // 해당 날짜의 이벤트 찾기
                    for (let i = 0; i < products.length; i++) {
                        const product = products[i];
                        if (product.departDateTime) {
                            // product.departDateTime을 로컬 날짜로 파싱
                            const productDate = new Date(product.departDateTime);
                            const productDateStr = productDate.getFullYear() + '-' + 
                                String(productDate.getMonth() + 1).padStart(2, '0') + '-' + 
                                String(productDate.getDate()).padStart(2, '0');
                            
                            if (productDateStr === dateStr) {
                                // 이벤트가 있는 날짜
                                const status = product.status;
                                if (status === 'WAITING') {
                                    classes.push('has-waiting');
                                } else if (status === 'CONFIRMED') {
                                    classes.push('has-confirmed');
                                } else {
                                    classes.push('has-available');
                                }
                                break;
                            }
                        }
                    }
                    
                    return classes;
                },

                // eventContent: function (arg) {
                //     const price = arg.event.extendedProps.price;
                //     const status = arg.event.extendedProps.status;

                //     let displayText = '';
                //     let priceClass = '';

                //     if (status === 'CONFIRMED') {
                //         displayText = `${price.toLocaleString()}~ <span class="fc-event-status-confirmed">출발확정</span>`;
                //         priceClass = 'fc-event-price-confirmed';
                //     } else if (status === 'WAITING') {
                //         displayText = '<span class="fc-event-status-wait">예약대기</span>';
                //         priceClass = 'fc-event-price-wait';
                //     } else {
                //         // 기본 형식 (AVAILABLE)
                //         displayText = `${price.toLocaleString()}~`;
                //         priceClass = 'fc-event-price-available';
                //     }

                //     return {
                //         html: `<div class="${priceClass}">${displayText}</div>`
                //     };
                // },

                eventContent: function (arg) {
                    const price = arg.event.extendedProps.price;
                    const originalPrice = arg.event.extendedProps.originalPrice;
                    const discountType = arg.event.extendedProps.discountType;
                    const discountValue = arg.event.extendedProps.discountValue;
                    const status = arg.event.extendedProps.status;
                    const hasTimeDeal = arg.event.extendedProps.hasTimeDeal;
                    const remainSeats = arg.event.extendedProps.remainSeats || 0;

                    let html = "";

                    if (hasTimeDeal) {
                        // 기존가 취소선
                        html += `
                                    <div class="fc-old-price" style="text-decoration:line-through;color:#999;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;">
${originalPrice.toLocaleString()}원
                                    </div>
                                `;

                        // 할인 정보
                        if (discountType === 'PERCENT') {
                            html += `
                                        <div class="fc-discount" style="color:#d93025;font-weight:600;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;">
                                            🔥 ${discountValue}%↓
                                        </div>
                                    `;
                        } else {
                            html += `
                                        <div class="fc-discount" style="color:#d93025;font-weight:600;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;">
                                            🔥 ${discountValue.toLocaleString()}원↓
                                        </div>
                                    `;
                        }

                        // 최종가격
                        html += `
                                    <div class="fc-final-price" style="font-weight:bold;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;">
                                        ${price.toLocaleString()}원~
                                    </div>
                                `;
                    } else {
                        // 일반가
                        html += `<div class="fc-price" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;">${price.toLocaleString()}원~</div>`;
                    }

                    // 잔여 좌석 수 표시
                    html += `<div class="fc-remain-seats" style="font-size:10px;color:#666;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;">잔여 ${remainSeats}석</div>`;

                    // 상태 표시
                    if (status === 'CONFIRMED') {
                        html += `<span class="fc-event-status-confirmed">출발확정</span>`;
                    } else if (status === 'WAITING') {
                        html += `<span class="fc-event-status-wait">예약대기</span>`;
                    }

                    return { html: html };
                },

                dateClick: function (info) {
                    selectedDate = info.dateStr;
                    showProductsForDate(selectedDate);
                },

                eventClick: function (info) {
                    const clickedDate = info.event.start;
                    const clickedDateStr = clickedDate.getFullYear() + '-' + 
                                          String(clickedDate.getMonth() + 1).padStart(2, '0') + '-' + 
                                          String(clickedDate.getDate()).padStart(2, '0');
                    
                    selectedDate = clickedDateStr;
                    showProductsForDate(clickedDateStr);
                },

                events: (function() {
                    // 날짜별로 상품 그룹화
                    const productsByDate = {};
                    
                    products.forEach(e => {
                        if (!e.departDateTime) return;
                        
                        // 날짜만 추출 (시간 제외)
                        const date = new Date(e.departDateTime);
                        const dateKey = date.getFullYear() + '-' + 
                                       String(date.getMonth() + 1).padStart(2, '0') + '-' + 
                                       String(date.getDate()).padStart(2, '0');
                        
                        if (!productsByDate[dateKey]) {
                            productsByDate[dateKey] = [];
                        }
                        productsByDate[dateKey].push(e);
                    });
                    
                    // 각 날짜별로 최저가 이벤트 생성
                    const events = [];
                    Object.keys(productsByDate).forEach(dateKey => {
                        const dateProducts = productsByDate[dateKey];
                        
                        // 최저가 찾기
                        let minPrice = Infinity;
                        let minOriginalPrice = null;
                        let minPriceProduct = null;
                        let hasTimeDeal = false;
                        let discountType = null;
                        let discountValue = null;
                        let maxRemainSeats = 0;
                        let status = 'AVAILABLE';
                        
                        dateProducts.forEach(p => {
                            const price = p.price || 0;
                            if (price < minPrice) {
                                minPrice = price;
                                minPriceProduct = p;
                                minOriginalPrice = p.originalPrice;
                                hasTimeDeal = p.originalPrice != null;
                                discountType = p.discountType;
                                discountValue = p.discountValue;
                            }
                            
                            // 최대 잔여 좌석
                            const seats = p.remainSeats || 0;
                            if (seats > maxRemainSeats) {
                                maxRemainSeats = seats;
                            }
                            
                            // 상태 우선순위: CONFIRMED > WAITING > AVAILABLE
                            if (p.status === 'CONFIRMED') {
                                status = 'CONFIRMED';
                            } else if (p.status === 'WAITING' && status !== 'CONFIRMED') {
                                status = 'WAITING';
                            }
                        });
                        
                        if (minPriceProduct) {
                            // 첫 번째 상품의 출발 시간 사용 (날짜는 dateKey 사용)
                            const firstProduct = dateProducts[0];
                            const eventDate = new Date(firstProduct.departDateTime);
                            eventDate.setHours(0, 0, 0, 0);
                            
                            events.push({
                                id: 'date-' + dateKey,
                                title: minPriceProduct.title,
                                start: eventDate.toISOString(),
                                extendedProps: {
                                    dateKey: dateKey,
                                    productIds: dateProducts.map(p => p.id),
                                    price: minPrice,
                                    originalPrice: minOriginalPrice,
                                    discountType: discountType,
                                    discountValue: discountValue,
                                    status: status,
                                    hasTimeDeal: hasTimeDeal,
                                    remainSeats: maxRemainSeats
                                }
                            });
                        }
                    });
                    
                    return events;
                })()

            });

            calendar.render();

            // 날짜별 상품 표시
            function showProductsForDate(dateStr) {
                const container = document.getElementById('specificDateProduct');
                const productList = document.getElementById('productList');

                if (!container || !productList) {
                    console.error('Container or productList not found');
                    return;
                }

                const matchingProducts = filteredProducts.filter(p => {
                    if (!p.departDateTime) return false;
                    const departDate = new Date(p.departDateTime);
                    const dateStrFormatted = departDate.getFullYear() + '-' + 
                                            String(departDate.getMonth() + 1).padStart(2, '0') + '-' + 
                                            String(departDate.getDate()).padStart(2, '0');
                    return dateStrFormatted === dateStr;
                });

                console.log('Selected date:', dateStr);
                console.log('Matching products:', matchingProducts.length);
                console.log('All products count:', filteredProducts.length);
                
                // 각 매칭된 상품의 잔여 좌석 수 확인
                matchingProducts.forEach((p, idx) => {
                    console.log(`Product ${idx + 1}: ID=${p.id}, Title=${p.title}, remainSeats=${p.remainSeats}, departDateTime=${p.departDateTime}`);
                });

                productList.innerHTML = '';

                if (matchingProducts.length > 0) {
                    matchingProducts.forEach(p => {
                        const departDate = new Date(p.departDateTime);
                        const returnDate = new Date(p.returnDateTime);
                        const days = ['일', '월', '화', '수', '목', '금', '토'];
                        
                        const departDateStr = `${departDate.getFullYear()}.${String(departDate.getMonth() + 1).padStart(2, '0')}.${String(departDate.getDate()).padStart(2, '0')}(${days[departDate.getDay()]}) ${String(departDate.getHours()).padStart(2, '0')}:${String(departDate.getMinutes()).padStart(2, '0')}`;
                        const returnDateStr = `${returnDate.getFullYear()}.${String(returnDate.getMonth() + 1).padStart(2, '0')}.${String(returnDate.getDate()).padStart(2, '0')}(${days[returnDate.getDay()]})`;
                        const dateRangeStr = `${departDateStr} ~ ${returnDateStr}`;

                        const statusBadge = p.status === 'WAITING' 
                            ? '<span class="product-status-badge waiting">예약대기</span>'
                            : '<span class="product-status-badge available">예약가능</span>';

                        // 가격 표시 (이미지 디자인에 맞게)
                        let priceHtml = `
                            <div style="font-weight:bold;font-size:18px;color:#f44336;">
                                ${(p.price || 0).toLocaleString()}원
                            </div>
                        `;

                        const item = document.createElement('div');
                        item.className = 'product-item';
                        item.style.cursor = 'pointer';
                        // 좌석 등급 표시
                        const seatClassBadge = p.seatClassType 
                            ? `<span class="product-seat-class">${p.seatClassType}</span>` 
                            : '';
                        
                        item.innerHTML = `
                            <div class="product-item-content">
                                <div class="product-date-range">${dateRangeStr}</div>
                                <div class="product-description">${p.title || ''}</div>
                                <div class="product-info-row">
                                    <div class="product-info-left">
                                        <span class="product-airline-text">${p.airline || ''}</span>
                                    </div>
                                    <div class="product-info-right">
                                        <span class="product-seats-text">(잔여 ${p.remainSeats || 0}석)</span>
                                        <span class="product-status-text">${p.status === 'WAITING' ? '예약대기' : '예약가능'}</span>
                                    </div>
                                </div>
                                <div class="product-price-row">
                                    <div class="price-label">금액</div>
                                    ${seatClassBadge}
                                    <div class="product-price">${priceHtml}</div>
                                </div>
                            </div>
                        `;

                        const departDateOnly = p.departDateTime.split('T')[0];
                        // 선택한 항공편의 출발 시간을 전달 (같은 날짜에 여러 항공편이 있을 때 구분하기 위해)
                        const departTime = p.departDateTime.split('T')[1]; // "08:40:00" 형식
                        // 귀국 시간도 함께 전달하여 정확한 조합 매칭
                        const returnTime = p.returnDateTime ? p.returnDateTime.split('T')[1] : '';
                        const fetchTarget = `/product/detail/${p.id}?departDate=${encodeURIComponent(departDateOnly)}&departTime=${encodeURIComponent(departTime || '')}&returnTime=${encodeURIComponent(returnTime || '')}`;
                        item.addEventListener('click', () => {
                            addModal(fetchTarget);
                        });

                        productList.appendChild(item);
                    });
                    container.style.display = 'block';
                } else {
                    container.style.display = 'none';
                }
            }

            // 예약가능 상품만 필터링
            window.filterAvailableOnly = function() {
                const checkbox = document.getElementById('availableOnly');
                if (checkbox.checked) {
                    filteredProducts = products.filter(p => p.status !== 'WAITING' && (p.remainSeats || 0) > 0);
                } else {
                    filteredProducts = [...products];
                }
                sortProducts();
                if (selectedDate) {
                    showProductsForDate(selectedDate);
                }
            };

            // 정렬
            window.sortProducts = function() {
                const sortSelect = document.getElementById('sortSelect');
                const sortBy = sortSelect.value;

                if (sortBy === 'departure') {
                    filteredProducts.sort((a, b) => new Date(a.departDateTime) - new Date(b.departDateTime));
                } else if (sortBy === 'price') {
                    filteredProducts.sort((a, b) => (a.price || 0) - (b.price || 0));
                }

                if (selectedDate) {
                    showProductsForDate(selectedDate);
                }
            };

        })();
    </script>
</div>
