<div>
    <header class="section-header">
        <h1>여권정보 등록</h1>
        <div class="right"> <i class="fas fa-chevron-left" onclick="backModal()"></i> </div>
    </header>
    <div class="section-body">
        <div id="passportForm">
            <div th:each="passenger, iterStat : ${passengers}">
                <section class="passenger-card p-3 border mb-3 rounded">

                    <h3 th:text="'탑승객 ' + ${iterStat.index + 1}"></h3>
                    <button type="button" class="btn btn-secondary mt-2"
                        onclick="openMateSelectModal(this)">
                        여행메이트 입력
                    </button>

                    <input type="hidden" th:name="'passengers[' + ${iterStat.index} + '].id'" th:value="${passenger.id}" readonly />

                    <label>여권번호
                        <input type="text" th:name="'passengers[' + ${iterStat.index} + '].passportNum'" th:value="${passenger.passportNum}" required /><br>
                    </label>
                    <label>영문 성
                        <input type="text" th:name="'passengers[' + ${iterStat.index} + '].lastName'" th:value="${passenger.lastName}" required /><br>
                    </label>
                    <label>영문 이름
                        <input type="text" th:name="'passengers[' + ${iterStat.index} + '].firstName'" th:value="${passenger.firstName}" required /><br>
                    </label>
                    <label>국문 성
                        <input type="text" th:name="'passengers[' + ${iterStat.index} + '].lastNameKor'" th:value="${passenger.lastNameKor}" required /><br>
                    </label>
                    <label>국문 이름
                        <input type="text" th:name="'passengers[' + ${iterStat.index} + '].firstNameKor'" th:value="${passenger.firstNameKor}" required /><br>
                    </label>
                    <label>생년월일
                        <input type="date" th:name="'passengers[' + ${iterStat.index} + '].birth'" th:value="${passenger.birth}" required /><br>
                    </label>
                    <label>연령구분
                        <input type="text" th:name="'passengers[' + ${iterStat.index} + '].ageGroup'" th:value="${passenger.ageGroup}" readonly /><br>
                    </label>
                    <label>성별
                        <select th:name="'passengers[' + ${iterStat.index} + '].sex'" required>
                            <option value="MALE" th:selected="${passenger.sex?.name() == 'MALE' or passenger.sex == 'MALE'}">남성</option>
                            <option value="FEMALE" th:selected="${passenger.sex?.name() == 'FEMALE' or passenger.sex == 'FEMALE'}">여성</option>
                        </select><br>
                    </label>


                    <label>국가코드
                        <input type="text" th:name="'passengers[' + ${iterStat.index} + '].countryCode'" th:value="${passenger.countryCode?.code}" required /><br>
                    </label>
                    <label>국적
                        <input type="text" th:name="'passengers[' + ${iterStat.index} + '].nationality'" th:value="${passenger.nationality}" required /><br>
                    </label>
                    <label>발급관청
                        <input type="text" th:name="'passengers[' + ${iterStat.index} + '].authority'" th:value="${passenger.authority}" required /><br>
                    </label>
                    <label>여권 발급일
                        <input type="date" th:name="'passengers[' + ${iterStat.index} + '].issue'" th:value="${passenger.issue}" required /><br>
                    </label>
                    <label>여권 만료일
                        <input type="date" th:name="'passengers[' + ${iterStat.index} + '].expire'" th:value="${passenger.expire}" required /><br>
                    </label>


                    <label>이메일
                        <input type="email" th:name="'passengers[' + ${iterStat.index} + '].email'" th:value="${passenger.email}" required /><br>
                    </label>
                    <label>전화번호
                        <input type="text" th:name="'passengers[' + ${iterStat.index} + '].number'" th:value="${passenger.number}" required /><br>
                    </label>
                    <label>특별 요구사항
                        <textarea th:name="'passengers[' + ${iterStat.index} + '].specialRequests'" th:text="${passenger.specialRequests}"></textarea><br>
                    </label>

                </section>
            </div>
            <div class="text-center mt-4">
                <button type="button"
                    class="btn btn-primary"
                    th:data-purchase="${purchaseBaseId}"
                    th:data-type="${type}"
                    onclick="submitPassportForm(this)">
                    제출
                </button>
            </div>
        </div>
    </div>
    <script>

        (function () {
            window.submitPassportForm = function (button) {

                const purchaseBaseId = button.dataset.purchase;
                const type = button.dataset.type;

                console.log('purchaseBaseId :', purchaseBaseId);
                console.log('type :', type);

                const passengers = Array.from(document.querySelectorAll('.passenger-card')).map((div, index) => ({
                    id: div.querySelector(`input[name='passengers[${index}].id']`)?.value || '',

                    passportNum: div.querySelector(`input[name='passengers[${index}].passportNum']`)?.value || '',

                    lastName: div.querySelector(`input[name='passengers[${index}].lastName']`)?.value || '',
                    firstName: div.querySelector(`input[name='passengers[${index}].firstName']`)?.value || '',
                    lastNameKor: div.querySelector(`input[name='passengers[${index}].lastNameKor']`)?.value || '',
                    firstNameKor: div.querySelector(`input[name='passengers[${index}].firstNameKor']`)?.value || '',

                    birth: div.querySelector(`input[name='passengers[${index}].birth']`)?.value || '',
                    sex: div.querySelector(`select[name='passengers[${index}].sex']`)?.value || '',

                    countryCode: div.querySelector(`input[name='passengers[${index}].countryCode']`)?.value || '',
                    nationality: div.querySelector(`input[name='passengers[${index}].nationality']`)?.value || '',
                    authority: div.querySelector(`input[name='passengers[${index}].authority']`)?.value || '',
                    issue: div.querySelector(`input[name='passengers[${index}].issue']`)?.value || '',
                    expire: div.querySelector(`input[name='passengers[${index}].expire']`)?.value || '',

                    email: div.querySelector(`input[name='passengers[${index}].email']`)?.value || '',
                    number: div.querySelector(`input[name='passengers[${index}].number']`)?.value || '',
                    specialRequests: div.querySelector(`textarea[name='passengers[${index}].specialRequests']`)?.value || '',
                    ageGroup: div.querySelector(`input[name='passengers[${index}].ageGroup']`)?.value || ''
                }));

                const payload = { passengers };

                addModal(`/purchase/${type}/${purchaseBaseId}/passport`, true, payload);
            }

            // 여행메이트 팝업 열기
            window.openMateSelectModal = function (button) {
                // 어떤 passenger-card 에서 눌렀는지 저장
                window.selectedPassengerCard = button.closest('.passenger-card');

                addModal('/mypage/mateList/select');
            }

            // 메이트 선택 결과 받기
            window.addEventListener("message", function (event) {
                if (event.data?.type === "mateSelected") {
                    const mateId = event.data.id;

                    if (mateId === 0) {
                        // 내 여권 정보를 자동 입력
                        fetch(`/mypage/api/myPassport`)
                            .then(res => res.json())
                            .then(data => fillMateData(data));
                        return;
                    }

                    fetch(`/mypage/api/matePassport/${mateId}`)
                        .then(res => res.json())
                        .then(data => fillMateData(data));
                }
            });

            // 선택한 메이트 정보를 passenger-card에 입력
            function fillMateData(mate) {
                if (!window.selectedPassengerCard) return;

                const card = window.selectedPassengerCard;

                card.querySelector(`input[name$='.passportNum']`).value = mate.passportNum;
                card.querySelector(`input[name$='.lastName']`).value = mate.lastName;
                card.querySelector(`input[name$='.firstName']`).value = mate.firstName;
                card.querySelector(`input[name$='.lastNameKor']`).value = mate.lastNameKor;
                card.querySelector(`input[name$='.firstNameKor']`).value = mate.firstNameKor;
                card.querySelector(`input[name$='.birth']`).value = mate.birth;
                card.querySelector(`select[name$='.sex']`).value = mate.sex;
                card.querySelector(`input[name$='.countryCode']`).value = mate.countryCode;
                card.querySelector(`input[name$='.nationality']`).value = mate.nationality;
                card.querySelector(`input[name$='.authority']`).value = mate.authority;
                card.querySelector(`input[name$='.issue']`).value = mate.issue;
                card.querySelector(`input[name$='.expire']`).value = mate.expire;
                card.querySelector(`input[name$='.email']`).value = mate.email;
                card.querySelector(`input[name$='.number']`).value = mate.number;
            }

        })(); 
    </script>
</div>
