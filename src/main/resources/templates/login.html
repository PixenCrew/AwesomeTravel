<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <title>Login</title>
</head>

<body>
    <h2>로그인</h2>
    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="이메일" />
        <input type="password" name="password" placeholder="비밀번호" />
        <button type="submit">로그인</button>
    </form>

    <h3>소셜 로그인</h3>
    <a th:href="@{/oauth2/authorization/google}">Google 로그인</a>
    <a th:href="@{/oauth2/authorization/naver}">Naver 로그인</a>
</body>

</html>
