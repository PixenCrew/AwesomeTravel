spring.application.name=Awesome_Travel

# \uB3C4\uBA54\uC778
# awesometravel.domain=dev
app.frontend.url=https://www.astravel.kr:9091


# DB \uC5F0\uACB0
spring.datasource.url=jdbc:mariadb://localhost:3306/awesome
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.username=awesome
spring.datasource.password=travel

#create,create-drop,update,validate,none
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:mock/city_code.sql,classpath:mock/hotel.sql,classpath:mock/menu_code.sql,classpath:mock/airline.sql

# SQL \uCFFC\uB9AC \uCF58\uC194 \uCD9C\uB825
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=off

# SSL \uC124\uC815
server.port=9091
# server.http2.enabled=true
# server.ssl.enabled=true
# server.ssl.key-store=certificate.p12
# server.ssl.key-store-type=PKCS12
# server.ssl.key-store-password=kyj0407

# dev \uBCC0\uC218 \uC124\uC815
spring.profiles.active=dev

spring.config.import=classpath:application-h2.properties,classpath:application-oauth.properties,classpath:application-smtp.properties

# 프로필 이미지 저장 경로
profileImageLocation=src/main/resources/static/images/profile
